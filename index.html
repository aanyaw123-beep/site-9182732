 |\n|------|------|\n| **骨折** | 臥床 → 3個月少30%肌肉 |\n| **wheelchair** | 惡性循環：走得少 → 肌肉更少 → 更難走 |\n| **維他命D低** | 骨頭更脆 |\n| **Dead End** | 一跌衰，可能永久失去活動能力 |\n\n---\n\n### 四、海陸空 Body Weight Routine\n\n**核心理念：Signal身體你想加強邊度**\n\n| 系列 | 動作 | 工具 |\n|------|------|------|\n| **地（Land）** | 深蹲、橋式、掌上壓、Leg Raise、馬步 | 地面 |\n| **海（C Routine）** | Dip Station（撐體）、Knee Raise、Bicycle | 雙槓 |\n| **空（Sky）** | Dead Hang（吊住）、Knee Raise、Leg Raise | Pull Up Bar |\n\n---\n\n### 五、Land Routine（地面動作）\n\n| 動作 | 重點 |\n|------|------|\n| **深蹲（Squat）** | 最基本，每日可做，慢慢增加次數 |\n| **橋式（Bridge）** | 躺在地，屈膝，慢慢起 |\n| **掌上壓（Push Up）** | Easy版：跪住做 → 牆做 → 正式 |\n| **Leg Raise** | 躺臥抬腿（慢郁！） |\n| **馬步（Horse Stance）** | 扎馬，腰背挺直，可扶棍 |\n\n---\n\n### 六、C Routine / Sea Routine（雙槓動作）\n\n| 動作 | 重點 |\n|------|------|\n| **Dip（撐體）** | 最重要之一，屈膝版 → 正式版 |\n| **Knee Raise** | 吊住屈膝，慢慢增加到10下 |\n| **Bicycle（空中踩單車）** | 進階版，先Hold再郁 |\n| **Deep Station（撐著）** | 吊住唔郁，令手臂適應 |\n\n---\n\n### 七、Sky Routine（Pull Up Bar動作）\n\n| 動作 | 重點 |\n|------|------|\n| **Dead Hang** | 吊住放鬆，最重要！男士要Hold 10秒+ |\n| **Knee Raise** | 吊住屈膝 |\n| **Leg Raise** | 吊住伸直腳 |\n| **Bicycle** | 空中踩單車，進階 |\n\n> 注意：Pull Up Bar唔係用嚟做Pull Up，而係用嚟Dead Hang + Knee/Leg Raise\n\n---\n\n### 八、四個Combo Synergy元素\n\n| 元素 | 內容 |\n|------|------|\n| **Where to Build** | 海陸空動作Signal身體邊度要加強 |\n| **When to Build** | 飯後120-180分鐘（血糖+胰島素高峰） |\n| **Building Materials** | Protein + Supplements |\n| **Dietary Signal** | Spanish Extract（通知大腦：係時候增肌） |\n\n---\n\n### 九、黃金Timing（飯後120-180分鐘）\n\n| 狀態 | 原因 |\n|------|------|\n| **血糖高** | 肌肉有葡萄糖可用 |\n| **胰島素高** | Growth Hormone忙於將Glucose送入肌肉 |\n| **肥肩** | 胰島素本來就高，任何時間都有效 |\n| **瘦肩** | 胰島素低，呢個Timing係必須！ |\n\n---\n\n### 十、Building Materials（建築材料）\n\n| Supplement | 份量 | 作用 |\n|------------|------|------|\n| **Creatine Monohydrate** | 1茶匙 | 令你做多幾次（10下先係Optimal） |\n| **Collagen Peptide** | 1-2湯匙 | 建築材料，令關節/骨頭強壯 |\n| **Flax Seed** | 1-2湯匙 | Protein source |\n| **TMG (Betaine)** | 少量 | 輔助Creatine效果 |\n| **Greek Yogurt** | — | 飽肚、Protein、適合肥肩 |\n| **Caféa** | — | 流質、易入口，適合瘦肩 |\n\n---\n\n### 十一、Spanish Extract（增肌信號）\n\n- 飯後服用\n- 作用：欺騙大腦以為身體需要大量肌肉\n- 配合四個Combo元素先至有效\n\n---\n\n*Lesson S3-02 Complete - Last updated: 2026-04-11*\n*Season 3 (Autumn) - 海陸空 Body Weight Routine*\n\n---\n\n## Lesson S3-03 (Autumn Part 3) - Body Weight Training 詳細動作 + Fall Risk + 睡眠 + 第二次Body Check\n\n*Transcript日期：2025-10-28 | About Health Pro Season 3 第三堂*\n\n---\n\n### 一、為什麼做Body Weight Training\n\n| 原因 | 說明 |\n|------|------|\n| **Fall Risk** | 肌肉唔夠 → carry唔到自己體重 → 容易跌 |\n| **骨骼健康** | 刺激骨骼生長，配合Vitamin D + K2 |\n| **睡眠** | 輕度訓練 → Adenosine ↑ → Sleep Pressure ↑ |\n| **心血管** | 令血管去肌肉組織，加強心血管系統 |\n| **肝臟** | 向肝臟發信號：清除脂肪用嚟建造肌肉 |\n\n---\n\n### 二、動作要點\n\n| 動作 | 重點 |\n|------|------|\n| **Squat** | 飯後做，慢慢增加到30下（目標10下） |\n| **紮馬（Horse Stance）** | 放棍在大脾，棍郁就啱位；目標慢慢增加到幾十分鐘 |\n| **Bridge（橋式）** | 躺喺地屈膝慢慢起，對女性特別重要 |\n| **Push Up** | 跪→牆→ Bench → 正式 |\n| **Leg Raise** | 躺喺地抬腿，慢慢郁（engage core） |\n| **Dead Hang** | 最重要！吊住放鬆，由1秒慢慢增加到1分鐘 |\n| **Dip（撐體）** | 屈膝版 → 正式版 |\n\n---\n\n### 三、C Routine / Sky Routine 補充\n\n| 動作 | 說明 |\n|------|------|\n| **Deep Station Hold** | 最重要嘅上半身手撐動作 |\n| **Reverse Push Up** | 無器材代替Dip |\n| **Hybrid Approach** | Land + Sea，或者 Land + Sky，每樣做一個動作 |\n\n---\n\n### 四、Timing（飯後120-180分鐘）\n\n| 情況 | 原因 |\n|------|------|\n| **胰島素 Spike** | 生長激素忙於將Glucose送入肌肉 |\n| **肥Gene** | 胰島素本來就高，任何時間都得 |\n| **瘦Gene** | 呢個Timing係必須！ |\n\n---\n\n### 五、Building Materials（建築材料）\n\n| Supplement | 份量 | 作用 |\n|------------|------|------|\n| **Creatine Monohydrate** | 1茶匙 | 能量補充，做多幾下 |\n| **Collagen Peptide** | 1-2湯匙 | 建築材料 |\n| **Flax Seed** | 1-2湯匙 | Protein |\n| **TMG (Betaine)** | 少量 | 輔助Creatine |\n| **Greek Yogurt / Kefir** | — | 飽肚 + Protein |\n| **Spinach Powder** | 1茶匙 | 飯後信號（吃2星期停1星期） |\n\n---\n\n### 六、晚上做Body Weight Training嘅神奇效果\n\n| 效果 | 原因 |\n|------|------|\n| **Sleep Pressure ↑** | Adenosine增加，身體覺得要訓 |\n| **溫度先升後跌** | 身體溫度升完跌 = 天然Sleep Signal |\n| **無Stress Hormone** | Mild body weight唔會觸發Fight-or-Flight |\n\n> HIIT同Body Weight Training分別：HIIT觸發Stress Hormone（對睡眠有害），Body Weight只係Signal（對睡眠有幫助）\n\n---\n\n### 七、秋冬減脂期間運動建議\n\n| Gene類型 | 建議 |\n|----------|------|\n| **肥Gene** | 繼續168/186/204；減脂為主 |\n| **瘦Gene** | 早餐無問題；加飯/薯仔增肌 |\n| **兩者都做** | 每日6000-9000步 + Body Weight Routine |\n\n---\n\n### 八、第二次Body Check（11月21日截止）\n\n| 指標 | 睇咩 |\n|------|------|\n| **血糖** | 有無遠離Danger Zone |\n| **HDL：Triglyceride比例** | 反映LDL大小，風險係咪低咗 |\n| **肝臟脂肪** | 有無跳Category |\n| **肝硬度** | 有無改善（特別係曾經有問題嘅人） |\n| **空腹胰島素** | Insulin Resistance有冇改善 |\n\n---\n\n### 九、三種Lab Range\n\n| 類型 | 說明 |\n|------|------|\n| **Medical Threshold** | 真正有病，需要醫療介入 |\n| **Normal Range** | 正常但唔代表健康 |\n| **Optimal Range** | 真正健康嘅目標 |\n\n---\n\n*Lesson S3-03 Complete - Last updated: 2026-04-11*\n*Season 3 (Autumn) - Body Weight Training Details + Fall Risk + Sleep*\n\n---\n\n## Lesson S3-04 (Autumn Part 4) - Body Weight Training 三大組動作 + ATP能量 + Mild Burn Signal\n\n*Transcript日期：2025-11-04 | About Health Pro Season 3 第四堂*\n\n---\n\n### 一、Mild Burn（輕度燃燒感）\n\n| 概念 | 說明 |\n|------|------|\n| **感覺** | 肌肉暖暖哋，像一股暖流 |\n| **原理** | 肌肉用力時需要ATP能量 |\n| **無氧呼吸** | 當ATP唔夠用，身體用無氧方式分解糖 |\n| **乳酸（Lactate）** | 呢個過程產生嘅副產品，可以穿越血腦屏障 |\n| **好處** | 乳酸係Signal，話比大腦知：你需要更多肌肉 |\n\n---\n\n### 二、三大海陸空動作組\n\n| 組別 | 動作 | 功能 |\n|------|------|------|\n| **第一組（Core）** | Deep Bar Knee/Leg Raise、Ground Leg Raise、Reverse Crunch | Engage Core |\n| **第二組（Hold）** | Dead Hang、Deep Bar Hold | 用雙手撐起自己體重 |\n| **第三組（Pull）** | Deep Bar Pull Up、Deep Dip | 吊住自己再压下去 |\n\n---\n\n### 三、為什麼要做Body Weight Training\n\n| 效果 | 原因 |\n|------|------|\n| **減Fall Risk** | 強化大腿/臀部/核心，預防跌倒 |\n| **改善睡眠** | 身體知道要修補肌肉 |\n| **提升代謝** | 肌肉增大 → 基礎代謝提高 |\n| **信號作用** | Mild burn係signal，大腦收到話「我要多啲肌肉」 |\n\n---\n\n### 四、安全要點\n\n| 原則 | 說明 |\n|------|------|\n| **Gear安全** | Deep Bar Station 2合1最穩陣 |\n| **正確安裝** | 唔好掛喺門框、窗台 |\n| **量力而為** | 由1秒開始，慢慢增加到分鐘 |\n\n---\n\n### 五、飯前做Body Weight Training\n\n| Timing | 效果 |\n|--------|------|\n| **飯前做（飯前血糖低）** | 身體動用脂肪 → 減脂 |\n| **飯後做** | 配合高血糖 → 肌肉修補 → 增肌 |\n\n---\n\n### 六、ATP能量系統\n\n| 系統 | 用途 |\n|------|------|\n| **有氧** | 日常活動、行路 |\n| **無氧（Mild Burn）** | Body Weight Training時觸發 |\n| **ATP儲備** | 只夠幾秒，之後靠無氧分解 |\n\n---\n\n*Lesson S3-04 Complete - Last updated: 2026-04-11*\n*Season 3 (Autumn) - Body Weight Training 三大組動作 + ATP能量 + Mild Burn Signal*\n\n---\n\n## Lesson S3-05 (Autumn Part 5) - Micro Muscle Training + Golden Timing + Functional Strength + 消防員標準\n\n*Transcript日期：2025-11-11 | About Health Pro Season 3 第五堂*\n\n---\n\n### 一、Golden Timing（飯後120-180分鐘）\n\n| 概念 | 說明 |\n|------|------|\n| **原理** | 食嘢後胰島素高峰期，正好將營養送入肌肉 |\n| **Ultra Processed Food** | 會令insulin spike更快，要避免 |\n| **最黃金時間** | 飯後120-180分鐘，最有利肌肉增長 |\n\n---\n\n### 二、Micro Muscle Training（融入生活）\n\n| 方式 | 說明 |\n|------|------|\n| **飯後做家務** | 洗碗、清潔、摺衫都係motivated walking |\n| **超市購物** | 反正都要做，排喺飯後做就變成運動 |\n| **Standing Table + Balance Board** | 被動core engagement，唔使花額外時間 |\n| **Micro Squat / Calf Raise** | 等升降機、刷牙時都可以做 |\n| **原則** | 將運動融入日常，反正都要做嘅事 |\n\n---\n\n### 三、Functional Strength（功能性力量）\n\n| 概念 | 說明 |\n|------|------|\n| **定義** | 只需要夠力carry自己體重 + 維持平衡 |\n| **重點** | 預防跌倒，而非追求大隻 |\n| **為什麼重要** | 跌一次，人生軌跡就完全不同 |\n| **目標** | Carry body weight + Maintain balance |\n\n---\n\n### 四、消防員體能標準參考\n\n| 項目 | 標準 |\n|------|------|\n| **Pull Up** | 只需要1下（最低標準） |\n| **Deep Pull Up** | 或者做3下deep pull up |\n| **男女標準** | 一樣，因為火係無情嘅 |\n| **Deep Bar Pull Up** | 比普通pull up更重要，省力避免biceps受傷 |\n\n---\n\n### 五、為什麼要建立肌肉\n\n| 原因 | 說明 |\n|------|------|\n| **Counterbalance自然衰老** | 30歲後肌肉開始流失 |\n| **對器官有好處** | 肌肉健康支撐整體身體 |\n| **Brown Fat Activation** | 配合秋冬溫度變化 |\n\n---\n\n*Lesson S3-05 Complete - Last updated: 2026-04-11*\n*Season 3 (Autumn) - Micro Muscle Training + Golden Timing + Functional Strength*\n\n---\n\n## Lesson S3-06 (Autumn Part 6) - 身體檢查解讀 + 戒煙機制 + 四大關鍵數字\n\n*Transcript日期：2025-11-18 | About Health Pro Season 3 第六堂*\n\n---\n\n### 一、秋冬Routine三寶\n\n| 項目 | 內容 |\n|------|------|\n| **168 / Fasting** | 肥Gene兩餐、瘦Gene可以吃早餐 |\n| **走路** | 飯前清肝糖、飯後防新脂肪形成 + Walk Under The Sun |\n| **低GI飲食** | 先 NO GI → 腩脂解決後 Moderate GI； Gluten Free + Fructose Free + 避啤酒 |\n\n---\n\n### 二、四大關鍵驗血數字\n\n| 數字 | 為什麼重要 |\n|------|-----------|\n| **Insulin Resistance（HOMA2）** | 慢性病最大推手 |\n| **LDL Size Estimation（HDL:TG比例）** | 心血管病最大推手 |\n| **Vitamin D** | 骨骼、免疫、肌肉、減脂都需要 |\n| **Liver Fat（肝臟脂肪）** | 直接反映胰島素敏感性和心血管風險 |\n\n---\n\n### 三、LDL Size vs LDL 數值\n\n| 概念 | 說明 |\n|------|------|\n| **怕咩** | 最怕係氧化咗嘅 Small Dense LDL |\n| **點樣睇** | 睇 HDL:Triglyceride 比例，唔係睇 LDL 數值 |\n| **原因** | Insulin Resistance 會令LDL變細變密 |\n\n---\n\n### 四、Uric Acid（尿酸）可以升唔跌\n\n| 情況 | 解釋 |\n|------|------|\n| **原因** | 脂肪細胞分解 → 裏面嘅遺傳物質（Purine）被回收 → 產生尿酸 |\n| **係好事** | 代表身體正在清除脂肪細胞入面嘅Junk |\n| **痛風減少** | 因為結晶喺關節入面嘅尿酸正在溶化緊 |\n\n---\n\n### 五、戒煙機制\n\n| 階段 | 說明 |\n|------|------|\n| **上癮前** | 尼古丁觸發多巴胺，好開心 |\n| **上癮後** | 身體為補償停了尼古丁受體，唔吸烟就先會周身唔舒服 |\n| **機制** | 吸烟係7秒嘅mini Fight-or-Flight response（緊急狀態→消失→身體以為解決咗，獎勵你） |\n\n---\n\n### 六、三日戒煙法\n\n| 方法 | 作用 |\n|------|------|\n| **Espresso** | 代替吸烟帶嚟嘅血壓↑心跳↑ |\n| **Squat + Push Up** | Bodyweight training補償壓力荷爾蒙改變 |\n| **Tributyrate** | 幫助好菌戰勝壞菌，減少情緒影響 |\n| **只需要三天** | 鼻嘅smell sensor恢復正常，你會聞到烟好臭 |\n\n---\n\n### 七、戒煙即時效果\n\n| 時間 | 效果 |\n|------|------|\n| **3日內** | 一氧化碳離開血液、Cilia（肺部清道夫）恢復功能 |\n| **長期** | 肺癌、心血管病風險大減 |\n\n---\n\n*Lesson S3-06 Complete - Last updated: 2026-04-11*\n*Season 3 (Autumn) - 身體檢查解讀 + 戒煙機制 + 四大關鍵數字*\n\n---\n\n## Lesson S3-07 (Autumn Part 7) - LDL深入分析 + 真正心血管風險因素 + 戒煙時間線\n\n*Transcript日期：2025-11-25 | About Health Pro Season 3 第七堂*\n\n---\n\n### 一、LDL-C 計算的問題\n\n| 問題 | 說明 |\n|------|------|\n| **50年前的shortcut** | 用formula計算，當Triglycerides低，LDL-C就會被人為抬高 |\n| **唔準確** | 可以差20-70mg/dL |\n| **真正要睇** | LDL粒子大小，唔係LDL數值 |\n\n---\n\n### 二、真正的敵人：Small Dense LDL（Pattern B）\n\n| 特性 | 為什麼危險 |\n|------|-----------|\n| **小粒** | 可以黏入血管壁傷口 |\n| **容易氧化** | 表面面積大，更易被氧化 |\n| **大粒（Pattern A）** | 太大，塞唔入血管 |\n\n---\n\n### 三、估計LDL大小的方法\n\n| 方法 | 標準 |\n|------|------|\n| **TG/HDL比例** | < 1 = Pattern A（理想）； > 2 = Pattern B（危險） |\n| **APOA1/APOB比例** | ≥ 2 = 最安全 |\n| **NMR技術** | 直接數LDL粒子數量同大小 |\n\n---\n\n### 四、CAC Score + CCTA\n\n| 測試 | 說明 |\n|------|------|\n| **CAC Score** | 無顯影CT scan，0-100分，睇血管硬化程度 |\n| **CCTA** | 要打顯影劑，真正睇邊條血管塞咗 |\n\n---\n\n### 五、十大心血管風險因素\n\n| 排名 | 因素 | 點解 |\n|------|------|------|\n| 1 | 高Triglycerides | 直接令LDL變細變密 |\n| 2 | 吸煙 | 直接氧化LDL |\n| 3 | 高血壓 | 血流如刀，磨走血管內皮 |\n| 4 | 二型糖尿病/胰島素阻抗 | 糖化LDL，令免疫系統當異物拉入血管壁 |\n| 5 | 慢性發炎（Gluten、A1奶） | 發炎令LDL氧化 + 整親血管 |\n| 6 | 內臟脂肪/肚腩 | 脂肪持續送去肝臟 |\n| 7 | EGFR < 60 | 腎功能差，血壓調節失效 |\n| 8 | 壓力/抑鬱 | 血壓飆升，Cortisol持續高位 |\n| 9 | 久坐 | 肌肉量少 |\n| 10 | 睡眠質素差 | 修復不足 |\n\n---\n\n### 六、戒煙後身體恢復時間線\n\n| 時間 | 變化 |\n|------|------|\n| **Day 1** | 尼古丁半衰期2小時，血液已清除99%尼古丁；一氧化碳下降 |\n| **Day 2** | Cilia開始郁動，清肺部焦油；味覺/嗅覺恢復 |\n| **Day 3** | Dopamine Receptor恢復；Smell Flip（聞到烟臭）；肺部細胞開始重生 |\n| **Day 4** | 血液循環改善；食物變好味 |\n| **Day 5** | 氣管放鬆 |\n| **Day 6** | 肺功能提升10-15% |\n| **Day 7** | Resting Heart Rate大減（-8至15下）；心血管風險大降 |\n\n---\n\n### 七、Lp(a) — 遺傳因素\n\n| 特性 | 說明 |\n|------|------|\n| **一生檢查一次就夠** | 基本上改變唔到 |\n| **Threshold** | 125 |\n| **起源** | 古代傷口止血嘅優勢 |\n| **現代問題** | 超級凝血能力 → 反而塞血管 |\n\n---\n\n*Lesson S3-07 Complete - Last updated: 2026-04-11*\n*Season 3 (Autumn) - LDL深入分析 + 真正心血管風險因素 + 戒煙時間線*\n\n---\n\n## Lesson S3-08 (Autumn Part 8) - 戒煙21日大腦重置 + Homocysteine Paradox + CVD真正風險\n\n*Transcript日期：2025-12-02 | About Health Pro Season 3 第八堂*\n\n---\n\n### 一、戒煙21日大腦重置（Brain Rewire Wonder）\n\n| 時間 | 變化 |\n|------|------|\n| **Day 1-3** | 尼古丁受體餓死，Down-regulate返正常水平 |\n| **Day 3 Smell Flip** | 聞到烟臭，大腦獎勵機制正常化 |\n| **Day 21** | 尼古丁受體完全正常化，大腦Rewire完成 |\n\n---\n\n### 二、BDNF（大腦肥料）恢復\n\n| 概念 | 說明 |\n|------|------|\n| **吸煙影響** | 尼古丁+一氧化碳+焦油 → 減少BDNF生產同接收 |\n| **戒煙後** | BDNF即時反彈，21日達到最高水平 |\n| **作用** | 大腦神經可塑性恢復，習慣更容易斷開 |\n\n---\n\n### 三、Homocysteine Paradox\n\n| 問題 | 解釋 |\n|------|------|\n| **什麼是高Homocysteine** | > 15 unit被視為高 |\n| **Quick Fix** | 食Active Form B6 + B9 + B12可以降低 |\n| **Paradox** | 降低咗Homocysteine，但心臟病發率冇顯著減少 |\n| **點解** | 以往幾十年嘅血管損傷唔會因為降呢個數就消失 |\n\n---\n\n### 四、Homocysteine點樣破壞血管\n\n| 方式 | 說明 |\n|------|------|\n| **破壞內皮** | 直接傷害血管內皮細胞 |\n| **氧化LDL** | 令Small Dense LDL更加容易被氧化 |\n| **增加凝血** | 血液更加Stickey，容易形成血栓 |\n| **發炎** | 喺血管壁引發發炎，加速硬化 |\n\n---\n\n### 五、Real Fix vs Quick Fix\n\n| 層次 | 做法 |\n|------|------|\n| **Quick Fix** | B6/B9/B12 + TMG將Homocysteine降 |\n| **Real Fix** | 同時間管理：高GI飲食、Seed Oil、吸煙、劣質睡眠呢四大問題 |\n| **原因** | 呢四樣嘢係不斷製造oxidized LDL同血管損傷，淨係降Homocysteine唔夠 |\n\n---\n\n### 六、TMG（Betaine）嘅作用\n\n| 概念 | 說明 |\n|------|------|\n| **原理** | TMG係一個Secondary Backdoor Enzyme，唔需要B9都可以將Homocysteine回收 |\n| **建議** | 如果係genetic factor導致高Homocysteine，喺B6/B9/B12基礎上加TMG |\n\n---\n\n### 七、CVD十大風險因素（重溫）\n\n| 排名 | 因素 | 狀態 |\n|------|------|------|\n| 1 | 高Triglycerides + Small Dense LDL | 已有改善 |\n| 2 | 吸煙 | 緊係戒咗 |\n| 3 | 高血壓 | 改善緊 |\n| 4 | 二型糖尿病/胰島素阻抗 | 改善緊 |\n| 5 | 慢性發炎（Gluten、A1奶） | 已開始管理 |\n| 6 | 內臟脂肪/肚腩 | 已有改善 |\n| 7 | 腎功能（EGFR < 60） | — |\n| 8 | 壓力/抑鬱/Cortisol | — |\n| 9 | 久坐 | — |\n| 10 | 劣質睡眠 | — |\n\n---\n\n### 八、Homocysteine高風險群組\n\n| 群組 | 說明 |\n|------|------|\n| **CT/D scan發現有blockage** | 已知係高風險 |\n| **多年吸煙史** | 已經有oxidized LDL黏喺血管壁 |\n| **重度飲酒** | 同樣累積多年損傷 |\n| **Lp(a)高（> 125）** | 遺傳性凝血能力強 |\n| **Genetic Factor** | MTHFR基因變異令B9處理較差 |\n\n---\n\n*Lesson S3-08 Complete - Last updated: 2026-04-11*\n*Season 3 (Autumn) - 戒煙21日大腦重置 + Homocysteine Paradox + CVD真正風險*\n\n---\n\n## Lesson S3-09 (Autumn Part 9) - 膳食膽固醇真相 + 蛋黃/蜆解毒迷 + 脂肪嘅Package效應 + LDL Quality Over Quantity\n\n*Transcript日期：2025-12-09 | About Health Pro Season 3 第九堂*\n\n---\n\n### 一、Homocysteine高 = 三個Disfunction\n\n| Disfunction | 說明 |\n|------|------|\n| **內皮受損** | 直接破壞血管內皮細胞 |\n| **甲基化問題** | Methylation dysfunction令Homocysteine recycling變差 |\n| **穀胱甘肽低** | L-Glutathione水平低，抗氧化能力弱 |\n\n---\n\n### 二、Lp(a) + Homocysteine兩樣都高 = 5-10倍CVD風險\n\n| 情況 | 解釋 |\n|------|------|\n| **兩樣都高** | 兩者有协同效应，心血管病風險比一般人高5-10倍 |\n| **Lp(a)** | 一生檢查一次就夠，基本上改變唔到 |\n| **Homocysteine** | 可以改變，係咪高風險群組決定檢查頻率 |\n\n---\n\n### 三、CVD管理四大要點\n\n| 要點 | 說明 |\n|------|------|\n| **戒煙** | 吸煙係喺身體引爆大量氧化 |\n| **空氣污染** | 汽車廢氣同吸煙嘅破壞力極端接近 |\n| **控制血壓** | Sleep同stress導致血壓spike，最傷血管 |\n| **Homocysteine管理** | B6/B9/B12 active form + TMG |\n\n---\n\n### 四、膽固醇嘅Package效應（膳食膽固醇 ≠ 血液膽固醇）\n\n| 誤解 | 真相 |\n|------|------|\n| **食膽固醇=血液膽固醇高** | 完全係誤會，身體有Homeostasis自我調節 |\n| **蜆膽固醇高=唔好** | 蜆有Non-cholesterol Steroid，會競爭吸收，反而減少膽固醇攝入 |\n| **蛋黃唔好** | 蛋黃包住嘅膽鹼(Choline)係特殊形式，能增加LDL receptor活性，令HDL更functional |\n\n---\n\n### 五、蛋黃嘅真正好處\n\n| 成分 | 作用 |\n|------|------|\n| **蝦青素** | 自然界最強抗氧化劑之一 |\n| **Marine Collagen** | 維持血管彈性 |\n| **葉黃素+玉米黃質** | 護眼，可以穿越血腦屏障 |\n| **Omega 3** | 抗發炎 |\n| **特殊膽鹼形式** | 增加HDL功能性，令LDL回收更effective |\n\n---\n\n### 六、煮蛋嘅問題\n\n| 問題 | 說明 |\n|------|------|\n| **用Seed Oil炒/煎** | 將所有好處變成壞處，Omega 3氧化 |\n| **Overcooked** | 營養熱敏感性成分被破壞 |\n| **最佳方法** | 半熟、流心蛋黃為目標 |\n\n---\n\n### 七、膳食脂肪（Meal Fat）嘅Package效應\n\n| 脂肪種類 | 效果 |\n|------|------|\n| **天然奶脂（cream、芝士、10%fat yogurt）** | 有MF（Milk Fat）包住，吸收慢，signal效應令LDL receptor更active |\n| **Butter** | 製造過程已經去除呢層MF，所以冇呢個效果 |\n| **短鏈脂肪酸（C4-C8）** | 直接轉化為能量（Ketone），唔係儲存為脂肪 |\n\n---\n\n### 八、LDL Quality Over Quantity（最大誤會）\n\n| 傳統睇法 | 最新睇法 |\n|------|------|\n| **LDL數值** | LDL Pattern（A = 大粒浮 vs B = 小粒密） |\n| **總膽固醇量** | Pattern A = metabolically neutral，唔塞血管 |\n| **佢汀藥原理** | 抑制HMG-CoA reductase，但天然膳食膽固醇攝入已經會natural減少肝臟製造 |\n\n---\n\n### 九、真正嘅敵人\n\n| 敵人 | 點解 |\n|------|------|\n| **Oxidized Small Dense LDL** | 係真正塞血管嘅元兇 |\n| **Pattern B LDL** | 小粒容易黐入血管傷口 |\n| **Glycation（糖化）** | 高血糖令LDL變得更易被免疫系統攻擊 |\n\n---\n\n### 十、TG/HDL比例估計LDL Pattern\n\n| 比例 | LDL Pattern |\n|------|------------|\n| **< 1** | Pattern A（大粒浮，最理想） |\n| **1-2** | 中間 |\n| **> 2** | Pattern B（小粒密，危險） |\n\n---\n\n*Lesson S3-09 Complete - Last updated: 2026-04-11*\n*Season 3 (Autumn) - 膳食膽固醇真相 + 蛋黃/蜆解毒迷 + 脂肪嘅Package效應 + LDL Quality Over Quantity*\n\n---\n\n## Lesson S3-10 (Autumn Part 10) - LDL神話破解 + Functional HDL + CVD協同風險 + Food Matrix + 三種肉類評估\n\n*Transcript日期：2026-04-15 | About Health Pro Season 3 第十堂*\n\n### 一、Disclaimer & Program原則\n\n| 要點 | 說明 |\n|------|------|\n| **非醫療建議** | Inspiration only，跟醫生討論Statins/LDL藥 |\n| **目標群體** | 30-50歲健康成人，器官亞健康 |\n| **個體差異** | Gene (肥瘦Gene、MTHFR、Lp(a)) + History (肝臟超重要) |\n\n### 二、Mindset轉變\n\n| 原則 | 內容 |\n|------|------|\n| **Open Mind** | 過去50年營養觀念被洗腦 |\n| **Full Commitment** | No quick fix，12週最快 |\n| **Combo & Synergy** | 慢性病係多因素協同，好壞皆可 |\n\n### 三、CVD真相：Multi-Factorial + Synergistic Risk\n\n**公式：Genetic Factors + Poor Environment + Triggering Agent (over time)**\n\n| 因素 | 例子 |\n|------|------|\n| **Genetic** | Lp(a)、Homocysteine高 |\n| **Environment** | 高GI、Seed Oil、吸煙 |\n| **Trigger** | 高血壓、氧化壓力 |\n\n**LDL角色：Neutral Particle**\n- Harmful only with endothelial damage + insulin resistance\n- Small Dense LDL易氧化\n\n### 四、真正管理目標：LDL Quality + Functional HDL\n\n| 指標 | 目標 |\n|------|------|\n| **Reduce** | Small Dense LDL (TG/HDL >2危險) |\n| **Improve** | Functional HDL (cholesterol efflux capacity，吸回膽固醇修復) |\n| **Non-Functional HDL** | Oxidized/Inflammatory，有害如oxLDL |\n\n### 五、Food Matrix效應\n- Whole food fat如time-release capsule，gut microbiome + bile決定吸收/排出。\n- 傳統calorie model錯（人唔係bunsen burner）。\n\n### 六、三種肉類（前提：無fatty liver + insulin sensitive）\n\n| 肉類 | 評估 |\n|------|------|\n| **魚** | Omega-3 kinked shape ↑ LDL receptor efficiency，中性→正面 |\n| **雞** | White meat，中性 |\n| **紅肉** | Condition OK，但監測 |\n\n*Lesson S3-10 Complete - Last updated: 2026-04-15*\n\n---\n\n## Lesson S3-11 (Autumn Part 11) - HDL功能提升 + Surf & Turf飲食 + Hepatic De Novo Lipogenesis + Small Dense LDL形成機制\n\n*Transcript日期：2026-04-15 | About Health Pro Season 3 第十一堂*\n\n### 一、Disclaimer\n\n| 要點 | 說明 |\n|------|------|\n| **Cutting Edge** | Lipid profile research，跟醫生諮詢 |\n| **目標群體** | 30-50歲，gene/history差異大 |\n\n### 二、Mindset\n\n| 原則 | 內容 |\n|------|------|\n| **Open Mind** | 衝突主流，potentially transformational |\n| **Book Standard** | 精選知識，花時間在值得地方 |\n| **Holistic** | 身體單一系統，seasonal factors |\n\n### 三、HDL優化\n\n| 來源 | 好處 |\n|------|------|\n| **魚 (Omega-3 DHA/EPA)** | ↑ Fluidity + anti-oxidant，reverse cholesterol transport ↑ |\n| **紅肉 (Stearic Acid)** | ↑ HDL數量 + cell membrane integrity |\n\n### 四、Surf & Turf Diet\n\n- **組合**：魚 + 紅肉 + Leafy greens + High-quality EVOO。\n- **好處**：HDL質/量↑，減post-meal oxidation，slow fat intake。\n\n### 五、Hepatic De Novo Lipogenesis（肝新生脂）\n\n**過程**：\n1. Excess carbs/fructose/alcohol → Liver TG (fatty liver)。\n2. Export via **VLDL** (TG/HDL比例反映)。\n3. CETP swap：VLDL-TG → LDL core。\n4. Hepatic lipase trim → **Small Dense LDL**（易氧化/滲血管）。\n\n### 六、Physics Fix\n\n| 行動 | 作用 |\n|------|------|\n| **Low GI + No Fructose/Alcohol** | 減liver fat input |\n| **Pre-meal Walk** | 清肝glycogen，減TG輸出 |\n| **Post-meal Walk** | 減blood glucose spike |\n| **Bodyweight Training** | ↑ Muscle uptake，offload liver fat |\n\n### 七、三大Biomarkers\n\n| 指標 | 目標 |\n|------|------|\n| **Liver Fat (CAP)** | 監測fatty liver |\n| **TG/HDL Ratio** | <1 = Pattern A（安全） |\n| **HOMA-IR** | Insulin sensitivity |\n\n*Lesson S3-11 Complete - Last updated: 2026-04-15*\n\n---\n\n## Lesson S3-12 (Autumn Part 12) - 肝臟核心角色 + Fatty Liver → VLDL Overproduction → Small Dense LDL + Dysfunctional HDL全圖解\n\n*Transcript日期：2026-04-15 | About Health Pro Season 3 第十二堂*\n\n### 一、Disclaimer\n\n| 要點 | 說明 |\n|------|------|\n| **非醫療** | Lipid/CVD諮詢醫生 |\n| **目標** | 30-50歲健康成人，gene/history差異 |\n\n### 二、Mindset\n\n| 原則 | 內容 |\n|------|------|\n| **Commitment** | 全投入transformational |\n| **Holistic** | 單系統，seasonal/age/gender fine-tune |\n| **No Quick Fix** | 最快lifelong habits |\n\n### 三、Liver Central to CVD\n\n| 機制 | 說明 |\n|------|------|\n| **Fatty Liver Supply Push** | ↑ APOB → VLDL overproduction（自救輸出TG） |\n| **IR Broken Brake** | Insulin失效，持續VLDL |\n| **Obesity Feedback** | Fat cells leak FFA → liver overload |\n\n### 四、VLDL → Harmful Lipoproteins\n\n**流程**：\n```\nFatty Liver + IR + High Carbs/Fruct/Alc\n↓ DNL → TG overload\nVLDL ↑ (TG-rich)\n↓ CETP Swap\nTG-rich LDL + Cholesterol-rich VLDL/IDL\n↓ Hepatic Lipase Trim\nSmall Dense LDL + Dysfunctional HDL\n```\n\n### 五、HDL受影響\n\nCETP swap TG入HDL → Hepatic lipase trim → HDL collapse（small/non-functional/excreted）。\n\n### 六、Size Comparison\n\n| Particle | Size (nm) | Role |\n|----------|-----------|------|\n| VLDL | 30-80 | TG transport |\n| IDL | 25-35 | Remnant (harmful excess) |\n| LDL (A) | 22-25 | Cholesterol transport |\n| HDL | <12 | RCT |\n| Small Dense LDL | <20 | Oxidizes easily |\n\n### 七、APOB\n\nTotal VLDL/IDL/LDL/HDL count（數目>質）。\n\n*Lesson S3-12 Complete - Last updated: 2026-04-15*\n\n---\n\n## Lesson S3-13 (Autumn Part 13) - CVD全解 + Oxidized Pattern B LDL → Soft/Hard Plaque + Management（口腔/內脂/NO/彈性）\n\n*Transcript日期：2026-04-15 | About Health Pro Season 3 第十三堂*\n\n### 一、Disclaimer\n\n| 要點 | 說明 |\n|------|------|\n| **Cutting Edge** | 非醫療，30-50歲健康成人諮醫 |\n\n### 二、Mindset\n\n| 原則 | 內容 |\n|------|------|\n| **Open Mind** | 對抗主流認知 |\n| **Holistic** | Cost/benefit分析，書本位學習 |\n| **No Guarantee** | Gene/history差異，action優先 |\n\n### 三、CVD機制\n\n| 要點 | 說明 |\n|------|------|\n| **Oxidized Pattern B** | 小粒易氧化（↑surface/↓VitE/長circulation/sticky） |\n| **Soft Plaque** | Time bomb（爆→clot→梗塞） |\n| **Hard Plaque** | Scar（窄/硬化，Pattern B版不穩易碎） |\n\n### 四、Calcium風險\n\n| 風險 | 解方 |\n|------|------|\n| **Supp + 高D3** | 亂鈣化（不穩plaque + 硬化） |\n| **Whole Food + K2** | Redirect骨/牙 |\n\n### 五、Stabilize Plaque\n\n| 方向 | 行動 |\n|------|------|\n| **↓Inflammation** | 口腔（低糖+刷/洗）、內脂減、低GI/ω3 |\n| **↑Flexibility** | NO（曬走+鼻呼吸）、膠原（蛋白+VitC） |\n| **↑Blood Flow** | Walk + bodyweight |\n\n### 六、Biomarkers\n\n| 指標 | 意義 |\n|------|------|\n| **APOB** | Total particles（數>質） |\n| **APOA1** | HDL particles（功能proxy） |\n| **HDL-C** | Cargo，非功能 |\n| **Eflux** | 清理力（TG/HDL proxy） |\n\n*Lesson S3-13 Complete - Last updated: 2026-04-15*\n\n---\n\n## Lesson S3-14 (Autumn Part 14-1) - NO保護血管 + HDL數量與功能 + CETP藥物失敗案例\n\n*Transcript日期：2026-04-15 | About Health Pro Season 3 第十四堂 Part 1*\n\n### 一、Disclaimer 與課程定位\n\n| 要點 | 說明 |\n|------|------|\n| **非醫療建議** | 以個人研究/經驗分享為主，唔代替醫療意見 |\n| **目標群組** | 30-50歲亞健康成年人 |\n| **差異因素** | 基因表達 + 過往健康歷史，結果可有明顯差異 |\n\n### 二、Mindset（延續）\n\n| 原則 | 內容 |\n|------|------|\n| **Open Mind + Realistic** | 接受新證據，同時理解改善需要時間 |\n| **No Quick Fix** | 反對即食式解決方案，重視長期行為改變 |\n| **Holistic Analysis** | 以成本/收益分析，唔只睇單一數字 |\n\n### 三、NO（Nitric Oxide）作為血管保護核心\n\n| 面向 | 重點 |\n|------|------|\n| **功能** | 幫助血管舒張、保護內皮、協助血壓穩定 |\n| **日常提升** | 鼻呼吸（特別睡覺時）、walk under the sun（皮膚曝曬） |\n| **口腔因素** | 口腔菌可參與 nitrate→NO；某些成分的漱口水過度使用或干擾路徑 |\n| **整體策略** | 戒煙 + 控糖 + 曬太陽行路，組合提升NO可用性 |\n\n### 四、血管傷痕（Past History）與內皮保護\n\n- 即使健康人士都可能有不同程度 plaque/血管內皮損傷。\n- **Hard plaque** 傾向反映彈性流失（鈣化/硬化），**Soft plaque** 清除後仍可能留 scar。\n- 因此重點唔係「零傷痕幻想」，而係持續保護內皮、減慢惡化。\n\n### 五、LDL重點：Particles > Content\n\n| 比較 | 含義 |\n|------|------|\n| **LDL-C（載量）** | 只反映載住幾多膽固醇，唔等於風險全貌 |\n| **LDL particles（數量/大小）** | 與血管壁碰撞機會、氧化風險更相關 |\n| **Pattern A vs B** | A較大粒、相對穩定；B較細密、較易氧化與滲入血管壁 |\n\n### 六、HDL重點：數量 + 功能（非只睇HDL-C）\n\n| 指標概念 | 意義 |\n|------|------|\n| **APOA1** | HDL粒子數量（「吸塵機數目」） |\n| **Eflux Capacity** | HDL帶走多餘膽固醇能力（「吸塵機功能」） |\n| **破壞路徑** | TG偏高時，會加速HDL功能受損與清除 |\n\n### 七、提升HDL策略（Part 1焦點）\n\n| 方向 | 操作 |\n|------|------|\n| **減少破壞** | 控制血糖與TG、餐後步行、bodyweight training |\n| **提供原料** | 高品質EVOO、fatty fish、蛋黃、綠葉菜 |\n| **代謝環境** | 168 fasting降低insulin波動，有利ApoA1生產效率 |\n\n### 八、藥物案例：CETP Inhibitor（Torcetrapib）\n\n| 現象 | 解讀 |\n|------|------|\n| **HDL-C數值上升** | Lab number表面改善 |\n| **臨床事件/死亡率上升** | 功能層面未改善，甚至惡化 |\n| **核心教訓** | 拉高指標 ≠ 真正降低心血管風險 |\n\n### 九、Part 1 核心結論\n\n1. 血管管理唔可以只睇 LDL-C，應優先關注粒子型態、TG/HDL proxy 與內皮健康。  \n2. NO維持（鼻呼吸 + 曬太陽步行）係高價值低成本策略。  \n3. HDL要同時追求「夠多」與「有功能」，而唔係單純堆高數字。  \n4. Lifestyle組合（飲食、步行、訓練、戒煙）比單點quick fix更可靠。\n\n*Lesson S3-14 Part 1 Complete - Last updated: 2026-04-15*\n\n---\n\n## Lesson S3-14 (Autumn Part 14-2) - LDL Production Cycle（Bad DNL vs Good Normal Pathway）+ LPL燃脂開關\n\n*Transcript日期：2026-04-15 | About Health Pro Season 3 第十四堂 Part 2*\n\n### 一、Part 2 核心框架：兩條 LDL Production 路\n\n| Cycle | 核心輸入 | 主要結果 |\n|------|------|------|\n| **Bad Cycle（Y / DNL）** | 高糖、高果糖、酒精 + 肝過載 | TG/VLDL失衡，偏向Small Dense LDL（Pattern B） |\n| **Good Cycle（H / Normal）** | Whole food + 健康脂肪 + 低TG環境 | VLDL負載較平衡，較不易推向Pattern B |\n\n### 二、Bad Production：DNL Pathway（由肝壓力驅動）\n\n| 階段 | 重點 |\n|------|------|\n| **Storage Check** | 肝糖庫/肝脂「滿倉」時，無法再安全儲存 |\n| **代償輸出** | 肝臟為自救，趕工輸出TG（VLDL overproduction） |\n| **下游轉化** | 經CETP + hepatic lipase修飾後，偏向small dense LDL |\n| **風險特徵** | 長期TG偏高 + 顆粒細密 + 易氧化 |\n\n### 三、蛋白質過量的補充機制（Part 2重點）\n\n- 蛋白質本來用於修復與建造，但**長期過量**時可經胺基酸轉糖（gluconeogenesis）。\n- 若肝臟清空不足/胰島素阻抗未改善，該路徑可再流向DNL，最終同樣推高small dense LDL風險。\n- 實務上重點是 **optimal protein**，唔係盲目加量。\n\n### 四、Good Production：正常路徑（以能源運輸為主）\n\n| 階段 | 重點 |\n|------|------|\n| **腸道打包** | 健康膳食脂肪先形成 chylomicrons |\n| **先供周邊** | 可先供肌肉作即時能量（bypass liver first pass） |\n| **剩餘回肝** | remnants回肝後再包裝，屬較平衡負載 |\n| **最終特徵** | VLDL大小/組成較合理，偏向正常代謝路徑 |\n\n### 五、同樣是VLDL，點解好壞差好遠\n\n| 類型 | 特徵 |\n|------|------|\n| **Bad VLDL** | 趕工輸出、TG比例過高、屬毒性壓力下的應急物流 |\n| **Good VLDL** | 平衡負載、偏向能量運輸（not storage-driven） |\n\n### 六、LPL（Lipoprotein Lipase）係 Part 2 關鍵開關\n\n| 條件 | 作用 |\n|------|------|\n| **低糖狀態 + 有活動/肌訓** | 激活肌肉端LPL |\n| **VLDL經過肌肉微循環** | LPL更有效拆TG供肌肉燃燒 |\n| **代謝結果** | 提升脂肪利用效率、減少惡性TG堆積、較易維持lean |\n\n### 七、Part 2 行動要點（可操作）\n\n1. 先壓低TG：控糖、控果糖、控酒精、避超加工食品。  \n2. 餐前行路/日常活動，提升肝糖清空機會。  \n3. 加入肌肉訓練，提高LPL介導的脂肪利用。  \n4. 蛋白質採用optimal策略，避免「過量→轉糖→DNL」回路。\n\n### 八、Part 2 結論\n\n- LDL風險唔係單看數值，而係由**生產路徑**決定質量。  \n- 關鍵在於由「肝壓力驅動的DNL壞路」轉向「低TG + 活動驅動的正常路」。  \n- 飲食質素、活動時機、肌肉需求三者協同，先可以長期維持較健康的lipoprotein profile。\n\n*Lesson S3-14 Part 2 Complete - Last updated: 2026-04-15*\n\n---\n\n## Lesson S3-14 (Autumn Part 14-3) - Class Shift（Pattern B → Pattern A）+ VLDL分流機制 + Walking/Bodyweight全日策略\n\n*Transcript日期：2026-04-15 | About Health Pro Season 3 第十四堂 Part 3*\n\n### 一、Part 3 核心：由機制到落地策略\n\n| 重點 | 說明 |\n|------|------|\n| **Class Shift目標** | 將LDL生成路徑由Pattern B轉向Pattern A |\n| **主軸** | 先改善VLDL去向（TG被肌肉吸收），再避免壞交換/過度修剪 |\n| **方法論** | Combo + Synergy（步行、站立微活動、肌訓） |\n\n### 二、VLDL/IDL 分流：A Pathway vs B Pathway\n\n| 路徑 | 機制特徵 | 結果 |\n|------|------|------|\n| **Pattern A Pathway（較理想）** | LPL先清走VLDL內TG，保留較完整cholesterol core；HL偏向「拋光式」微調 | 形成較穩定IDL，再轉為較大粒LDL（Pattern A） |\n| **Pattern B Pathway（高風險）** | TG-rich狀態下CETP swap活躍，之後HL過度trim（surface + core） | IDL不穩定，最終small dense LDL（Pattern B） |\n\n### 三、三個關鍵酵素角色（Part 3重溫）\n\n| 酵素 | 功能 | 風險/重點 |\n|------|------|------|\n| **LPL (Lipoprotein Lipase)** | 拆解VLDL內TG供肌肉利用 | 活動不足時，TG去向不理想 |\n| **CETP** | 促進脂質交換（swap） | TG-rich環境下易推向不利交換 |\n| **HL (Hepatic Lipase)** | 對IDL/LDL進行修整 | TG-rich IDL時可能過度trim，推向Pattern B |\n\n### 四、Class Shift要同時滿足兩件事（缺一不可）\n\n1. **避免壞路徑輸入**：減少高糖/高果糖/酒精/超加工觸發的壓力。  \n2. **提供肌肉TG去向**：讓肌肉「有需求」去uptake TG（行路 + 訓練 + 低糖環境）。\n\n### 五、Walking Magic（全日代謝流設計）\n\n| 時段/場景 | 操作 | 生理目的 |\n|------|------|------|\n| **飯前** | 行路 | 清肝糖、令肌肉進入更高燃料需求狀態 |\n| **飯後** | 行路/站立/微活動 | 壓低血糖波動，增加TG被肌肉利用機會 |\n| **工作日中段** | Lunch前後行 + 站立工作 | 打斷久坐，維持被動代謝流 |\n| **晚間** | Bodyweight training | 補足步行覆蓋不到的肌群，提升TG/glucose uptake |\n\n### 六、Part 3 的系統結論\n\n| 層面 | 結論 |\n|------|------|\n| **機制層** | LDL粒徑取決於前段VLDL/IDL處理質量，唔係單看最終數字 |\n| **行為層** | 步行（前後餐）+ 站立微活動 + 晚上肌訓 = 可持續的代謝協同 |\n| **風險管理層** | 透過Class Shift提升Pattern A佔比、減少Pattern B生成 |\n\n### 七、Part 3 行動重點（簡版）\n\n- 日內固定「飯前 + 飯後」步行節奏。  \n- 工作時段盡量站立與微活動，避免長時間坐住。  \n- 晚上加入bodyweight訓練，提升肌肉端LPL需求。  \n- 飲食繼續避開高糖/超加工，減少推向B路徑的驅動。\n\n*Lesson S3-14 Part 3 Complete - Last updated: 2026-04-15*\n\n---\n\n## Lesson S3-15 (Season 3 Finale) - 雙燃料模型總結 + LMHR解讀 + 風險判讀三個Missing Pieces\n\n*Transcript日期：2026-04-15 | About Health Pro Season 3 第十五堂（Season 3 最後一堂）*\n\n### 一、Disclaimer 與收官定位\n\n| 要點 | 說明 |\n|------|------|\n| **非醫療建議** | 課程屬個人研究/經驗分享，唔代替醫療意見 |\n| **目標對象** | 主要面向30-50歲健康/亞健康成年人 |\n| **個體差異** | 基因、過往病史、精神壓力、生活模式均會影響結果 |\n| **核心態度** | 開放但務實，重視長期承諾，拒絕quick fix |\n\n### 二、Season 3 核心總結：先分代謝狀態，再解讀數字\n\n| 狀態 | 代謝特徵 | LDL/TG意義 |\n|------|------|------|\n| **Metabolic Dysfunction**（IR + 脂肪肝） | 肝臟因過載而「排壓式」輸出TG，唔係正常能量需求 | 易經CETP bad trade + HL over-trim，走向small dense LDL（Pattern B） |\n| **Metabolically Healthy / Lean**（含低碳適應） | 肌肉LPL uptake有效、TG流向周邊利用 | LDL可升但多屬能量運輸適應，較傾向Pattern A |\n\n### 三、Dual Energy Model（Glucose + Fat）收官重溫\n\n| 概念 | 重點 |\n|------|------|\n| **雙燃料設計** | 人體可在glucose與fat之間切換 |\n| **現代困局** | 長期高碳/高糖令大多數人鎖在glucose mode |\n| **轉軌條件** | low-carb + 活動 + 肌肉需求上升，有助轉向lipid energy model |\n| **化驗解讀** | 若已轉軌，VLDL/LDL數字可能與傳統人群reference fundamentally不同 |\n\n### 四、LMHR（Lean Mass Hyper-Responder）框架\n\n| 指標傾向 | 可能含義 |\n|------|------|\n| **TG極低（常見<1）** | 胰島素敏感度較高、TG周轉效率高 |\n| **LDL-C / APOB可偏高甚至sky-high** | 反映脂肪運輸traffic高，未必等於壞路徑 |\n| **TG/HDL比例佳** | 常見較有利pattern指標 |\n| **重點提醒** | Risk factor ≠ 實際風險事件，必須看完整風險拼圖 |\n\n### 五、風險判讀三個 Missing Pieces（Final核心）\n\n| Missing Piece | 為何重要 | 觀察方向 |\n|------|------|------|\n| **1) Inflammation** | 發炎會增加血管壁黏性與氧化風險 | hs-CRP（非完美但可作警示）、生活壓力與恢復狀態 |\n| **2) Past History / Plaque Burden** | 舊有soft plaque可成為新風險基座 | 既往病史、影像檢查脈絡、長期趨勢 |\n| **3) Oxidation Load** | 氧化LDL先係真正高危步驟之一 | 吸煙、空污、高糖/高Omega-6、久坐、睡眠不足、慢性痛/壓力 |\n\n### 六、Lifestyle 收官策略（由數字管理轉向路徑管理）\n\n1. **餐前/餐後步行**：降低血糖波動，創造肌肉對TG的需求位。  \n2. **站立 + 微活動**：打斷久坐，持續改善代謝流。  \n3. **Bodyweight training**：補足走路不足的肌群刺激，提高LPL相關利用效率。  \n4. **飲食控炎**：減糖、避超加工、控制高Omega-6來源、維持高品質原型食物。  \n5. **恢復管理**：睡眠（特別deep sleep）、壓力管理、減少慢性炎症來源。\n\n### 七、Ketone 安全澄清（重要）\n\n| 情況 | 解讀 |\n|------|------|\n| **低血糖 + 有ketone** | 可屬脂肪代謝運作中的生理現象，唔等同危急 |\n| **極高血糖 + 高ketone + 酸中毒徵象** | 才接近真正醫療急症（DKA情境） |\n| **判讀原則** | 睇臨床組合與整體狀態，唔好單一指標恐慌 |\n\n### 八、Season 3 Finale 結論\n\n- 健康管理要由「追單一數字」升級到「管理代謝路徑與風險上下文」。  \n- LDL/TG/HDL/APOB必須放入：**代謝狀態 + 發炎 + 氧化 + 過往病史** 一齊判讀。  \n- Season 3 最重要成果：建立一套可持續的生活節奏（飲食 + 行路 + 肌訓 + 睡眠 + 壓力管理），長期將路徑推向較健康方向。\n\n*Lesson S3-15 Complete - Last updated: 2026-04-15*\n"}, {"file": "wealth-season1.md", "title": "Wealth Season1", "markdown": "# Wealth Season 1 — Lesson 1 Part 1（財富課程）\n\n## 課程簡介\n\n**Course Name**: Judgment & Decision Making Programme\n**Focus**: Financial, Career, Interpersonal decisions\n**Context**: 接续 Health Programme（已涵蓋 A-syn gene mismatch、慢性病等概念）\n\n---\n\n## 核心基石\n\n> **人類做最高質量 decision/judgment 時，極度依賴 biological system。**\n> 這是整個 Wealth Judgment Program 的最重要基石之一。\n\n---\n\n## 三大神經化學系統\n\n| 系統 | 功能 | 比喻 |\n|------|------|------|\n| **Prefrontal Cortex** | Rational you、evaluate risk vs reward、override impulse、think long term | 理性決策者 |\n| **Dopamine Circuit** | Reward 指南針、drive你去拎野、assign value | 動機引擎 |\n| **Serotonin** | Caution signal、process負面結果、calibrate fear、決定何時retreat | 恐懼系統 |\n\n### 三者協作\nDopamine（greed/drive）+ Serotonin（fear）→ Prefrontal Cortex（整合）→ Decision / Action\n\n---\n\n## Three-Self Discrepancy（三自我落差）\n\n| Self | 定義 |\n|------|------|\n| **Perceived Self** | 你點看你自己（Who I believe I am）|\n| **Actual Self** | 你的 biology（你 actual 做咩）|\n| **Observed Self** | 人地點睇你 |\n\n### 兩大層次 Discrepancy\n\n**First Layer**：Perceived self vs Actual self\n- 最受 environmental + gene mismatch 影響\n- 好難睇到，因為你真心相信你perceived嘅自己\n\n**Key Insight**：\n> **\"I am not the person I think I am\"**\n> **\"I am the person my neurochemistry permits me to be\"**\n> **\"Even your thoughts are biological actions\"**\n\n→ 如果你 neurochemical system 被 miscalibrated，你諗出嚟嘅自己唔會係真正嘅你\n\n---\n\n## Dopamine System（Reward Compass）\n\n### 受損因素（三大成癮）\n\n1. **果糖上癮（Fructose）**\n   - 最強烈例子之一\n   - 不斷drive大腦搵更多果糖\n   - Fructose無處不在 → 史前人類係seasonal先有，而家year-round供應\n\n2. **Gluten**\n   - 現代gluten消化後，peptide behaves almost like morphine\n   - 穿過血腦屏障，影響dopamine receptor\n   - Gluten上癮係真實存在\n\n3. **Smartphone / Shorts（短視頻）**\n   - 所有smartphone apps都設計成上癮\n   - Shorts係最差嘅\n   - 果糖/Gluten上癮者極大機會都係手機上癮\n\n### 三者共鳴（果糖+Gluten+Shorts）\n- 超加工食物全部包含呢三樣嘢，生產商明知容易上癮但照用\n- 三者聯手 → dopamine system **desensitized**\n\n### Desensitized 後果\n- 對人生重要gains assign唔到適當value\n- 導致：想要更多、繼續沉淪、degrade\n- 最終：input差（dopamine signalcompromised）→ output更差（decision not optimized）\n- 惡性循環：bad input → bad output → worse input → ...\n\n---\n\n## Serotonin System（Caution Signal）\n\n### 生成位置\n- 90%+ serotonin喺腸道生成\n- 好driven by你食咩\n\n### 受損機制\n1. 腸道發炎/腸漏\n2. Tryptophan原本去serotonin pathway，被hack去neurotoxin pathway\n3. 這是進化留低嘅機制：讓大腦知道環境危險\n\n### 受損後果\n- Anxiety\n- Fear\n- Molecular level：我們不自知\n\n> **你想到幾遠都好，最basic都係透過judgment去做decisions。如果三大system都一塌糊塗，點樣落去？**\n\n---\n\n## Program 結構（四大部分）\n\n| Section | 時間 | 重點 |\n|---------|------|------|\n| **S1** | 春季（2/3） | Set same page（打穩根基） |\n| **S2** | 夏季+春季尾 | Same language（建立共同語言）— **最重要** |\n| **S3** | 秋季至初冬 | Another layer（需要預先build好brain/gut） |\n| **S4** | Finale | 2027年3月16日晚9點，佔整個program重要性**超過八成** |\n\n> S4 Finale 之前，繼續旅程就可以，因為到時先係真正開始。\n\n---\n\n## Program 設計原則\n\n### Start from Scratch\n- 由最basics學起\n- 將以前你以為學咗嘅嘢，全部忘記佢\n- Judgment係畫鬼腳形式，層層推進\n\n### Be Mindful of Gut and Brain\n- 你嘅gut同brain對judgment嘅影響，遠超你想像\n\n### Complete Honesty to Yourself\n- 人貴自知，但呢個自知大部分人類都無\n- 透過呢個旅程，去尋找自知\n\n### Program is Flat\n- 所有人都同一陣線，冇人係ahead\n- No unauthorized proper discussion（害人害己）\n- 需要strong brain and gut先可以上另一個layer\n\n### Biology Sync\n- S3之前有半年時間，biology要同步進步\n- 如果身體未optimize，decision judgment會受影響\n\n---\n\n## Highest Stakes Decision = Survival（生存）\n\n### 生存的演化層次\n1. **Day-to-day survival**（過到嗰晚）— 現代人類問題不大\n2. **生殖 reproduction** — 需要同人合作 → relationship domain\n3. **Career** — 共同建立嘢\n4. **Wealth** — 儲起resources\n\n### 四大人「本」\n> **About Judgment Program is about the highest stakes decision making**\n- 用身體的 survival 生存\n- 用 DNA 的 survival 生殖\n- **我們生存是為了：thrive / to seek true happiness**\n\n---\n\n## 人生四大範疇（Four Capitals）\n\n| Capital | 說明 |\n|---------|------|\n| **Health** | 最接近可以自己搞掂自己 |\n| **Wealth** | 儲起resources |\n| **Relationship** | 有性繁殖需要合作 |\n| **Career** | 任何為共同目標建立嘅嘢（闊義：唔限於有薪工作）|\n\n### 核心目標\n> **True Happiness = Good Balance of Four Capitals**\n- 四者 interrelated，everything is interconnected\n- Health同另外三者關係極大\n- Wealth、Relationship、Career之間關係 > 你想像\n\n---\n\n## Financial Resources 角度（財富角度）\n\n### 兩個最大concern\n1. **點樣唔好失去**\n   - Market係人與人競爭\n   - 容易有極大陷阱，被rip off\n2. **Inflation蠶食**\n   - 短睇冇感覺，長睇影響大\n\n### Wealth Progress階梯\n1. 累積基本resources\n2. 基本退休夠用\n3. 舒適退休（取決於累積幾多）\n4. **SAMI Early Retirement**（將手停口停日子推前）\n   - 注意：唔代表唔做嘢\n   - 繼續建立嘢，唔係為錢\n\n### 健康與財富關係\n- 健康optimize → 更長壽命 → 需要更多retirement resources\n- 健康optimize令你有更清晰brain → decision quality提升\n\n---\n\n## 關於意外橫財\n\n> **無論點樣得到（speculation、lottery、遺產、甚至時間），未prepare好之前，突然有一筆意外資金，你都幾大機會會蠶食另外三個forms of wealth。**\n\n事實證明：絕大部分人都keep唔到。\n\n---\n\n## Program唔係乜\n\n1. **唔係 passive income** — 唔使做就有\n2. **唔係 speculation** — 炒股/炒股投機\n3. **唔係跟风流行** — 呢排流行乜就係乜\n4. **唔係一陣時又做一陣時唔做**\n5. **係 build lifelong judgment principles**\n\n---\n\n## 第一份功課\n\n- **形式**：一條A/B選擇題\n- **時間**：星期二早上之前提交\n- **地點**：Telegram channel released\n- **特點**：完全匿名（唔需要擔心別人知你揀咩）\n- **目的**：你需要completely honest to yourself\n\n> 答完就忘記佢，move on。Anchor本身係第一大人性缺點。\n\n---\n\n## Key Takeaways\n\n1. **Decision Quality 直接受制於 Biology**\n   - 越重要嘅decisions，越driven by biological system\n\n2. **Gene-Environment Mismatch**\n   - A-syn gene optimized for stable earth environment\n   - 過去幾十年食物急劇轉變 + smartphone出現\n   - 呢個mismatch令身體compromised，進而影響decision judgment\n\n3. **Miscalibration 的惡性循環**\n   - Bad input → Bad signal → Bad Decision → Bad outcome → Worse input → ...\n\n4. **所有嘢都係Signal-Driven**\n   - About Health話你身體run by signal\n   - About Judgment同樣告訴你很多嘢都run by signal\n\n5. **自知之明係最難**\n   - Program is flat：所有人同一陣線\n   - 完全對自己誠實，係旅程嘅核心要求\n\n6. **四.capitals互聯**\n   - Health、Wealth、Relationship、Career\n   - Optimize呢樣嗰樣會影響其他三個\n   - Everything is interconnected\n\n---\n\n## 相關議題（待續）\n\n- First layer discrepancy 點解影響 decision\n- Prefrontal Cortex點樣被conceived stress影響\n- 點樣optimize呢三個system\n- Second layer discrepancy（較long term先見到）\n- SAMI early retirement具體點做\n- Four capitals喺實際層面點樣balance\n\n---\n\n## Health is Primary Capital\n\n> **Health = Gut + Brain + Choice of Food**\n\n- 你嘅gut、brain、食物選擇，喺你不自知的情況下 shape 你嘅decisions\n- Decisions define 你嘅人生\n- 所以optimize health就係optimize judgment嘅基礎\n\n---\n\n## Wealth 定義與結構\n\n### 點解人類需要Wealth\n\n- 人類係唯一唔係手停口停嘅生物（除咗寵物/動物園）\n- 其他動物：搵唔到食就死\n- 人類進化到：income唔需要停，淨返嘅可以儲起\n\n### 核心公式\n```\nIncome > Spending → Savings = Wealth（用錢/資產形式储存）\n```\n\n### Production & Expenditure Mismatch\n- 你而家賺的錢，係為咗將來mismatch階段用\n- 退休之後冇主動income，靠之前儲起的wealth維生\n- Longer life expectancy = 更長的mismatch period\n- 發達地區平均80幾歲，60幾歲退休 → 約20年mismatch要cover\n\n---\n\n## Wealth 五個層次（Progress階梯）\n\n| Level | 目標 | 說明 |\n|-------|------|------|\n| **Level 1** | Get a job | 有工作，cover最basic daily expense |\n| **Level 2** | Get a good job |人工高一點，daily expense + some comfort |\n| **Level 3** | Savings + proper storage | 基本的retirement | \n| **Level 4** | Comfortable retirement | 退休生活水平同退休前差不多 |\n| **Level 5** | SAMI Early Retirement | 將手停口停日子推前（但唔代表唔做嘢）|\n\n> **重點**：Career is as important as wealth\n> - 好多人覺得搵夠錢就唔需要做，但其實retirement係靠你之前累積嘅wealth\n> - 你需要工作decades去sustaining你自己\n\n---\n\n## 消費五大範疇\n\n| 範疇 | 說明 |\n|------|------|\n| **醫** | Healthcare |\n| **食** | Food（最不值得慳）|\n| **住** | Shelter |\n| **行** | Transport + 非食物item |\n| **玩** | Entertainment + Education + 任何令你self-worth感觉良好的方法 |\n\n### Food關鍵點\n- Whole food只會愈來愈貴（跑贏通脹）\n- 愈來愈多人會發現真相，能夠負擔嘅自然會吃更多\n- 我哋嘅hardware係design去食whole food\n\n---\n\n## Wealth 三個層次（Portfolio Level）\n\n| Level | 目標 | 關鍵概念 |\n|-------|------|----------|\n| **Level 1** | Nominal Return ≥ 0 | Portfolio-wise唔好輸（唔好虧本）|\n| **Level 2** | Real Return ≥ 0 | Compensate通脹（for a few decades角度）|\n| **Level 3** | Real Return consistently > 0 | Enjoy經濟增長 |\n| **+1 Level 4** | Exceptional Real Return once in a while | 要sequence，先掌握前三個先有意義 |\n\n### 重要提醒\n- **2%通脹 = 5%回報呢個概念係陷阱**：要用幾十年角度睇先岩\n- 第三個層次要**consistently**先有意義：今年得明年唔得後年又得 = 冇意思\n- Level 4（Exceptional return）可以係陷阱，唔好太excited\n- **It only happens meaningfully in sequence**：要先掌握normal return > 0、real return > 0、real return consistently > 0，先可以增加去到Level 4嘅機會\n\n---\n\n## 成功六個Keys\n\n| Key | 說明 |\n|-----|------|\n| **Key 1** | Build upon health optimization（之前的Health program係因果關係）|\n| **Key 2** | Regular income（與market/其他人/金融市場無關）— 有份工，保持夠長 |\n| **Key 3** | 只可以follow timing，冇人可以create timing |\n| **Key 4** | 徹底認識自己的真我（three self fallacy）— 人生最難的事之一 |\n| **Key 5** | **Extend** yourself |\n| **Key 6** | **Expand** yourself |\n\n---\n\n## Extend vs Expand\n\n| 概念 | 對應 | 說明 |\n|------|------|------|\n| **Extend** | **Approach** | 喺而家嘅基礎上向外擴展，去approach機會 |\n| **Expand** | **Secure** | 去到你有可能去到最遠嘅層次，secure你嘅成果 |\n\n### Approach + Secure\n- **Approach**：你有方法去approach呢個機會\n- **Secure**：同一時間要有方法去secure佢（今日得唔代表30年後都得）\n- Extend和Expand正正就係對應呢兩樣嘢\n\n> **將來（第63堂 S4 Finale）會解釋：如何將Extend和Expand發揮到淋漓盡致**\n\n---\n\n## Lesson 2 額外重點\n\n- **人生有幾十個大decisions**：define得好與差，對人生影響極大\n- **Highest decisions**：包括財務、關係、人生伴侶等\n- **消費觀念**：optimal consumption唔係極大化，係optimal（今日vs將來 balance）\n- **Unlearn and Relearn**：學得thorough需要經過呢個過程\n\n---\n\n*Last updated: 2026-04-16*\n*Source: S1L1P1 + S1L1P2 + S1L2P1 transcripts*"}];
    const PASSWORD_HASH = "62484e22a6a5ade1ba25cb1b7c55c4b8861de24caddab73c9409742734008b26";

    const gate = document.getElementById('gate');
    const app = document.getElementById('app');
    const passwordInput = document.getElementById('passwordInput');
    const unlockBtn = document.getElementById('unlockBtn');
    const clearBtn = document.getElementById('clearBtn');
    const errorMsg = document.getElementById('errorMsg');

    const toc = document.getElementById('toc');
    const content = document.getElementById('content');
    const searchBox = document.getElementById('searchBox');
    const copyBtn = document.getElementById('copyBtn');

    let currentIndex = 0;
    let allCourses = [];

    function hex(buffer) {
      return [...new Uint8Array(buffer)].map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function sha256(str) {
      const enc = new TextEncoder();
      const data = enc.encode(str);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return hex(digest);
    }

    function renderTOC() {
      toc.innerHTML = '<h3 style="margin-top:0">課程清單</h3>' + allCourses.map((c, i) =>
        `<a href="#" data-i="${i}">${c.file}</a>`
      ).join('');
      toc.querySelectorAll('a[data-i]').forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          currentIndex = Number(a.dataset.i);
          renderContent();
        });
      });
    }

    function renderContent() {
      const c = allCourses[currentIndex];
      const q = (searchBox.value || '').trim().toLowerCase();
      let md = c.markdown;

      if (q) {
        // simple highlight in markdown source before render
        const safeQ = q.replace(/[\^$.*+?()[\]|]/g, '\$&');
        const re = new RegExp(safeQ, 'gi');
        md = md.replace(re, m => `==${m}==`);
      }

      content.innerHTML = `<div class="meta" style="margin-bottom:8px">${c.file}</div>` + marked.parse(md, { breaks: true });
    }

    async function unlock() {
      const pass = passwordInput.value;
      if (!pass) {
        errorMsg.textContent = '請輸入密碼';
        return;
      }
      const h = await sha256(pass);
      if (h === PASSWORD_HASH) {
        sessionStorage.setItem('healthDashboardUnlocked', '1');
        gate.classList.add('hidden');
        app.classList.remove('hidden');
        sortCourses();
        renderTOC();
        renderContent();
        errorMsg.textContent = '';
      } else {
        errorMsg.textContent = '密碼唔正確，請再試。';
      }
    }

    function sortCourses() {
      const categoryOrder = {health: 0, wealth: 1};
      allCourses = [...COURSES].sort((a, b) => {
        const ma = a.file.match(/^(health|wealth)-season(\d+)\.md$/);
        const mb = b.file.match(/^(health|wealth)-season(\d+)\.md$/);
        if (!ma || !mb) return 0;
        const ca = categoryOrder[ma[1]] ?? 9;
        const cb = categoryOrder[mb[1]] ?? 9;
        if (ca !== cb) return ca - cb;
        return parseInt(ma[2]) - parseInt(mb[2]);
      });
    }

    function init() {
      unlockBtn.addEventListener('click', unlock);
      clearBtn.addEventListener('click', () => { passwordInput.value = ''; errorMsg.textContent = ''; passwordInput.focus(); });
      passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') unlock(); });
      searchBox.addEventListener('input', renderContent);
      copyBtn.addEventListener('click', async () => {
        const c = allCourses[currentIndex];
        try {
          await navigator.clipboard.writeText(c.markdown);
          copyBtn.textContent = '已複製';
          setTimeout(() => copyBtn.textContent = '複製目前課程純文字', 1200);
        } catch (e) {
          alert('複製失敗，請手動複製。');
        }
      });

      if (sessionStorage.getItem('healthDashboardUnlocked') === '1') {
        gate.classList.add('hidden');
        app.classList.remove('hidden');
        sortCourses();
        renderTOC();
        renderContent();
      } else {
        passwordInput.focus();
      }
    }

    init();
  </script>
