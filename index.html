    const COURSES = [{"file": "health-season1.md", "title": "Health Season1", "markdown": "# Health Knowledge Base\n\n*Created: 2026-02-04*\n*Course: 健康萬象第1課 (Part 1)*\n\n---\n\n## Instructions for Use\n\nThis file contains health knowledge and guidelines. When answering health-related questions, use this knowledge base as reference while always emphasizing the importance of consulting medical professionals for proper diagnosis and treatment.\n\n---\n\n## Course Overview\n\n**健康萬象第1課 - 核心概念**\n\n### 重要聲明\n- 授課者**不是醫生**，不提供醫療建議\n- 這是**個人經驗分享**，基於2010-2020年的研究\n- 2022年徹底整合的知識體系\n- 講師相信部分內容**領先世界20年**\n- 成功率高達**98%以上**（只要跟著做）\n\n### 適合對象\n- ✅ 30-50歲健康人士\n- ✅ 未確診慢性病的人\n- ⚠️ 有慢性病者：必須先諮詢醫生（可能需要調整藥物）\n- ⚠️ 課程內容可能與現有醫療建議有衝突\n\n### 課程結構\n- **13堂課**（完整知識需要全部上完）\n- **12星期**為一週期\n- **不要跳級**（每課有設計，順序很重要）\n- **溫習很重要**（建議聽4-5次，每次有新領悟）\n\n---\n\n## 核心概念（一）\n\n### 1. 卡路里迷思\n- ❌ 「卡路里入，卡路里出」理論**完全錯誤**\n- 原因：人體不是燃料爐\n- 真正的關鍵是**荷爾蒙（激素）**\n- 荷爾蒙是身體的**Signal（信號）**，控制整體運作\n\n### 2. 進化Mismatch（錯配）\n- 人類進化了**200萬年**適應環境\n- 過去**40-50年**環境急劇變化\n- 我們的**DNA與現代生活嚴重不匹配**\n- 這是慢性病激增的根本原因\n\n### 3. 兩大轉捩點\n\n| 年份 | 事件 | 影響 |\n|------|------|------|\n| **1957** | 高果糖玉米糖漿發明 | 糖變得極便宜 |\n| **1980** | 食物金字塔推出 | 飲食建議大改變 |\n| **1980後** | 肥胖率激增 | 慢性病爆發 |\n\n### 4. 加工食物問題\n- **原型食物**（Real Food）vs **加工食物**（Processed Food）\n- 加工食物不是不能吃，但身體反應會**很不一樣**\n- 慢性毒素慢慢累積，影響身體功能\n- 現代食物環境與遠古DNA不匹配\n\n---\n\n## 學習態度\n\n### 必須記住\n1. **不要跳課**（13課是完整拼圖）\n2. **立即行動**（不要想太多，做12星期）\n3. **堅持12星期**\n4. **Action比理論重要**\n5. **自己決定，自己負責**\n\n### 講師風格\n- 理據強，有完整設計\n- 說話直接，不會與人爭辯\n- 強調每個人有少許不同\n- 建議開放心态，不要先入為主\n\n---\n\n## Lesson 1 Part 2 - 進階概念\n\n### 4. 胰島素 (Insulin) - 最重要的荷爾蒙\n\n#### 胰島素的作用\n- 將血糖推進細胞作為燃料\n- 過多糖分 → 過多胰島素分泌\n- 長期高水平胰島素 → 細胞產生「胰島素阻抗」\n\n#### 胰島素阻抗 (Insulin Resistance)\n- 細胞拒絕吸收糖分\n- 身體被迫分泌更多胰島素\n- 形成惡性循環\n\n#### 糖尿病進程\n| 階段 | IR值 | 狀態 |\n|------|------|-------|\n| 正常 | 1.0 | 1單位胰島素處理1單位血糖 |\n| 阻抗 | 2.0+ | 需要2倍胰島素處理相同血糖 |\n| 前期糖尿病 | 3-4倍 | 胰臟開始衰竭 |\n| 糖尿病 | 5倍+ | Beta細胞衰竭，無法生產足夠胰島素 |\n\n### 5. 肝臟的角色\n\n#### 肝糖原 (Glycogen) 儲存機制\n- 肝臟是「糖的倉庫」\n- 肝糖儲存量有限\n- 過多糖分 → 肝糖爆滿 → 轉化為脂肪\n\n#### 脂肪肝的形成\n1. 肝糖滿了\n2. 轉化為三酸甘油脂 (Triglycerides)\n3. 輸出到血管 → 儲存在脂肪細胞\n4. 長期過載 → 脂肪肝 → 肝硬化 (不可逆轉)\n\n### 6. 三個關鍵器官\n\n| 器官 | 功能 | 損壞後果 |\n|------|------|----------|\n| **肝臟** | 處理糖分、毒素 | 脂肪肝 → 肝硬化 |\n| **胰臟** | 生產胰島素 | 糖尿病、胰島素阻抗 |\n| **腎臟** | 過濾血液 | 腎病 (高血糖+高血壓破壞) |\n\n---\n\n## 12星期行動方案\n\n### 四戒（12星期）\n1. ❌ **戒麵包** (所有麵包、烘焙食品)\n2. ❌ **戒牛奶** (用無糖杏仁奶/椰子奶代替)\n3. ❌ **戒水果** (除梅類：藍莓、紅莓、黑莓)\n4. ❌ **戒啤酒** (想喝酒可喝少量烈酒)\n\n### 三減少\n1. 🧊 **減少飲品糖分** (水、茶、咖啡，代糖也不行)\n2. 🍚 **減少精製碳水** (粥、粉、麵)\n3. 🐮 **減少牛奶製品**\n\n### 兩增加\n1. 🚶 **每天6000步** (約60分鐘)\n2. 🍽️ **飯後步行20分鐘** (餐後立即走10分鐘，回10分鐘)\n\n### 一控制\n- **進食順序**：菜 → 肉 → 飯 (碳水化合物放最後)\n\n---\n\n## 監測工具\n\n### 身體檢查建議\n| 檢查項目 | 目的 | 頻率 |\n|----------|------|------|\n| **脂肪肝檢查 (FibroScan)** | 肝脂肪化程度 + 肝硬度 | 一次 |\n| **胰島素阻抗血液檢查** | IR值、Beta細胞功能 | 治療前後對比 |\n| **智能磅** | 體重 + 體脂百分比 + 內臟脂肪指數 | 每天/每週 |\n\n### 內臟脂肪指數\n- 智能磅可估算\n- 指數越高 → 器官脂肪化越嚴重\n- 追蹤趨勢比單次數據更重要\n\n---\n\n## 課程核心原則\n\n### 為什麼是12星期？\n- 身體有足夠時間逆轉早期損傷\n- 建立新習慣\n- 看到明顯改善\n- 成功率高達98%+\n\n### 為什麼不能跳課？\n- 每課知識環環相扣\n- 需要完整理解才能正確執行\n- 講師已精心設計順序\n\n### 行動比理論重要\n> 「就算你唔明啱啱講乜，只要跟住做，都會健康」\n\n---\n\n## 重要提醒\n\n### 必須諮詢醫生的情況\n- 已確診慢性病\n- 正在服用藥物\n- 任何健康疑慮\n\n### 這課程不適用於\n- 有嚴重疾病的人\n- 孕婦\n- 18歲以下人士\n\n---\n\n## 結語與總結\n\n### 課程哲學\n\n#### 1. 行動比知識重要\n> 「就算你唔明啱啱講乜，只要跟住做，都會健康」\n\n- 聽過不代表學過\n- 學過不代表做過\n- 做過不代表堅持到\n\n#### 2. 不要想太多\n- 12個星期很快就過\n- 「花多咗時間諗，就少咗時間做」\n- 那個「肥叔叔」的故事——聽完仲係咁食嘢\n\n#### 3. 問問題的藝術\n- 你會有9000個問題\n- 大部分問題喺第2-13課會解答\n- 課程會提供食物查詢表 (Food Inquiry Form)\n- 講師會回覆Patreon上的問題\n\n---\n\n## 常見問題預覽\n\n### Q: 燕麥片可以食嗎？\n**A:** ❌ 唔好食麥片做早餐\n\n### Q: 早餐可以食咩？\n**A:** 淨係可以食：\n- 🥚 蛋 (水煮、煎蛋都得)\n- 🥑 牛油果\n\n### Q: 點解唔食得生果？\n**A:** 水果含大量果糖，果糖會直接入肝轉化為脂肪\n\n### Q: 代糖得唔得？\n**A:** ❌ 12個星期內唔好食代糖\n\n### Q: 可以食白飯嗎？\n**A:** ✅ 得，但要：\n- 放最後先食 (菜→肉→飯)\n- 份量控制\n\n---\n\n## 課程支持資源\n\n| 資源 | 內容 |\n|------|------|\n| Patreon | 每一課重溫、連結、問答環節 |\n| Food Inquiry Form | 食物查詢表格 |\n| 13課完整內容 | 全部知識拼圖 |\n\n---\n\n## 第一課完\n\n> 「我話你知，你淨係知冰山一角。我未見過有一个人可以完整到我咁樣。」\n\n---\n\n## Lesson 1.5 - Q&A 補充課\n\n*這是第1課的補充課，主要回答常見問題*\n\n---\n\n### 課程心態\n\n#### 問問題的藝術\n- 很多人問問題只是想「求安慰」，不是真的想解決\n- 講師花了5年回答問題，發現大部分問題可以在未來課程中解答\n- **建議**：先聽完13課，再問問題\n\n#### 行動比問問題更重要\n> 「問了和定了，比聽了和學了更差」\n\n- 問完問題不代表會去做\n- 真正改善健康需要 **行動**\n- 12星期內，問完就去做，不要只是求心安\n\n---\n\n### 身體檢查詳情\n\n#### 基本驗血項目\n| 項目 | 目的 |\n|------|------|\n| **Fasting Blood Glucose** | 空腹血糖 |\n| **HbA1c** | 糖化血色素 |\n| **Lipid Profile** | 膽固醇 (HDL/LDL) |\n| **Triglycerides** | 三酸甘油脂 |\n| **Uric Acid** | 尿酸 |\n| **C-Peptide** | 胰島素功能指標 ⭐重要 |\n| **Vitamin D** | 維他命D |\n\n#### 非入侵性檢查\n| 檢查 | 目的 |\n|------|------|\n| **尿液常規** | 腎功能、感染 |\n| **糞便常規** | 寄生蟲、消化問題 |\n| **FibroScan** | 肝脂肪化程度 |\n\n#### 為什麼要做檢查？\n- 建立基準線 (Baseline)\n- 12星期後可以對比改善\n- 驗血報告會顯示你是「適合吃飯」還是「不需要吃飯」的人\n\n---\n\n### 進食問題 Q&A\n\n#### 🍞 麵包\n- **所有麵包都不行** (12星期)\n- 餅乾、蛋糕全部不行\n- 12星期後才考慮解禁\n\n#### 🥛 奶類\n- **牛奶不行** (用無糖杏仁奶/椰子奶代替)\n- **豆奶不行**\n- **乳酪 (Yogurt)**：\n  - Greek Yogurt (希臘乳酪) 可以 ⭐\n  - 必須是 **plain + full fat**\n  - 香港可在 City Super / Matsukawa 買到\n- **芝士**：\n  - 可以吃 (除片裝芝士)\n  - 原則：羊奶 > 水牛 > 牛奶\n  - 硬芝士 > 軟芝士\n  - 發酵過的比沒發酵的好\n  - 不要加果乾\n\n#### 🍎 水果\n- **12星期內戒所有水果**\n- **除了梅類**：藍莓、紅莓、黑莓 (適量，10-20粒)\n- **果乾** 絕對不可以 (比水果更差)\n- 水果的果糖會直接入肝變脂肪\n\n#### 🍚 碳水化合物\n- **粥粉麵飯只可以食白飯**\n- **紅米/五穀飯**：如果你識得正確處理 (浸幾個鐘) 先可以\n- **番薯可以食**，薯仔不行\n- **意粉/米粉/米線**：一半係飯，一半係其他，12星期內避免\n- **戒飯減肥，越減越肥**\n\n#### 🥜 堅果 (Nuts)\n- **可以食**，但有原則：\n  - ❌ 花生不行\n  - ❌ 腰果不行\n  - 要原味、無糖、無添加\n  - 適量 (一 handful)\n  - 講師最愛：Brazil nuts、Macedonian walnuts、pecans\n\n#### 🥚 早餐\n- **不需要吃早餐的人**：全身肥、BMI高\n- **需要吃早餐的人**：瘦底、只有肚腩、BMI正常\n- **如果需要吃早餐**：\n  - 吃蛋 (2-4隻)\n  - 吃牛油果 (半隻)\n  - 吃希臘乳酪\n  - 不要吃麥片/燕麥片 (比大部分早餐差)\n\n#### ☕ 咖啡\n- 任何時候都可以喝\n- **只喝齋啡** (不加奶、不加糖)\n- 下午2-3點後不要喝 (影響睡眠)\n- 香港咖啡質素參差，優質咖啡不會傷胃\n\n#### 🍵 飲品\n- **檸檬水可以** (好朋友)\n- **熱檸茶/凍檸茶**：有糖，不行\n- **蜜糖**：12星期內不行\n- **湯**：\n  - 中湯通常沒問題\n  - 西湯常落很多糖，要注意\n  - 薯仔湯、蕃茄薯仔湯不行 (carb太高)\n\n#### 🍫 其他\n- **朱古力**：12星期內避免高糖朱古力\n- **粟米**：不行\n- **蕃茄**：可以 (屬蔬菜，不要空肚食)\n- **芝麻醬**：穀物，要小心\n- **水餃**：皮是碳水化合物，可以只食餡\n\n---\n\n### 運動問題 Q&A\n\n#### 🚶 6000步\n- **每天最少6000步**\n- **正常步速**，不是急步行\n- **每天都要**，不是今天10000、明天2000\n- **放假的時候可以行多啲**\n- 飯後行最抵 (1步 = 2步)\n\n---\n\n### 特殊情況 Q&A\n\n#### 💊 藥物\n- 有長期病患/正在食藥 → 先問醫生\n- 糖尿/高血壓藥物可能需要調整\n- 「如果你唔做，慢性病已經到你門口」\n\n#### 🏃 運動\n- 未有慢性病：跑5公里沒問題\n- 有代謝綜合症：連呼吸都有困難，不要跑\n- **6000步是最基本**\n\n#### ✈️ 去旅行\n- 酒店自助餐：不要去 (就算送都唔好去)\n- 正常食：蛋、茶/咖啡、菜\n- 原則不變\n\n#### 👶 小朋友\n- 立即停止俾小朋友飲果汁 (紙包/先榨都唔好)\n- 第13課有提及\n\n#### 😴 睡眠窒息\n- 嚴重代謝綜合症徵兆\n- 解決方法：12星期內跟住做\n\n---\n\n### 12星期後\n\n> 「12星期之後你鐘意點就點」\n\n- 課程只要求12星期\n- 12星期後會教你點維持 (第13課)\n- 不想改善？「我幫不了你」\n\n---\n\n### 金句回顧\n\n1. 「問了和定了，比聽了和學了更差」\n2. 「戒飯減肥，越減越肥」\n3. 「你可以聽一部分，但那部分聽到一部分」\n4. 「很多人只是略知一二，但我是去到七八九」\n5. 「12星期之後你鐘意點就點」\n\n---\n\n## Key Takeaways (最終總結)\n\n### 核心概念\n1. **荷爾蒙（尤其是胰島素）比卡路里更重要**\n2. **進化錯配是萬病之源**（200萬年DNA vs 50年現代環境）\n3. **肝臟是糖代謝的關鍵** — 肝糖滿咗就變脂肪\n4. **胰島素阻抗是慢性病起點**\n5. **三個關鍵器官**：肝、胰、腎，壞咗就不可逆轉\n\n### 12星期行動清單 ✅\n\n| 類型 | 內容 | 狀態 |\n|------|------|------|\n| **四戒** | ❶ 麵包 ❷ 牛奶 ❸ 生果（梅類除外）❹ 啤酒 | ☐ |\n| **三減少** | ❶ 減少精製碳水 ❷ 減少飲品糖分 ❸ 減少加工食品 | ☐ |\n| **兩增加** | ❶ 每天6000步 ❷ 飯後步行20分鐘 | ☐ |\n| **一控制** | 進食順序：菜 → 肉 → 飯 | ☐ |\n\n### 監測指標\n- [ ] 智能磅追蹤（體重、體脂、內臟脂肪）\n- [ ] FibroScan（肝臟健康）\n- [ ] 血液檢查（胰島素阻抗）\n\n### 成功關鍵\n1. **立即行動** — 唔好諗太多\n2. **堅持12星期** — 話咁快就過\n3. **追蹤進度** — 體重、體脂\n4. **唔好跳課** — 13課係完整拼圖\n5. **溫習多次** — 每次有新領悟\n\n---\n\n## Lesson 2 - 胰島素峰值與果糖陷阱\n\n*這一堂深入解釋：點解要降低血糖峰值？果糖點解最毒？*\n\n---\n\n### 核心概念：胰島素峰值 (Insulin Spike)\n\n#### 點解要降低峰值？\n\n| 高峰期血糖 | 後果 |\n|-------------|------|\n| 血糖狂升到10度 | 胰島素大量分泌 |\n| 胰島素過多 | 變成「肥胖荷爾蒙」 |\n| 長期高峰 | 脂肪肝、內臟脂肪、胰島素阻抗 |\n\n#### 血糖曲線解釋\n- **紅色曲線**（飯後不動）：血糖由4度扯到10度\n- **綠色曲線**（飯後散步30分鐘）：血糖由4度升到7度\n- **總面積越小** = 胰島素分泌越少 = 越健康\n\n---\n\n### 三大降峰值方法\n\n#### 方法一：蘋果醋 (Apple Cider Vinegar)\n\n**點解有效？**\n- 口腔澱粉酶 (Salivary Amylase) 遇到酸會暫時失效\n- 減少碳水化合物在口腔就開始分解\n- 令升糖速度減慢\n\n**點飲？**\n```\n1. 1湯匙蘋果醋\n2. 加200ml水\n3. 飯前5分鐘飲\n4. 用飲管（紙/不鏽鋼）保護牙齒\n5. 飲完擦牙（但飲完不要立即擦牙）\n```\n\n**外出點算？**\n- 餐廳叫檸檬茶/檸檬水（無糖）\n- 茶入面既丹寧酸都有效抑制口腔澱粉酶\n\n**注意：** 蘋果醋丸無效（落胃先溶解，錯過口腔階段）\n\n---\n\n#### 方法二：飯後步行\n\n**點解有效？**\n- 肌肉郁動時，可以在毋須胰島素既情況下吸收血糖\n- 減少胰島素分泌\n- 「飯後行1步 = 平日行2步」\n\n**具體做法**\n- 食完飯行20-30分鐘\n- 唔使急，正常步速就得\n- 晏晝、夜晚兩餐後都行\n\n---\n\n#### 方法三：進食順序 (Eat Sequence)\n\n**最佳順序**\n1. 🥬 **蔬菜/纖維** → 先打底\n2. 🥩 **肉類/蛋白質/脂肪** → 減慢吸收\n3. 🍚 **碳水化合物（白飯）** → 最後先食\n\n**點解有效？**\n- 纖維唔消化，會「遮住」胃同小腸\n- 減慢碳水既吸收速度\n- 令升糖唔好咁快同咁高\n\n**實行技巧**\n- 中餐：叫侍應先上菜\n- 西餐：叫沙律醬另上（自己加醋/油）\n- 壽司：醋飯本身已係低升糖（日本人智慧）\n\n---\n\n### 果糖 (Fructose) — 最毒既糖\n\n#### 果糖既恐怖之處\n\n| 特點 | 說明 |\n|------|------|\n| **唯一代謝器官** | 只有肝臟可以處理果糖 |\n| **直接變脂肪** | 果糖入肝 → 即刻變脂肪儲存 |\n| **無飽腹感** | 唔會刺激胰島素，所以食極都唔飽 |\n| **似酒精** | 對肝既影響類似酒精 |\n\n#### 果糖從邊度嚟？\n\n| 來源 | 果糖含量 |\n|------|----------|\n| **高果糖玉米糖漿 (HFCS)** | 60% 果糖 + 40% 葡萄糖 |\n| **白砂糖** | 50% 果糖 + 50% 葡萄糖 |\n| **現代水果** | 經改良，非常甜 |\n| **果汁** | 集中咗大量果糖（4-6個橙榨成1杯） |\n\n> 「果糖係過去45年全球肥胖爆發最重要既元兇」\n\n---\n\n### 為乜嘢早餐係最危險既一餐？\n\n#### 早晨血糖陷阱\n\n1. **隔夜空腹**：身體對糖特別敏感\n2. **高升糖早餐**：麵包、麥片、果汁\n3. **血糖狂升** → 胰島素狂分泌\n4. **胰島素過多** → 血糖跌過baseline\n5. **血糖過低** → 身體以為「餓咗9日」\n6. **Sugar Cravings** → 10點就想食嘢\n7. **惡性循環** → 午餐又食得多 → 下午茶又食 → 宵夜又食\n\n> 「由朝早起身到宵夜，食足15個鐘，全部血糖狂升」\n\n---\n\n### 實行指南\n\n#### 每日6000步點樣逐步增加？\n\n| 星期 | 平均每日步數 | 做法 |\n|------|-------------|------|\n| 第1星期 | 6000 | 每日最少6000 |\n| 第2星期 | 6300 | 每日+300 |\n| 第3星期 | 6600 | 再+300 |\n| 如此類推 | 每周+300 | 最多當10000計 |\n\n**原則：** 每日最少6000，唔夠果日要補返\n\n---\n\n#### 推薦補充品\n\n| 補充品 | 作用 | 食法 |\n|--------|------|------|\n| **Ginny's Teen** | 保護膝蓋軟骨 | 每日 |\n| **梅類 (Berry)** | 抗氧化物 | 每日10粒以內 |\n\n---\n\n### 金句回顧\n\n1. 「胰島素 = 生命之源，亦都係肥胖荷爾蒙」\n2. 「飯後行1步 = 平日行2步」\n3. 「果糖係過去45年全球肥胖爆發既元兇」\n4. 「早餐係最危險既一餐」\n5. 「兩個星期，你就可以感受到變化」\n\n---\n\n## Key Takeaways (Lesson 2)\n\n### 降低胰島素峰值三大法\n1. 🍎 **蘋果醋** — 飯前飲，抑制口腔澱粉酶\n2. 🚶 **飯後步行** — 20-30分鐘，正常步速\n3. 🥗 **進食順序** — 菜 → 肉 → 飯\n\n### 果糖真相\n- ❌ 只有肝臟可以處理\n- ❌ 直接變脂肪\n- ❌ 無飽腹感\n- ❌ 係肥胖元兇\n\n### 避免Sugar Cravings\n- 唔好食高升糖早餐\n- 唔好令血糖跌過baseline\n- 跟實進食順序\n\n---\n\n## Lesson 3 - 代謝修復與補充品科學\n\n*這一堂深入講解：點解代謝綜合症係「核子冬天」？果糖點樣破壞粒線體？補充品點樣work？*\n\n---\n\n### 核心概念：代謝綜合症 (Metabolic Syndrome)\n\n#### 咩係代謝綜合症？\n\n| 症狀 | 說明 |\n|------|------|\n| **定義** | 身體長期處於「核子冬天」狀態 |\n| **原因** | 不斷畀Signal身體話「冬天將至」 |\n| **結果** | 代謝率暴跌、脂肪堆積、慢性病爆發 |\n\n#### 「核子冬天」點解？\n\n- **正常冬天**：動物需要增肥儲能量過冬\n- **核子冬天**：人類自己呃自己，長期話「冬天緊要嚟」\n- **唔正常Signal**：高果糖飲食、冇運動、睡眠不足\n- **結果**：身體永遠係「過冬模式」，唔識正常代謝\n\n---\n\n### 參考體重：20歲係最Fit狀態\n\n#### 點解要用20歲體重做Reference？\n\n| 原因 | 說明 |\n|------|------|\n| **基因設定** | 20歲前後身體代謝最高 |\n| **未被打爆** | 肝、未有脂肪肝、器官功能正常 |\n| **每人唔同** | 有啲人天生重啲，有啲輕啲 |\n| **目標** | 盡量追返20歲左右既體重 |\n\n#### 點Check自己？\n\n| 指標 | 做法 |\n|------|------|\n| **Smart Scale** | 每日磅，睇內臟脂肪 |\n| **FibroScan** | 檢查肝脂肪化程度 |\n| **驗血** | C-Peptide、Triglycerides |\n\n> 「如果你30歲，但代謝狀態已經去到45歲，你首要任務係追返30歲」\n\n---\n\n### 驗身報告既「正常範圍」呃你！\n\n#### Lab Range問題\n\n| 問題 | 說明 |\n|------|------|\n| **範圍太寬** | 係為咗用藥定界線，唔係健康標準 |\n| **用藥標準** | 藥廠想你食藥，所以標準好寬鬆 |\n| **健康標準** | 應該用「最佳」唔係「合格」 |\n\n#### 點睇驗身報告？\n\n| 指標 | 健康標準 | Lab Range |\n|------|----------|-----------|\n| **內臟脂肪** | Low/Normal | Normal可能已經太高 |\n| **Triglycerides** | <1.7 mmol/L | 可能去到2.3都話正常 |\n| **C-Peptide** | 越低越好 | 偏高表示胰島素阻抗 |\n\n> 「Normal唔係健康，Normal係『未要去到用藥』」\n\n---\n\n### 粒線體 (Mitochondria) — 細胞發電廠\n\n#### 粒線體係咩？\n\n| 功能 | 說明 |\n|------|------|\n| **發電廠** | 將食物轉化為ATP（能量貨幣） |\n| **數量** | 每個細胞有幾粒到幾百粒 |\n| **健康度** | 決定你能量水平、衰老速度 |\n| **敵人** | 果糖、氧化壓力、發炎 |\n\n#### ATP能量系統\n\n```\nGlucose/Fat → Mitochondria → ATP (三磷酸腺苷)\n                    ↓\n            拆解化學鍵釋放能量\n                    ↓\n            細胞用呢啲能量運作\n```\n\n#### 粒線體點解會受損？\n\n| 原因 | 點解？ |\n|------|--------|\n| **果糖** | 代謝果糖會產生氧化壓力，直接攻擊粒線體 |\n| **睡眠不足** | 修復時間唔夠，粒線體功能下降 |\n| **年齡** | 正常老化會減少粒線體數量 |\n| **錯誤減肥** | 節食會令粒線體「停工」 |\n\n---\n\n### 果糖對粒線體既毀滅性影響\n\n#### 果糖Vs葡萄糖\n\n| 項目 | 葡萄糖 | 果糖 |\n|------|--------|------|\n| **代謝途徑** | 入細胞 → 產生ATP | 直接入肝 → 變脂肪 |\n| **能量產生** | ✅ 會產生能量 | ❌ 唔會產生能量 |\n| **能量消耗** | — | ❌ 仲要消耗能量去做脂肪 |\n| **對粒線體** | 正常燃料 | ❌ 破壞粒線體 |\n\n#### 果糖既邪惡真相\n\n1. **直接變脂肪**\n   - 果糖入肝 → Liver De Novo Lipogenesis (新生脂肪製造)\n   - 呢個過程**唔需要能量**，直接變脂肪儲存\n\n2. **消耗能量**\n   - 將果糖變脂肪需要ATP\n   - 即係「用你身體既能量去整脂肪」\n\n3. **產生氧化壓力**\n   - 果糖代謝過程產生大量自由基\n   - 自由基攻擊粒線體 → 粒線體受損\n\n4. **降低代謝率**\n   - 氧化壓力令粒線體效率下降\n   - 粒線體受損 = 代謝率暴跌\n\n5. **模擬「冬天來了」Signal**\n   - 身體以為冇嘢食，要儲脂肪\n   - 結果：食幾多儲幾多\n\n> 「果糖係自然界最強既『冬天將至』Signal」\n\n---\n\n### 點解天然果糖都有問題？\n\n#### 天然比例：50/50\n\n| 項目 | 比例 | 原因 |\n|------|------|------|\n| **天然水果** | 50%葡萄糖 + 50%果糖 | 大自然設計 |\n| **高果糖玉米糖漿** | 40%葡萄糖 + 60%果糖 | 人為改造，更甜 |\n| **白砂糖** | 50%葡萄糖 + 50%果糖 | 天然比例 |\n\n#### 點解要有50%葡萄糖？\n\n| 原因 | 說明 |\n|------|------|\n| **能量平衡** | 果糖變脂肪需要能量，葡萄糖提供呢個能量 |\n| **動物生存** | 食水果時有能量可以用，唔會攰親 |\n| **進化原因** | 如果淨係食果糖，動物會冇力打獵 |\n\n#### 但係！\n\n> 「就算係天然50/50，果糖果50%都係會直接變脂肪」\n> 「問題係現代人食太多高果糖嘢」\n\n---\n\n### AMPK — 粒線體既「能量感應器」\n\n#### AMPK係咩？\n\n| 項目 | 說明 |\n|------|------|\n| **全名** | AMP-activated protein kinase (AMP活化蛋白激酶) |\n| **功能** | 細胞既「能量感應器」 |\n| **作用** | 當能量低時，啟動脂肪燃燒模式 |\n| **比喻** | 「細胞既省電模式開關」 |\n\n#### AMPK點運作？\n\n| 信號 | AMPK反應 |\n|------|----------|\n| **AMP/ATP比率高** (能量低) | ✅ 啟動！燒脂肪！ |\n| **ATP充足** | ❌ 唔做嘢，繼續儲脂肪 |\n\n#### AMPK啟動後會點？\n\n1. **燒脂肪**\n   - 將儲存既脂肪拆咗佢，變成能量\n   - 呢個過程唔需要等胰島素\n\n2. **減少生脂肪**\n   - 令新食入去既嘢唔好變脂肪\n   - 直接用咗佢\n\n3. **提升代謝**\n   - 整靚粒線體功能\n   - 長期提升能量水平\n\n> 「AMPK係大自然設計既『燒脂開關』」\n\n---\n\n### 點樣自然啟動AMPK？\n\n#### 方法一：運動（尤其是高強度）\n\n| 運動類型 | AMPK效果 |\n|----------|----------|\n| **高強度運動** | ✅ 快速提升AMP/ATP比率 |\n| **間竭性訓練** | ✅ 效果持久 |\n| **每日6000步** | ⚠️ 有幫助但唔夠強 |\n\n#### 方法二：間歇性斷食\n\n| 斷食類型 | 做法 | AMPK效果 |\n|----------|------|----------|\n| **12:12** | 12小時食，12小時唔食 | 有幫助 |\n| **16:8** | 16小時唔食，8小時食 | ✅ 效果好 |\n| **186 (14:10)** | 晏晝1點食，晚7點前食完 | ✅ 講師推薦 |\n\n#### 方法三：補充品\n\n| 補充品 | 點解work？ |\n|--------|-----------|\n| **Tributyrin (三丁酸甘油酯)** | 直接提供丁酸，改善粒線體功能 |\n| **Curcumin (薑黃素)** | 減氧化壓力，間接幫AMPK |\n| **L-Carnitine** | 幫脂肪入粒線體燒 |\n| **EGCG (綠茶素)** | 提升脂肪代謝 |\n\n---\n\n### 補充品科學 (Supplement Science)\n\n#### 呢堂重點補充品\n\n| 補充品 | 英文 | 作用 |\n|--------|------|------|\n| **三丁酸甘油酯** | Tributyrin | 粒線體燃料，燒脂肪 |\n| **薑黃素** | Curcumin (95% curcuminoids) | 抗發炎，護粒線體 |\n| **左旋肉鹼** | L-Carnitine | 運脂肪入粒線體 |\n| **綠茶素** | EGCG | 促進脂肪氧化 |\n\n#### 補充品運作原理\n\n```\n1. 減少氧化壓力 → 保護粒線體\n           ↓\n2. 改善粒線體功能 → ATP製造增加\n           ↓\n3. AMP/ATP比率改善 → AMPK正常運作\n           ↓\n4. 燒脂肪模式啟動 → 脂肪減少\n```\n\n#### 點解藥物(Metformin)唔好？\n\n| 項目 | Metformin (二甲雙胍) | 天然補充品 |\n|------|---------------------|-----------|\n| **作用** | 抑制粒線體功能 | 改善粒線體功能 |\n| **原理** | 搞壞ATP製造，令AMP/ATP比率高 | 令粒線體更健康 |\n| **副作用** | 冇力、攰、Mitochondria受損 | 冇呢個問題 |\n| **長期影響** | 可能令問題惡化 | 根本性改善 |\n\n> 「Metformin係用藥去呃身體話『冇能量』，補充品係令身體真係有能量」\n\n---\n\n### 點解節食減肥係Dead End？\n\n#### 節食既問題\n\n| 問題 | 結果 |\n|------|------|\n| **能量太低** | 身體進入「核子冬天」Mode |\n| **代謝暴跌** | 粒線體停工，冇力 |\n| **反彈** | 一正常食就痴曬落身 |\n| **越減越肥** | 代謝已經被破壞 |\n\n#### 節食點呃你？\n\n```\n節食中...\n    ↓\n身體話：「冇嘢食！冬天嚟喇！」\n    ↓\n代謝暴跌 (省電模式)\n    ↓\n冇力、冇精神\n    ↓\n忍唔住 -> 正常食\n    ↓\n身體話：「有機會食嘢？即刻儲脂肪！！」\n    ↓\n反彈，而且越肥\n    ↓\n越節食越肥\n```\n\n#### 正確做法\n\n| 錯誤做法 | 正確做法 |\n|----------|----------|\n| 節食 | 食到飽，但食啱嘢 |\n| 冇食嘢 | 食兩餐，食到8-9成飽 |\n| 呃自己 | 畀正確Signal身體 |\n\n---\n\n### 呢個星期要做既嘢 (Week 3)\n\n#### 每日基本\n\n| 項目 | 要求 |\n|------|------|\n| **步數** | 每日6000步起步 |\n| **進食** | 兩餐，食到飽 |\n| **順序** | 菜 → 肉 → 飯 |\n| **蘋果醋** | 飯前飲 (出街飲檸檬水) |\n\n#### 每週Occasional (1-2次)\n\n| 項目 | 做法 |\n|------|------|\n| **多行50-100%** | 週末行多啲 (9000-12000步) |\n| **186斷食** | 晏晝1點至夜晚7點食 (放假先好做) |\n| **半餐** | 嗰餐食少一半份量 |\n\n#### 補充品 (有需要先食)\n\n| 補充品 | 份量 | 作用 |\n|--------|------|------|\n| **Tributyrin** | 1-2粒 | 燒脂肪 |\n| **Curcumin** | 1粒 (95% curcuminoids) | 抗發炎 |\n| **L-Carnitine** | 1粒 | 運脂肪 |\n| **EGCG** | 1粒 | 促代謝 |\n\n---\n\n### 呢個星期唔好做既嘢\n\n| 項目 | 點解？ |\n|------|--------|\n| **節食** | 破壞代謝 |\n| **代餐** | 呃自己，冇幫助 |\n| **跑步/高強度運動** | 有代謝問題既人唔啱 |\n| **唔食早餐** | 除非真係唔肚餓 |\n\n---\n\n### 金句回顧\n\n1. 「Normal唔係健康，Normal係未要去到用藥」\n2. 「果糖係自然界最強既『冬天將至』Signal」\n3. 「AMPK係大自然設計既『燒脂開關』」\n4. 「節食減肥係Dead End，越節食越肥」\n5. 「整靚粒線體先係根本解決方法」\n\n---\n\n## Key Takeaways (Lesson 3)\n\n### 核心概念\n1. **代謝綜合症 = 核子冬天** — 長期呃自己話冇嘢食\n2. **粒線體係細胞發電廠** — 決定能量水平\n3. **果糖係最大敵人** — 直接變脂肪 + 破壞粒線體\n4. **AMPK係燒脂開關** — 啟動咗就燒脂肪\n5. **節食係呃自己** — 會令代謝暴跌\n\n### 行動指南\n\n#### ✅每日做\n- 6000步 (起步)\n- 食到飽 (但食啱嘢)\n- 進食順序\n\n#### ⚠️每週1-2次\n- 週末行多50-100%\n- 186斷食 (放假先好做)\n- 半餐\n\n#### ❌千祈唔好\n- 節食/代餐\n- 高強度運動\n- 呃自己\n\n### 補充品點揀？\n\n| 優先次序 | 補充品 | 原因 |\n|----------|--------|------|\n| 1st | **Tributyrin** | 直接改善粒線體 |\n| 2nd | **Curcumin** | 抗發炎護粒線體 |\n| 3rd | **L-Carnitine** | 運脂肪去燒 |\n| 4th | **EGCG** | 促代謝 |\n\n> 「補充品係Bonus，最緊要係做啱基本嘢」\n\n---\n\n## Lesson 4 - 瘦底與肥底基因：點解你成日肚餓？\n\n*呢一堂深入講解：點解有人食極唔肥？點解有人飲水都肥？瘦底肥底基因點影響你既人生？*\n\n---\n\n### 核心概念：瘦底基因 vs 肥底基因\n\n#### 咩係瘦底基因 (Skinny Gene)？\n\n| 特點 | 說明 |\n|------|------|\n| **胰島素敏感度** | 高 (Insulin Sensitive) |\n| **胰島素分泌** | 較少 |\n| **碳水反應** | 對碳水化合物比較敏感 |\n| **增肥難度** | 難增肥，容易減肥 |\n| **C-Peptide水平** | 傾向偏低 (接近Lab Range下限) |\n\n#### 咩係肥底基因 (Fat Gene)？\n\n| 特點 | 說明 |\n|------|------|\n| **胰島素敏感度** | 低 (Insulin Resistant) |\n| **胰島素分泌** | 較多 |\n| **碳水反應** | 對碳水化合物比較遲鈍 |\n| **增肥難度** | 容易增肥，難減肥 |\n| **C-Peptide水平** | 傾向偏高 (接近Lab Range上限) |\n\n---\n\n### 進化角度：點解有呢兩種人？\n\n#### 肥底基因點出現？\n\n| 情況 | 原因 |\n|------|------|\n| **冬天漫長地區** | 冬天冇嘢食，需要大量脂肪儲備 |\n| **農業為主** | 以碳水為主食，唔容易打到獵 |\n| **進化壓力** | 冇脂肪儲備既人會死翹翹 |\n\n#### 瘦底基因點出現？\n\n| 情況 | 原因 |\n|------|------|\n| **食物充足地區** | 一年四季都有嘢食 |\n| **狩獵為主** | 靠打獵為生，唔使點儲脂肪 |\n| **進化壓力** | 脂肪少反而更靈活，更易打到獵 |\n\n> 「肥底基因係為咗冬天儲脂肪，瘦底基因係為咗打獵保持靈活」\n\n---\n\n### 點樣判斷自己係瘦底定肥底？\n\n#### 方法一：C-Peptide水平\n\n| 水平 | 判斷 |\n|------|------|\n| **接近Lab Range下限** | ✅ 傾向瘦底基因 |\n| **接近Lab Range上限** | ❌ 傾向肥底基因 |\n\n> 「C-Peptide偏低但有代謝問題 = 瘦底基因扮嘢」\n> 「C-Peptide偏高 = 一定有肥底基因」\n\n#### 方法二：HOMA2 Calculator\n\n| 指標 | 點睇？ |\n|------|--------|\n| **IR (Insulin Resistance)** | 越接近1越好，超過1.5表示有問題 |\n| **%B (Beta Cell Function)** | 反映胰島Beta Cell功能 |\n\n#### HOMA2 Calculator點用？\n\n1. **Google** 「HOMA2 Calculator」\n2. **Download** 個程式\n3. **Input** 你既：\n   - Fasting Glucose (空腹血糖)\n   - Fasting C-Peptide (空腹C-Peptide)\n4. **睇Result**：\n   - **IR < 1** = 正常/瘦底\n   - **IR 1-1.5** = 邊緣\n   - **IR > 1.5** = 有胰島素阻抗\n\n---\n\n### 瘦底基因既煩惱\n\n#### 瘦底基因特點\n\n| 特點 | 說明 |\n|------|------|\n| **外觀** | 點睇都唔肥，但可能內臟脂肪多 |\n| **血糖** | 空腹血糖可能正常，但C-Peptide低 |\n| **問題** | 有 Metabolic Syndrome 但睇唔出 |\n\n#### 瘦底基因最危險！\n\n| 問題 | 點解？ |\n|------|--------|\n| **睇唔出** | 唔肥，以為自己好健康 |\n| **內臟脂肪** | 冇地方儲脂肪，直入內臟 |\n| **血糖正常假象** | C-Peptide低，但其實係因為Beta Cell弱 |\n| **突然出事** | Beta Cell打齊就變糖尿病，冇先兆 |\n\n> 「瘦底基因有 Metabolic Syndrome 係最危險，因為你睇唔出自己有事」\n\n---\n\n### 肥底基因既煩惱\n\n#### 肥底基因特點\n\n| 特點 | 說明 |\n|------|------|\n| **外觀** | 容易肥，尤其係肚腩 |\n| **C-Peptide** | 偏高 (表示分泌好多胰島素) |\n| **問題** | 點減都肥，但有C-Peptide做指標 |\n\n#### 肥底基因點解決？\n\n| 方法 | 說明 |\n|------|------|\n| **低升糖飲食** | 減少胰島素分泌 |\n| **唔好食咁多碳水** | 瘦底食少少嘢就夠，肥底要控制份量 |\n| **食到飽** | 肥底唔應該節食，節食會令問題更差 |\n\n---\n\n### 飢餓素 (Ghrelin) — 點解你成日肚餓？\n\n#### 飢餓素係咩？\n\n| 項目 | 說明 |\n|------|------|\n| **功能** | 令你肚餓既荷爾蒙 |\n| **分泌時間** | 胃空既時候 |\n| **Signal** | 話你知「要搵嘢食喇！」 |\n\n#### 點解高升糖飲食令你更肚餓？\n\n```\n高升糖食物 (白飯、麵包、甜品)\n        ↓\n血糖飙升\n        ↓\n胰島素大量分泌\n        ↓\n血糖暴跌過Baseline\n        ↓\n身體以為冇嘢食\n        ↓\n飢餓素狂升\n        ↓\n極肚餓！\n        ↓\n又食嘢\n        ↓\n惡性循環\n```\n\n#### 點樣控制飢餓素？\n\n| 方法 | 做法 |\n|------|------|\n| **低升糖飲食** | 食菜 → 肉 → 飯，減慢血糖升幅 |\n| **食夠蛋白質** | Protein需要時間消化，延長飽腹感 |\n| **食夠脂肪** | 健康脂肪延長消化時間 |\n| **飲夠水** | 缺水會令身體以為肚餓 |\n| **行路** | 行路話身體知「我喺度搵嘢食」，降低飢餓素 |\n\n---\n\n### MCT Oil (中鏈脂肪酸油) — 瘦底既秘密武器\n\n#### MCT Oil係咩？\n\n| 項目 | 說明 |\n|------|------|\n| **全名** | Medium Chain Triglycerides (中鏈脂肪酸) |\n| **來源** | 椰子、棕櫚 |\n| **長度** | C6, C8, C10, C12 |\n\n#### 點解C8最好？\n\n| 長度 | 效果 |\n|------|------|\n| **C6** | 太短，效果太勁，可能肚痾 |\n| **C8** | ✅ 最佳！直接變能量 |\n| **C10** | 效果較弱 |\n| **C12** | 幾乎冇效，仲要經過先消化 |\n\n> 「一定要揀C8 Only，混合C10既係劣質嘢」\n\n#### MCT Oil點用？\n\n| 項目 | 份量/做法 |\n|------|-----------|\n| **份量 (男)** | 1湯匙 (約15ml) |\n| **份量 (女)** | 從少量開始 (半匙/1匙粉) |\n| **飲法** | 溝入黑咖啡/茶 |\n| **温度** | 熱既嘢飲小心燙嘴 (油會阻隔熱力) |\n\n#### MCT Oil對瘦底既作用\n\n| 作用 | 說明 |\n|------|------|\n| **Fast Energy** | 30分鐘內變成Ketone，唔使等血糖 |\n| **燒脂肪Signal** | 話身體知「而家有能量，燒自己脂肪啦！」 |\n| **取代早餐** | 瘦底唔食早餐冇力？溝MCT Oil就有能量 |\n| **唔阻礙燒脂** | 肥底已經有夠多脂肪，呢個係Bonus |\n\n> 「瘦底：MCT Oil係早餐取代品；肥底：你已經有夠多脂肪，呢個係Signal嚟」\n\n---\n\n### 本星期要做既嘢 (Week 4)\n\n#### 每日基本\n\n| 項目 | 要求 |\n|------|------|\n| **步數** | 每日6000步起步 |\n| **進食** | 兩餐，食到飽 (肥底)；兩餐/一餐 (瘦底) |\n| **順序** | 菜 → 肉 → 飯 |\n| **蘋果醋** | 飯前飲 |\n\n#### 每週Occasional\n\n| 項目 | 做法 |\n|------|------|\n| **多行50-100%** | 週末行多啲 (9000-12000步) |\n| **186斷食** | 晏晝1點至夜晚7點食 (放假先好做) |\n\n#### 瘦底特別注意\n\n| 項目 | 做法 |\n|------|------|\n| **早餐** | 如果真係肚餓：食蛋 + 牛油果；或者飲MCT Oil咖啡 |\n| **C-Peptide低** | 留意係咪瘦底扮嘢，check清楚HOMA2 |\n| **唔好節食** | 瘦底節食會令Beta Cell更弱 |\n\n#### 肥底特別注意\n\n| 項目 | 做法 |\n|------|------|\n| **早餐** | 可以唔食，食都要低升糖 |\n| **飯量** | 食少啲飯 (半碗/1碗) |\n| **C-Peptide高** | 呢個係Warning Sign，要快啲改善 |\n\n---\n\n### 點樣利用假期？\n\n#### 放假Routine例子 (講師個人做法)\n\n| 時間 | 活動 |\n|------|------|\n| **晏晝** | 起身，行出門口 |\n| **10:00-12:00** | 步行兩小時 (太陽底下) |\n| **12:00** | 食晏低升糖 Lunch，食到飽 |\n| **14:00-16:00** | 步行兩小時 (飯後) |\n| **16:00** | 飲咖啡/茶休息 |\n| **19:00** | 食晚低升糖 Dinner，食到飽 |\n| **21:00-23:00** | 步行兩小時 (飯後) |\n\n> 「放假係最好既行路時間，盡量每日行4-6小時」\n\n---\n\n### 重點整理\n\n#### 瘦底基因\n\n| 特點 | 點做？ |\n|------|--------|\n| C-Peptide低 | ✅ 好，但留意係咪扮嘢 |\n| 內臟脂肪可能高 | Smart Scale每日check |\n| 早餐選擇 | MCT Oil咖啡 / 蛋 + 牛油果 |\n| 唔好節食 | 會整衰Beta Cell |\n\n#### 肥底基因\n\n| 特點 | 點做？ |\n|------|--------|\n| C-Peptide高 | ❌ Warning Sign |\n| 肚腩易肥 | 內臟脂肪高，要注意 |\n| 早餐選擇 | 可以唔食，或低升糖 |\n| 飯量控制 | 食少啲飯 |\n\n---\n\n### 金句回顧\n\n1. 「瘦底扮嘢最危險，睇唔出有病」\n2. 「C-Peptide係最好既基因指標」\n3. 「HOMA2 Calculator話你知究竟係瘦底定肥底」\n4. 「飢餓素係荷爾蒙，你呃唔到佢」\n5. 「MCT Oil C8係瘦底既秘密武器」\n\n---\n\n## Key Takeaways (Lesson 4)\n\n### 核心概念\n\n#### 瘦底基因\n- 胰島素敏感度高\n- C-Peptide傾向偏低\n- 容易有「隱藏式」代謝問題\n- 最危險：因為睇唔出有病\n\n#### 肥底基因\n- 胰島素阻抗高\n- C-Peptide傾向偏高\n- 容易有肚腩\n- 有Warning Sign做指標\n\n### 點check自己？\n\n| 方法 | 做法 |\n|------|------|\n| **C-Peptide** | 接近下限 = 瘦底；接近上限 = 肥底 |\n| **HOMA2** | IR < 1 = 正常；IR > 1.5 = 有問題 |\n| **Smart Scale** | 每日check內臟脂肪 |\n\n### 本星期Action Items\n\n#### ✅每日做\n- 6000步\n- 低升糖飲食\n- 進食順序 (菜 → 肉 → 飯)\n\n#### ⚠️瘦底特別做\n- MCT Oil咖啡取代/補充早餐\n- Check C-Peptide\n- 唔好節食\n\n#### ⚠️肥底特別做\n- 控制飯量\n- 唔食早餐都可以\n- 留意內臟脂肪\n\n---\n\n## Lesson 5 - 驗血報告深度解讀：邊個數據先係真正重要？\n\n*呢一堂深入講解：點睇驗血報告？點解你睇極都睇唔明？邊個數字呃緊你？*\n\n---\n\n### 核心概念：驗血報告係咁用既？\n\n#### 正常範圍 vs 健康範圍\n\n| 指標 | 正常範圍 (Lab Range) | 真正健康範圍 |\n|------|------------------|-------------|\n| **空腹血糖** | 5.6以下 | 3.9-4.0 |\n| **HbA1c** | 5.7以下 | 4.x range |\n| **C-Peptide** | Lab Range內 | 傾向低＝瘦底；傾向高＝肥底 |\n\n> 「醫學話5.6係正常，但其實5.6已經係糖尿病前期！真正健康應該係3.9-4.0」\n\n---\n\n### 空腹血糖 (Fasting Blood Glucose)\n\n#### 點睇空腹血糖？\n\n| 數值 | 判斷 |\n|------|------|\n| **3.9-4.0** | ✅ 真正健康 |\n| **4.0-5.0** | ⚠️ 已經開始衰緊 |\n| **5.0-5.6** | ❌ 接近糖尿病前期 |\n| **>5.6** | ❌ 糖尿病前期/糖尿病 |\n\n#### 空腹血糖點解呃你？\n\n```\n你琴晚食多咗野 → 空腹血糖短期改善\n    ↓\n你以為自己好咗\n    ↓\n但背後用咗大量胰島素去谷爆血糖\n    ↓\n長遠Beta Cell打柴\n    ↓\n點解？因為身體有Homeostasis\n```\n\n---\n\n### HbA1c (糖化血紅蛋白)\n\n#### HbA1c係咩？\n\n| 項目 | 說明 |\n|------|------|\n| **全名** | Glycated Hemoglobin (糖化血紅蛋白) |\n| **反映** | 過去2-3個月既血糖控制 |\n| **原理** | 血糖黐咗上血紅蛋白 |\n\n#### HbA1c點睇？\n\n| HbA1c範圍 | 判斷 |\n|----------|------|\n| **4.x** | ✅ 真正健康 |\n| **5.0-5.6** | ⚠️ 接近/進入糖尿病前期 |\n| **>5.7** | ❌ 糖尿病 |\n| **>6.5** | ❌ 確診糖尿病 |\n\n---\n\n### C-Peptide (C肽)\n\n#### C-Peptide係咩？\n\n| 項目 | 說明 |\n|------|------|\n| **全名** | C-Peptide (連接胰島素既化合物) |\n| **反映** | 胰島素分泌量 |\n| **意義** | 分泌得多＝身體需要更多胰島素＝有阻抗 |\n\n#### C-Peptide點睇？\n\n| C-Peptide傾向 | 判斷 |\n|------------|------|\n| **傾向低** | ✅ 瘦底基因 |\n| **傾向高** | ❌ 肥底基因 |\n| **偏高** | Beta Cell OT緊 |\n\n---\n\n### 尿酸 (Uric Acid)\n\n#### 尿酸係咩？\n\n| 項目 | 說明 |\n|------|------|\n| **全名** | Uric Acid (尿酸) |\n| **主要功能** | 細胞代謝廢物 |\n| **進化意義** | 抗氧化、模擬過冬信號 |\n\n#### 尿酸點睇？\n\n| 性別 | 健康範圍 | 警告範圍 |\n|------|----------|----------|\n| **女性** | 200-300 | >300 |\n| **男性** | 300-400 | >400 |\n\n> 「尿酸唔係淨係痛風指標，佢係身體發炎/過冬信號既核心」\n\n---\n\n### 果糖 (Fructose) — 尿酸既主要敵人\n\n#### 果糖點增加尿酸？\n\n```\n果糖入肝\n    ↓\n肝臟代謝果糖 → 產生大量尿酸\n    ↓\n尿酸飆升\n    ↓\n身體以為冬天要儲脂肪\n    ↓\n代謝變慢、變肥\n```\n\n#### 咩嘢含果糖最多？\n\n| 嘢品 | 果糖含量 |\n|------|-----------|\n| **甜飲** | 🔴🔴🔴🔴🔴 (直入小腸，極速吸收 |\n| **果汁** | 🔴🔴🔴🔴 |\n| **高果糖玉米糖漿** | 🔴🔴🔴🔴🔴 |\n| **白砂糖/蔗糖** | 🔴🔴🔴🔴 |\n| **水果** | 🔴🔴🔴 (適量ok |\n| **蜜糖** | 🔴🔴🔴🔴 |\n| **醬汁/加工食品** | 🔴🔴🔴🔴 |\n\n---\n\n### 酒精 — 尿酸第二敵人\n\n#### 酒精點增加尿酸？\n\n| 酒精類型 | 尿酸影響 | 原因 |\n|----------|----------|------|\n| **啤酒** | 🔴🔴🔴🔴🔴 | 酵母+果糖+酒精雙重打擊 |\n| **烈酒** | 🔴🔴🔴🔴 | 直接入肝代謝 |\n| **紅酒** | 🔴🔴 | 相對較好，但仍要適量 |\n\n> 「啤酒係尿酸炸彈，痛風/代謝問題主要元兇」\n\n---\n\n### 高鹽飲食 — 第三敵人\n\n#### 鹽點增加尿酸？\n\n| 機制 | 說明 |\n|------|------|\n| **鈉** | 高鹽→身體缺水信號→儲水+儲脂肪 |\n| **味精 (MSG)** | 🔴🔴🔴🔴🔴 直接增加尿酸 |\n| **醬汁** | 🔴🔴🔴🔴🔴 醬汁通常高鹽高糖 |\n\n---\n\n### 自我製造果糖 — 第四敵人\n\n#### 我身體點自己製造果糖？\n\n```\n食精製碳水 (白飯、麵包、白糖)\n    ↓\n血糖飆升 → 胰島素大量分泌\n    ↓\n過多葡萄糖 → 身體將葡萄糖轉化為果糖\n    ↓\n自己製造果糖 → 肝臟脂肪增加\n    ↓\n尿酸、果糖雙重打擊\n```\n\n#### 點解身體自己製造果糖？\n\n| 原因 | 說明 |\n|------|------|\n| **進化設計** | 冬天前儲脂肪 |\n| **現代問題** | 食太多碳水 → 身體當你有極肥 |\n| **惡性循環** | 製造果糖 → 發炎信號 → 再食更多碳水 |\n\n---\n\n### 腸道微生物 — 秘密武器\n\n#### 腸道點幫你降尿酸？\n\n| 功能 | 說明 |\n|------|------|\n| **分解Purine** | 腸菌可分解部分Purine，減少尿酸吸收 |\n| **製造短鏈脂肪酸** | 保護腸道、減少發炎 |\n| **調節免疫** | 腸道健康＝全身健康 |\n\n#### 点樣改善腸道？\n\n| 方法 | 做法 |\n|------|------|\n| **食夠纖維** | 每日2份蔬菜以上 |\n| **發酵食品** | 天然乳酪、味噌、泡菜 |\n| **減少加工食品** | 加工食品殺死好菌 |\n| **益生菌** | 有需要時補充 |\n\n---\n\n### Purine (普林/嘌呤) — 尿酸原料\n\n#### Purine係咩？\n\n| 項目 | 說明 |\n|------|------|\n| **Purine** | 細胞代謝廢物，分解後變尿酸 |\n| **高Purine食物** | 內臟、酒精、某些海鮮 |\n| **低Purine食物** | 蔬菜、大部分水果 |\n\n#### Purine vs 果糖\n\n| 項目 | Purine | 果糖 |\n|------|--------|-------|\n| **主要來源** | 細胞分解 | 飲食+身體製造 |\n| **痛風關聯** | 直接相關 | 間接受關 (代謝症候群) |\n| **控制難度** | 較易 | 較難 (要改變飲食習慣) |\n\n---\n\n### 驗血報告解讀框架\n\n#### 邊個數據最重要？\n\n| 優先次序 | 數據 | 點解？ |\n|----------|------|-------|\n| **1st** | 空腹血糖 | 胰島素功能既核心指標 |\n| **2nd** | HbA1c | 長期血糖控制 |\n| **3rd** | C-Peptide | 胰島素分泌量 |\n| **4th** | 尿酸 | 發炎/過冬信號 |\n| **5th** | 血脂/肝功能 | 副線指標 |\n\n#### 點樣追蹤進度？\n\n| 指標 | 目標 | 點check |\n|------|------|---------|\n| 空腹血糖 | 3.9-4.0 | 每日/每週 fasting glucose |\n| HbA1c | 4.x | 每3個月 |\n| 尿酸 | 200-400 | 每3個月 |\n| C-Peptide | 傾向低 | 每6個月 |\n\n---\n\n### 本星期要做既嘢 (Week 5)\n\n#### 每日基本\n\n| 項目 | 要求 |\n|------|------|\n| **血糖追蹤** | 記錄空腹血糖 (如果可以) |\n| **飲食記錄** | 記錄高果糖/高鹽食物 |\n| **運動** | 每日6000步以上 |\n\n#### 每週檢查\n\n| 項目 | 做法 |\n|------|------|\n| **驗血報告** | 拎報告出黎解讀 |\n| **尿酸** | 關注數值 |\n| **C-Peptide** | 傾向高定低 |\n| **HbA1c** | 長期血糖控制 |\n\n#### 食物陷阱\n\n| 陷阱 | 替代品 |\n|------|--------|\n| 甜飲 | 水、綠茶 |\n| 高鹽醬汁 | 檸檬汁、醋、香草 |\n| 加工食品 | 新鮮食材 |\n| 啤酒/酒精 | 少量紅酒/唔飲 |\n\n---\n\n### 金句回顧\n\n1. 「5.6唔係正常，5.6係糖尿病前期」\n2. 「HbA1c反映2-3個月血糖控制，呢個先係真正指標」\n3. 「C-Peptide話你知身體要用幾多胰島素去維持血糖」\n4. 「尿酸唔係淨係痛風指標，佢係身體過冬信號」\n5. 「自我製造果糖係最大陷阱，你食乜嘢，身體就點反應」\n\n---\n\n## Key Takeaways (Lesson 5)\n\n### 核心概念\n\n#### 空腹血糖\n| 數值 | 判斷 |\n|------|------|\n| 3.9-4.0 | ✅ 真正健康 |\n| 4.0-5.0 | ⚠️ 開始衰退 |\n| 5.0-5.6 | ❌ 糖尿病前期 |\n| >5.6 | ❌ 糖尿病 |\n\n#### HbA1c\n| 數值 | 判斷 |\n|------|------|\n| 4.x | ✅ 健康 |\n| 5.0-5.6 | ⚠️ 控制一般 |\n| >5.7 | ❌ 糖尿病範圍 |\n\n#### C-Peptide\n| 傾向 | 判斷 |\n|------|------|\n| 低 | 瘦底基因 |\n| 高 | 肥底基因/Beta Cell OT |\n\n#### 尿酸\n| 性別 | 健康範圍 | 警告範圍 |\n|------|----------|----------|\n| 女性 | 200-300 | >300 |\n| 男性 | 300-400 | >400 |\n\n### 本星期Action Items\n\n#### ✅每日做\n- 記錄空腹血糖 (如果方便)\n- 避免高果糖食物\n- 記錄高鹽/高MSG食物\n\n#### ✅每週做\n- 解讀驗血報告\n- 追蹤尿酸趨勢\n\n#### ❌避免\n- 甜飲/高果糖飲品\n- 啤酒\n- 高鹽加工食品\n- MSG (味精)\n\n---\n\n## Lesson 6 - 血脂深度解讀：LDL/HDL Pattern A vs Pattern B\n\n*呢一堂深入講解：點睇血脂報告？邊個先係真正嘅壞蛋？Pattern A vs Pattern B點睇？*\n\n---\n\n### 核心概念：膽固醇係必需既！\n\n#### 膽固醇三大用途\n\n| 用途 | 說明 |\n|------|------|\n| **細胞膜** | 構成每個細胞既「太空衣」，保護細胞完整 |\n| **荷爾蒙原料** | 製造性荷爾蒙、皮質醇等 |\n| **Signal調節** | 調節細胞膜既滲透性和發炎反應 |\n\n> 「冇咗膽固醇，我哋唔會生存到」\n\n---\n\n### LDL vs HDL — 貨車既比喻\n\n| 類型 | 比喻 | 功能 |\n|------|------|------|\n| **LDL** | 🚚 送貨車 | 由肝臟出發，送膽固醇去身體各部位 |\n| **HDL** | ♻️ 回收車 | 回收用剩既膽固醇，返去肝臟 |\n\n#### LDL送貨過程\n\n```\n肝臟製造LDL\n    ↓\nLDL載著膽固醇出發\n    ↓\n去到目的地\n    ↓\n落貨 (膽固醇用係建造/修補身體)\n    ↓\n完成使命\n```\n\n#### HDL回收過程\n\n```\n用剩既膽固醇\n    ↓\nHDL回收\n    ↓\n返去肝臟\n    ↓\n重新分配/排出\n```\n\n---\n\n### Pattern A vs Pattern B — 大粒 vs 小粒\n\n#### 兩種LDL既分別\n\n| Pattern | 大小 | 特性 | 風險 |\n|---------|------|------|------|\n| **Pattern A** | 大粒、鬆身 | 易被回收，唔易塞血管 | ✅ 安全 |\n| **Pattern B** | 小粒、密實 | 易塞血管、易氧化 | ❌ 高風險 |\n\n#### Pattern B點解咁危險？\n\n| 特性 | 點解危險？ |\n|------|-----------|\n| **小粒** | 容易穿過血管壁，塞係傷口度 |\n| **密實** | 容易氧化，變成「壞膽固醇」 |\n| **難回收** | 塞住咗就拎唔返 |\n\n---\n\n### LDL Direct vs Calculated — 邊個準？\n\n#### 驗血既兩種方法\n\n| 方法 | 說明 | 準確度 |\n|------|------|--------|\n| **LDL Direct** | 直接測量LDL濃度 | ✅ 準確 |\n| **LDL Calculated** | 用公式計出嚟 | ⚠️ 有機會出錯 |\n\n#### Calculated LDL公式\n\n```\n總膽固醇 = LDL + HDL + VLDL\nVLDL ≈ Triglycerides ÷ 5\nLDL = 總膽固醇 - HDL - (Triglycerides ÷ 5)\n```\n\n#### 咩情況下Calculated會出錯？\n\n| 情況 | 點解唔準？ |\n|------|-----------|\n| **糖尿病前期/糖尿病** | Triglycerides通常偏高 |\n| **Triglycerides極低** | VLDL比例唔符合5倍 |\n\n> 「有條件既話，叫醫生驗LDL Direct」\n\n---\n\n### Triglycerides/HDL Ratio — 估LDL Size既方法\n\n#### 點計？\n\n| 步驟 | 做法 |\n|------|------|\n| **1** |拎Triglycerides數值 (mg/dL) |\n| **2** |拎HDL數值 (mg/dL) |\n| **3** |Triglycerides ÷ HDL |\n\n#### 健康標準\n\n| Ratio範圍 | 判斷 |\n|-----------|------|\n| **< 0.5** | ✅ 極健康 |\n| **0.5 - 1.0** | ✅ 健康 |\n| **> 1.0** | ⚠️ Pattern B偏多 |\n| **> 2.0** | ❌ 高風險 |\n\n> 「呢條數越細越好！細過1.0先叫安全」\n\n---\n\n### HDL/LDL Ratio — 回收效率\n\n#### 點計？\n\n```\nHDL ÷ LDL = 回收比率\n```\n\n#### 健康標準\n\n| 比率 | 判斷 |\n|------|------|\n| **> 0.4** | ✅ 極健康 |\n| **0.2 - 0.4** | ⚠️ 正常 |\n| **< 0.2** | ❌ 回收效率低 |\n\n> 「LDL出街0.4粒返黎 = 極度健康」\n\n---\n\n### Small Dense LDL (Pattern B) 點嚟？\n\n#### Pattern B點解會多？\n\n```\n高果糖飲食\n    ↓\n肝臟製造大量Triglycerides\n    ↓\n肝臟用Triglycerides製造LDL\n    ↓\nLDL變得細粒密實 (Pattern B)\n    ↓\n易塞血管、易氧化\n```\n\n#### 點樣減少Pattern B？\n\n| 方法 | 做法 |\n|------|------|\n| **低果糖飲食** | 戒甜飲、減少添加糖 |\n| **低升糖飲食** | 食菜→肉→飯次序 |\n| **行路** | 每日6000步以上 |\n| **控制尿酸** | 尿酸高會促進果糖製造 |\n\n---\n\n### HDL點解會低？\n\n#### HDL低既原因\n\n| 原因 | 解釋 |\n|------|------|\n| **Pattern B太多** | 塞咗既LDL拎唔返，HDL工作量少 |\n| **Triglycerides太高** | 肝臟冇資源製造靚LDL |\n| **運動不足** | 運動可以提升HDL |\n\n#### HDL點樣提升？\n\n| 方法 | 原理 |\n|------|------|\n| **行路** | 運動直接提升HDL |\n| **低果糖飲食** | 減少Triglycerides，HDL自然改善 |\n| **控制尿酸** | 尿酸低→果糖製造少→Triglycerides低 |\n\n---\n\n### Special Case：點滴 (IV Drip) 同痛風\n\n#### 點解打點滴會引發痛風？\n\n| 成分 | 作用 |\n|------|------|\n| **葡萄糖** | 直接入血，血糖急升 |\n| **電解質 (鈉)** | 鈉急升，身體以為要儲水 |\n\n#### 點滴引發痛風既過程\n\n```\n點滴滴葡萄糖\n    ↓\n血糖急升 → 胰島素急升\n    ↓\n鈉急升 → 身體缺水信號\n    ↓\n身體製造果糖 (自保機制)\n    ↓\n果糖→尿酸急升\n    ↓\n痛風發作！\n```\n\n> 「有病入醫院打點滴時，如果本身尿酸已經偏高，要小心呢件事」\n\n---\n\n### Special Case：老火湯同尿酸\n\n#### 點解老火湯會高尿酸？\n\n| 過程 | 解釋 |\n|------|------|\n| **長時間煲煮** | 肉類細胞爆裂，DNA/RNA (Purine) 溶入湯 |\n| **流質** | 湯好快被吸收，Purine快速入血 |\n| **取代消化** | 煲咗幾個鐘 = 代替咗你個胃消化 |\n\n#### 老火湯 vs 普通湯\n\n| 湯類 | Purine吸收 | 尿酸影響 |\n|------|------------|----------|\n| **老火湯 (煲幾個鐘)** | 🔴🔴🔴🔴🔴 快同多 | 高 |\n| **滾湯 (煲半鐘內)** | 🔴🔴🔴 較少 | 中等 |\n\n> 「瘦底飲老火湯尿酸影響大啲；肥底影響細啲」\n\n---\n\n### Vitamin K2 — 護骨定護心？\n\n#### K2既功能\n\n| 功能 | 說明 |\n|------|------|\n| **送鈣入骨** | 將血液中既鈣送去骨頭 |\n| **唔送鈣入血管** | 防止血管鈣化 |\n| **護心** | 減少血管硬化 |\n\n#### K2邊度嚟？\n\n| 來源 | K2含量 |\n|------|--------|\n| **發酵食品** | ✅ 極高 (例如natto) |\n| **動物肝臟** | 中等 |\n| **蛋黃** | 少量 |\n| **芝士** | 少量 |\n\n#### K2點補充？\n\n| 方法 | 份量 |\n|------|------|\n| **Supplement** | 低劑量 (MK-7形式) |\n| **食物** | 發酵食品、Natto |\n\n> 「K2要低劑量，唔好食太高劑量」\n\n---\n\n### Magnesium (鎂) — 護心礦物\n\n#### Magnesium既功能\n\n| 功能 | 說明 |\n|------|------|\n| **平衡鈣** | 對抗血管鈣化 |\n| **降低血壓** | 放鬆血管 |\n| **護心** | 減少心臟病風險 |\n\n####點解現代人容易缺鎂？\n\n| 原因 | 解釋 |\n|------|------|\n| **農產品變化** | 工業化耕種令土壤鎂含量下降 |\n| **加工食品** | 加工過程流失鎂 |\n| **現代飲食** | 少食深綠色蔬菜 |\n\n#### Magnesium點補充？\n\n| 方法 | 份量 |\n|------|------|\n| **Supplement** | 每日200-400mg |\n| **食物** | 堅果、種子、深綠色蔬菜 |\n\n---\n\n### Vascular Calcification (血管鈣化)\n\n#### 咩係血管鈣化？\n\n| 階段 | 過程 |\n|------|------|\n| **第一階段** | 鈣離開骨頭 |\n| **第二階段** | 鈣沉積係血管壁 |\n| **第三階段** | 血管變硬、變窄 |\n\n#### 點樣預防？\n\n| 方法 | 作用 |\n|------|------|\n| **K2** | 送鈣入骨 |\n| **鎂** | 平衡鈣、防止沉積 |\n| **維他命D** | 帮助K2運作 |\n| **行路** | 改善血管健康 |\n\n---\n\n### 本星期要做既嘢 (Week 6)\n\n#### 每日基本\n\n| 項目 | 要求 |\n|------|------|\n| **步數** | 每日6000步起步 |\n| **低果糖飲食** | 戒甜飲、減少添加糖 |\n| **進食順序** | 菜 → 肉 → 飯 |\n\n#### 驗血指標\n\n| 指標 | 點睇？ |\n|------|--------|\n| **LDL Direct** | 有就驗，冇就用Calculated |\n| **Triglycerides/HDL Ratio** | < 1.0 先安全 |\n| **HDL/LDL Ratio** | 越高越好 |\n\n#### 要避免既嘢\n\n| 陷阱 | 替代品 |\n|------|--------|\n| **啤酒** | 水、綠茶 |\n| **老火湯** | 滾湯 (煲少於1小時) |\n| **高糖醬汁** | 檸檬汁、醋 |\n| **加工食品** | 新鮮食材 |\n\n#### 建議補充品\n\n| 補充品 | 份量 | 作用 |\n|--------|------|------|\n| **Vitamin K2 (MK-7)** | 低劑量 | 送鈣入骨 |\n| **Magnesium** | 200-400mg | 護心、平衡鈣 |\n\n---\n\n### 金句回顧\n\n1. 「膽固醇係必需既，唔好污名化佢」\n2. 「Pattern B (小粒LDL) 先係真正敵人，唔係LDL本身」\n3. 「Triglycerides/HDL Ratio < 1.0 先叫安全」\n4. 「HDL低唔係問題，係結果；解決Pattern B就提升HDL」\n5. 「K2 + 鎂 = 血管鈣化既最佳防線」\n\n---\n\n## Key Takeaways (Lesson 6)\n\n### 核心概念\n\n#### LDL Pattern\n| Pattern | 大小 | 風險 | 特性 |\n|---------|------|------|------|\n| **Pattern A** | 大粒 | 低 | 易回收 |\n| **Pattern B** | 小粒 | 高 | 易塞血管 |\n\n#### 驗血指標\n| 指標 | 健康標準 |\n|------|----------|\n| **Triglycerides/HDL Ratio** | < 1.0 |\n| **HDL/LDL Ratio** | > 0.2 |\n| **LDL Direct** | 有就驗 |\n\n### 本星期Action Items\n\n#### ✅每日做\n- 6000步\n- 低果糖飲食\n- 戒啤酒\n\n#### ✅驗血跟進\n- 拎報告睇Triglycerides/HDL Ratio\n- LDL Direct (如果有)\n\n#### ❌避免\n- 啤酒\n- 老火湯 (用滾湯取代)\n- 高糖醬汁\n- 加工食品\n\n---\n\n## Lesson 7 - 第6周Meet Point：心血管健康深度解讀\n\n*呢一堂深入講解：心血管病點樣預防？Small Dense LDL點解係關鍵？藥物既利弊？*\n\n---\n\n### 核心概念：12星期Meet Point\n\n#### 第6星期意義\n\n| 重點 | 說明 |\n|------|------|\n| **里程碑** | 完成一半，需要檢視進度 |\n| **身體檢查** | 建議做第一次驗血報告對比 |\n| **智能磅** | 每日追蹤體重、內臟脂肪 |\n| **坚持** | 話咁快就過，唔好跳課 |\n\n---\n\n### 心血管疾病 (CVD) — 沉默既殺手\n\n#### CVD有幾危險？\n\n| 特性 | 說明 |\n|------|------|\n| **沉默** | 平時冇先兆，突然爆發 |\n| **致命** | 心肌停頓、腦中風，死得就死 |\n| **永久傷害** | 不死都會有長期後遺症 |\n\n#### 血管有幾長？\n\n| 事實 | 數字 |\n|------|------|\n| **總長度** | 超過10萬公里 |\n| **比喻** | 可以圍繞地球兩次半 |\n| **問題** | 邊度塞咗、邊度脆咗好難知 |\n\n---\n\n### 管理心血管健康三大方向\n\n#### 方向一：減少血管堵塞 (Plaque Build-up)\n\n| 關鍵指標 | 說明 |\n|----------|------|\n| **Small Dense LDL** | 呢個先係真正敵人！ |\n| **Triglycerides/HDL Ratio** | >1.0表示有問題 |\n| **HDL/LDL Ratio** | 越高越好 |\n\n#### 方向二：保持血管彈性 (Flexibility)\n\n| 做法 | 作用 |\n|------|------|\n| **行路** |強化心臟、降低血壓 |\n| **陽光下行路** | 產生Nitric Oxide，擴張血管 |\n| **控制血壓** | 減少血管壓力 |\n\n#### 方向三：減少發炎氧化 (Inflammation/Oxidation)\n\n| 指標 | 說明 |\n|------|------|\n| **hsCRP** | 發炎指數，越低越好 |\n| **Oxidation** | LDL氧化後更容易塞血管 |\n\n---\n\n### Small Dense LDL — 真正既敵人\n\n#### Small Dense LDL點解咁危險？\n\n| 特性 | 點解危險？ |\n|------|-----------|\n| **小粒** | 容易穿過血管壁 |\n| **密實** | 容易氧化 |\n| **難回收** | 塞咗就拎唔返 |\n\n#### 點樣減少Small Dense LDL？\n\n| 方法 | 做法 |\n|------|------|\n| **減糖** | 減少果糖攝入 |\n| **戒酒** |尤其是啤酒 |\n| **清肝糖** | 飯前清肝糖減少肝臟負擔 |\n| **行路** | 運動改善LDL Size |\n\n---\n\n### 血壓管理\n\n#### 血壓點解影響血管？\n\n| 影響 | 說明 |\n|------|------|\n| **高血壓** | 直接傷害血管內壁 |\n| **長期傷害** | 血管變硬、變脆 |\n| **高血壓原因** | Winter Mode長期啟動 |\n\n#### 點樣降低血壓？\n\n| 方法 | 原理 |\n|------|------|\n| **行路** | 強化心臟、降低靜止心跳 |\n| **陽光下行路** | 產生Nitric Oxide擴張血管 |\n| **Exit Winter Mode** | 離開核子冬天模式 |\n| **減少鹽分** | 高鹽導致儲水、升高血壓 |\n\n---\n\n### 行路既超級力量\n\n#### 行路有幾好？\n\n| 效果 | 說明 |\n|------|------|\n| **強化心臟** | 靜止心跳60→行路後80-90，心臟變強 |\n| **擴張血管** | Nitric Oxide增加，血管更有彈性 |\n| **降低血壓** | 阻力減少，血壓自然降低 |\n| **Flexibility** | 血管唔好咁硬，減少爆血管風險 |\n\n#### 最佳行路時間\n\n| 時間 | 做法 |\n|------|------|\n| **陽光底下** | 產生維他命D + Nitric Oxide |\n| **飯後** | 幫助消化、降血糖 |\n| **每日6000步** | 最基本要求 |\n\n---\n\n### 維他命D同Nitric Oxide\n\n#### 維他命D點解重要？\n\n| 功效 | 說明 |\n|------|------|\n| **骨頭健康** | 幫助鈣吸收 |\n| **血壓控制** | 維他命D低通常血壓高 |\n| **陽光** | 食Supplement不如曬太陽 |\n\n#### Nitric Oxide (一氧化氮)\n\n| 功能 | 作用 |\n|------|------|\n| **擴張血管** | 令血管變粗，血流更順 |\n| **行路產生** | 陽光下行路係最佳方法 |\n| **即時效果** | 行完血管擴張，血壓即時降低 |\n\n---\n\n### 肝臟健康 — FibroScan\n\n#### 點解要check肝？\n\n| 指標 | 正常範圍 |\n|------|----------|\n| **肝脂肪** | 肥底容易300+，瘦底都會200頭滿 |\n| **肝硬度** | 脂肪肝可逆轉，肝硬化唔得 |\n\n#### 點樣改善肝健康？\n\n| 方法 | 作用 |\n|------|------|\n| **Exit Winter Mode** | 清走肝脂肪 |\n| **減糖** | 減少果糖製造 |\n| **戒酒** | 啤酒最傷肝 |\n\n---\n\n### 藥物既利弊\n\n#### Statins (降膽固醇藥)\n\n| 面向 | 說明 |\n|------|------|\n| **作用** | 抑制肝製造膽固醇 |\n| **問題** | 只降數量，唔改善Size |\n| **適用情況** | 已有心血管病歷史 |\n\n> 「Statins有抗發炎作用，已經出事嘅人食有好處」\n\n#### Aspirin (阿士匹靈)\n\n| 面向 | 說明 |\n|------|------|\n| **作用** | 稀釋血液，減少凝血 |\n| **風險** | 可能內出血 |\n| **適用情況** | 高風險人士 |\n\n> 「冇事嘅人唔好食住，有事先食」\n\n#### Calcium Supplement (鈣補充)\n\n| 面向 | 說明 |\n|------|------|\n| **問題** | 可能沉積係血管，加速鈣化 |\n| **最新研究** | 食Calcium Supplement對骨頭冇明顯幫助 |\n| **建議** | 食Calcium rich食物好過食Supplement |\n\n---\n\n### 長途機策略\n\n#### 飛行點樣唔好出事？\n\n| 做法 | 原因 |\n|------|------|\n| **上機前3小時食完嘢** | 消化完成，唔會血糖飆升 |\n| **長途機Fasting** | 10幾個鐘唔食嘢，身體handle到 |\n| **唔好食飛機餐** | 全部係垃圾嘢 |\n| **落機先去食** | 用Fasting狀態去面對新時區 |\n\n---\n\n### 本星期要做既嘢 (Week 6-7)\n\n#### 每日基本\n\n| 項目 | 要求 |\n|------|------|\n| **步數** | 每日6000步起步 |\n| **陽光下行路** | 盡量每日有陽光底下步行 |\n| **監測血壓** | 如果有血壓計 |\n\n#### 驗血跟進\n\n| 項目 | 做法 |\n|------|------|\n| **HbA1c** | 每3個月check一次 |\n| **Triglycerides/HDL Ratio** | 目標 < 1.0 |\n| **hsCRP** | 發炎指數，越低越好 |\n| **FibroScan** | 有機會check肝脂肪 |\n\n#### 要避免既嘢\n\n| 陷阱 | 替代品 |\n|------|--------|\n| **啤酒** | 水、綠茶 |\n| **高糖食物** | 原型食物 |\n| **Calcium Supplement** | 食Calcium rich食物 |\n| **Aspirin (冇事既)** | 唔好食住 |\n\n---\n\n### 金句回顧\n\n1. 「Small Dense LDL先係真正敵人，唔係LDL總量」\n2. 「10萬公里血管，唔知邊度塞咗、邊度脆咗先係問題」\n3. 「行路強化心臟，靜止心跳低 = 長壽」\n4. 「陽光底下行路先會產生Nitric Oxide」\n5. 「Exit Winter Mode = Exit心血管病」\n\n---\n\n## Key Takeaways (Lesson 7)\n\n### 核心概念\n\n#### 心血管健康三大方向\n| 方向 | 重點 |\n|------|------|\n| **減少堵塞** | Small Dense LDL、Triglycerides |\n| **保持彈性** | 行路、血管擴張 |\n| **減少發炎** | hsCRP、Oxidation |\n\n### Small Dense LDL\n| 特性 | 點解危險 |\n|------|-----------|\n| 小粒 | 容易穿過血管壁 |\n| 密實 | 容易氧化 |\n| 難回收 | 塞咗拎唔返 |\n\n### 行動清單\n\n#### ✅每日做\n- 6000步\n- 陽光底下步行\n- 戒啤酒\n\n#### ✅驗血跟進\n- HbA1c\n- Triglycerides/HDL Ratio (<1.0)\n- hsCRP\n\n#### ❌避免\n- 啤酒\n- 高糖食物\n- Calcium Supplement\n- Aspirin (冇事既人)\n\n---\n\n## Lesson 7.5 - Quality Change & 發炎氧化補充堂\n\n*呢一堂補充六七堂之餘，總結咗參加者六星期後既Quality Change，並深入講解發炎同氧化既關鍵因素*\n\n---\n\n### Quality Change — 六星期後既改變\n\n#### 第一類：Energy & Vitality 能量活力\n\n| 改變 | 說明 |\n|------|------|\n| **新陳代譤變好** | Exit Winter Mode，由核子冬天變夏天 |\n| **睡眠改善** | 瞓得更好，冇咁易醒 |\n| **整體活力提升** | 感覺年輕咗，有力咗 |\n\n#### 第二類：Physical Health 身體健康\n\n| 改變 | 說明 |\n|------|------|\n| **皮膚變好** | 由內到外嘅改善 |\n| **消化改善** | 大便靚咗，肚痛減少 |\n| **痛症減少** | 各種痛症都有改善 |\n\n#### 第三類：Mental Emotional Well-being 精神情緒\n\n| 改變 | 說明 |\n|------|------|\n| **壓力減少** | 冇咁緊張 |\n| **腦筋轉快咗** | 諗嘢快咗 |\n| **記憶力好咗** | 冇咁善忘 |\n\n#### 第四類：Dietary & Lifestyle 飲食生活\n\n| 改變 | 說明 |\n|------|------|\n| **對甜食冇咁渴望** | 以前流口水家吓唔流 |\n| **味覺改變** | 一丁點甜都覺得甜 |\n| **愛上行路** | 好多人話愛上行路 |\n| **家人受影響** | 屋企人話飯後行路幾好 |\n\n---\n\n### Winter Mode 核子冬天 — 點解我地嘅新陳代譤咁差？\n\n#### Winter Mode 係乜？\n\n| 特性 | 說明 |\n|------|------|\n| **起源** | 人類過冬生存機制 |\n| **目的** | 儲脂肪、保暖、應付糧食短缺 |\n| **問題** | 現代人冇冬天，但用飲食trigger咗佢 |\n\n#### Winter Mode 點解有害？\n\n| 後果 | 說明 |\n|------|------|\n| **高血壓** | 血管收縮保溫 |\n| **儲脂肪** | 令你變肥 |\n| **新陳代譤慢** | 以為冇嘢食 |\n\n> 「現代人嘅Winter Mode係自己搞出嚟嘅，唔係真係冬天」\n\n---\n\n### 心血管健康四大方向 (Revisited)\n\n| 方向 | 重點 |\n|------|------|\n| **Small Dense LDL** | Pattern B先係真正敵人 |\n| **血管彈性** | Flexibility關係到血管功能 |\n| **血壓正常化** | 長期高血壓傷血管 |\n| **減少發炎氧化** | 呢個先係最大問題 |\n\n---\n\n### 口腔健康 — 你估唔到咁重要\n\n#### 口腔點解影響全身？\n\n| 機制 | 說明 |\n|------|------|\n| **細菌入血管** | 刷到血就直入血液系統 |\n| **影響胰島素信號** | 口腔細菌干擾細胞接收胰島素 |\n| **增加發炎** | 全身慢性發炎 |\n| **惡性循環** | 胰島素阻抗→更多發炎 |\n\n#### 點解會咁？\n\n| 過程 | 結果 |\n|------|------|\n| 口腔細菌入血管 | 去到肌肉、脂肪組織 |\n| 干擾胰島素信號 | 細胞唔吸收血糖 |\n| 需要更多胰島素 | 胰臟Beta Cell更辛苦 |\n| 加速衰老 | 發炎+氧化雙重打擊 |\n\n> 「日本糖尿醫生叫病人刷牙，之後糖尿好咗」\n\n#### 點樣保護口腔？\n\n| 動作 | 建議 |\n|------|------|\n| **刷牙次數** | 每日最少兩次 |\n| **牙刷選擇** | 細刷頭、軟毛 |\n| **刷牙技巧** | 角度啱、力度啱 |\n| **洗牙頻率** | 6-12個月一次 |\n\n#### 牙膏點揀？\n\n| 避免 | 原因 |\n|------|------|\n| **Fluoride (氟)** | 香港食水已有，唔使多 |\n| **SLS (起泡劑)** | 刺激口腔黏膜，可能生飛滋 |\n| **Alcohol (酒精)** | 傷害口腔組織 |\n| **Xylitol (代糖)** | 可能引致高血壓 |\n\n#### 漱口水建議\n\n| 選擇 | 做法 |\n|------|------|\n| **Hydrogen Peroxide** | 有呢種成分的漱口水 |\n| **頻率** | 有問題先用，唔好日日用 |\n| **避免** | 酒精、SLS |\n\n---\n\n### 吸煙同空氣污染\n\n#### 吸煙嘅害處\n\n| 害處 | 影響 |\n|------|------|\n| **傷害血管內皮** | 直接傷害血管壁 |\n| **增加血小板形成** | 加速血管堵塞 |\n| **一氧化碳** | 黐住血紅蛋白，降低帶氧能力 |\n| **引致發炎氧化** | 全身慢性發炎 |\n\n#### 空氣污染 (PM2.5)\n\n| 害處 | 影響 |\n|------|------|\n| **傷害血管內皮** | 同吸煙類似 |\n| **增加發炎氧化** | 全身性影響 |\n| **影響紅血球** | 帶氧能力下降 |\n\n#### 點樣應對？\n\n| 方法 | 建議 |\n|------|------|\n| **行路地點** | 揀空氣好啲的地方（海邊、郊區） |\n| **室內通風** | 定期開窗換氣 |\n| **避開污染區** | 唔好喺污染嚴重嘅地方做運動 |\n\n---\n\n### AGE (晚期糖化終產物)\n\n#### AGE 係乜？\n\n| 特性 | 說明 |\n|------|------|\n| **全名** | Advanced Glycation End Products |\n| **點嚟** | 糖同蛋白質/脂肪結合產生 |\n| **危害** | 令身體組織變質、老化 |\n| **點解出現** | 高血糖 + 烹調過程 |\n\n#### 邊度嚟？\n\n| 來源 | 說明 |\n|------|------|\n| **內在產生** | 高血糖時身體自己製造 |\n| **外在攝入** | 經食物食落肚（梅納反應） |\n\n#### 梅納反應 (Maillard Reaction)\n\n| 特性 | 例子 |\n|------|------|\n| **乜嘢係** | 糖喺高溫下同蛋白質/脂肪結合 |\n| **幾時見到** | 燒烤、煎炸、焗食 |\n| **結果** | 好香口，但AGE爆表 |\n\n> 「燒到焦焦地好香口，但其實係食AGE落肚」\n\n#### AGE點影響我地？\n\n| 影響 | 結果 |\n|------|------|\n| **傷害血管內皮** | 血管發炎、硬化 |\n| **加速衰老** | 皮膚、其他組織退化 |\n| **增加發炎** | 慢性發炎惡化 |\n| **一脈相承** | 返去Small Dense LDL、血管問題 |\n\n---\n\n### 點樣減少AGE？\n\n| 方法 | 做法 |\n|------|------|\n| **控制血糖** | 空腹血糖3.9-4.0，餐後唔好飆 |\n| **睇HbA1c** | 理想係4字頭 |\n| **減少高AGE食物** | 少燒烤、煎炸 |\n| **改變烹調方法** | 蒸、灼、燉為主 |\n| **長時間改變** | 以往累積的要慢慢消除 |\n\n---\n\n### 總結：呢半堂學到乜？\n\n| 範疇 | 重點 |\n|------|------|\n| **Quality Change** | 六星期可以有好多正面改變 |\n| **Winter Mode** | 係現代人新陳代譤差嘅根源 |\n| **口腔健康** | 同糖尿、心臟病極大關係 |\n| **吸煙/污染** | 同吸煙危害差不多 |\n| **AGE** | 糖化係老化最大推手 |\n\n---\n\n## Key Takeaways (Lesson 7.5)\n\n### Quality Change 四大範疇\n\n| 範疇 | 改善 |\n|------|------|\n| **能量活力** | Exit Winter Mode、睡眠改善 |\n| **身體健康** | 皮膚、消化、痛症 |\n| **精神情緒** | 壓力減少、腦筋靈活 |\n| **飲食生活** | 甜食渴望減少、愛上行路 |\n\n### 發炎氧化六大因素\n\n| 因素 | 點樣減少 |\n|------|----------|\n| **口腔細菌** | 每日刷牙、半年洗牙 |\n| **吸煙** | 戒咗佢 |\n| **空氣污染** | 避開污染區、行海邊/郊區 |\n| **高血糖** | 控制血糖、HbA1c |\n| **AGE** | 少燒烤、蒸灼為主 |\n| **長期高血壓** | 行路exit winter mode |\n\n### Action Items\n\n#### ✅ 每日做\n- 早晚刷牙 (細刷頭、軟毛)\n- 6000步\n- 盡量揀空氣好嘅地方行路\n\n#### ✅ 每6-12月做\n- 洗牙一次\n- 問牙醫邊度牙石最多\n\n#### ❌ 避免\n- 吸煙 (包括二手煙)\n- 高AGE食物 (燒烤、煎炸)\n- 含SLS/酒精/Xylitol牙膏\n- Fluoride牙膏 (香港食水已有)\n\n---\n\n## Lesson 8 - 發炎指標、肝臟健康、Omega 3/6 比例\n\n*呢一堂深入講解：HSCRP點睇？肝臟健康有幾重要？Omega 3/6點解咁關鍵？陽光對維他命D有幾重要？*\n\n---\n\n### HSCRP (High-Sensitivity C-Reactive Protein) — 發炎指標\n\n#### 咩係HSCRP？\n\n| 特性 | 說明 |\n|------|------|\n| **全名** | High-Sensitivity C-Reactive Protein |\n| **邊度製造** | 肝臟製造 |\n| **代表咩** | 身體發炎程度 |\n\n#### CRP vs HSCRP\n\n| 測試 | 用途 | 範圍 |\n|------|------|------|\n| **CRP** | 測急性發炎 | 0.1 - 100+ |\n| **HSCRP** | 測慢性發炎 | 0.1 - 10 |\n\n> 「一定要做HSCRP，唔係CRP。CRP係測急性發炎，HSCRP先睇到慢性發炎。」\n\n#### HSCRP理想水平\n\n| 水平 | 狀態 |\n|------|------|\n| **0.1 - 0.15** | 最理想 |\n| **< 1.0** | 仲可以接受 |\n| **> 1.0** | 有慢性發炎 |\n\n> 「0.1至0.15先係最理想，高過呢個就代表有發炎。」\n\n#### HSCRP點解咁重要？\n\n| 關係 | 說明 |\n|------|------|\n| **心血管風險** | HSCRP高 = 心臟病/中風風險高 |\n| **血管受傷** | 長期血管受傷 = 長期發炎 |\n| **間接指標** | 十萬公里血管，間接反映整體狀況 |\n\n> 「HSCRP高 + Small Dense LDL差 = 心血管風險比人高」\n\n---\n\n### 肝臟健康 — Stiffness (硬度)\n\n#### 肝臟點解重要？\n\n| 功能 | 說明 |\n|------|------|\n| **解毒** | 處理身體毒素 |\n| **代謝脂肪** | 製造、處理脂肪 |\n| **製造膽固醇** | HDL、LDL來源 |\n\n#### 肝硬度分級\n\n| 狀態 | 說明 |\n|------|------|\n| **正常** | 第一格 |\n| **變硬** | 第二格，開始有問題 |\n| **纖維化** | 第三格，好嚴重 |\n| **肝硬化** | 末期，好大件事 |\n\n> 「唔好以為第一格就冇事，第一格都已經有問題。」\n\n#### 點樣令肝變硬？\n\n| 原因 | 過程 |\n|------|------|\n| **果糖** | 脂肪肝 → 發炎 → 變硬 |\n| **高Carbs** | 特別係高升糖Carbs |\n| **酒精** | 直接傷害肝細胞 |\n| **差油** | 種子油、氫化油 |\n\n#### 脂肪肝 vs 肝硬度\n\n| 例子 | 脂肪比例 | 硬度 |\n|------|----------|------|\n| **肥底** | 250+ | 3-4 |\n| **瘦底** | 220-230 | 5-6 |\n\n> 「瘦底人可能脂肪少啲，但硬度反而高啲——因為佢哋嘅肝已經被折磨緊。」\n\n#### 點樣改善肝硬度？\n\n| 方法 | 作用 |\n|------|------|\n| **Exit Winter Mode** | 減少肝脂肪 |\n| **減少果糖** | 唔好再整爆肝 |\n| **戒酒/少酒** | 紅酒1杯/日、威士忌少啲 |\n| **行路** | 改善整體代謝 |\n\n---\n\n### Omega 3 vs Omega 6 — 呢個真係好重要\n\n#### 點解要有比例？\n\n| 特性 | 理想比例 |\n|------|----------|\n| **Omega 3 : Omega 6** | 1 : 1 至 1 : 2 |\n\n#### 現代飲食有咩問題？\n\n| 問題 | 比例 |\n|------|------|\n| **現代人飲食** | 1 : 50 至 1 : 1000 |\n| **問題所在** | Omega 6過多 |\n\n> 「最佳比例係1:1至1:2，但我哋而家食到1:50甚至1:1000。」\n\n#### 咩油係差油？\n\n| 差油 | Omega 6比例 |\n|------|-------------|\n| **粟米油** | 超高Omega 6 |\n| **生油/花生油** | 超高Omega 6 |\n| **蔬菜油** | 超高Omega 6 |\n| **種子油** | 極高Omega 6 |\n\n> 「呢啲油全部都係1對50到1對1000。粟米油、生油、蔬菜油全部都係最差、最平、最工業化嘅油。」\n\n#### 好油點揀？\n\n| 好油 | 特點 |\n|------|------|\n| **初榨橄欖油** | Omega 3比例好，但要生食或快炒 |\n| **牛油果油** | 燃點高，可以煮食 |\n| **動物脂肪** | 草飼牛油、豬油，燃點高 |\n\n#### 用油原則\n\n| 原則 | 說明 |\n|------|------|\n| **唔好買大枝** | 油好快變壞，變壞咗就有害 |\n| **唔好趁減價** | 平嘢冇好嘢 |\n| **用完先買新** | 一支用完先開第二支 |\n| **自己要試** | 試清楚邊隻啱自己 |\n\n> 「油呢樣嘢係值得花錢買高質素，因為呢個係你對沖現代垃圾飲食嘅其中一個最重要方法。」\n\n---\n\n### Omega 3 點補充？\n\n#### Omega 3邊度嚟？\n\n| 來源 | 形式 |\n|------|------|\n| **深海魚** | EPA, DHA |\n| **海藻** | 植物性Omega 3 (ALA) |\n| **亞麻籽** | ALA |\n\n#### 點補充最好？\n\n| 方法 | 建議 |\n|------|------|\n| **魚油** | 每日1-2粒 |\n| **蝦油** | 每日1粒，有額外抗氧化物 |\n| **亞麻籽** | 磨碎，加乳酪食 |\n\n> 「我每日魚油1粒、蝦油1粒，然後有食乳酪就加亞麻籽。」\n\n#### 邊種Omega 3最好？\n\n| 形式 | 吸收率 |\n|------|--------|\n| **DHA** | 最好（對腦同心血管最重要） |\n| **EPA** | 都好，當Bonus |\n| **ALA** | 吸收率一般，但有其他益處 |\n\n---\n\n### 維他命D — 陽光先係王道\n\n#### 維他命D有幾重要？\n\n| 事實 | 說明 |\n|------|------|\n| **影響基因** | 超過200個基因受維他命D调控 |\n| **作用範圍** | 身體幾乎所有組織都有維他命D受體 |\n| **等同水同空氣** | 生存必需品 |\n\n> 「陽光對我哋健康嘅重要性，同水同空氣差唔多——係不能取代嘅。」\n\n#### 陽光嘅好處\n\n| 好處 | 說明 |\n|------|------|\n| **維他命D合成** | UVB紫外線令皮膚製造維他命D |\n| **脂肪分解** | 直接促進lipolysis |\n| **粒線體功能** | 刺激粒線體，改善代謝 |\n| **一氧化氮** | 血管擴張，降低血壓 |\n| **發炎減少** | 直接downregulate發炎物質 |\n| **骨頭健康** | 幫助鈣吸收，平衡造骨/破骨 |\n| **散熱功能** | 改善汗腺同血管擴張 |\n\n#### 維他命D點先係最好？\n\n| 來源 | 效果 |\n|------|------|\n| **陽光製造** | 100%活性，最有效 |\n| **食Supplement** | 可以補，但效果差過陽光 |\n\n> 「淨係食維他命D補充劑，冇辦法完全取代陽光製造。尤其係一氧化氮(NO)呢樣嘢，淨食補充劑係冇嘅。」\n\n#### 維他命D理想水平\n\n| 水平 | 狀態 |\n|------|------|\n| **< 30** | 不足 |\n| **30-50** | 一般 |\n| **75 - 100** | 理想 |\n| **> 100** | 非常好 |\n\n> 「入冬前最佳係100左右，最起碼要75以上。」\n\n#### 陽光點樣幫你減肥？\n\n| 機制 | 說明 |\n|------|------|\n| **直接脂肪分解** | 陽光照射皮膚直接促進lipolysis |\n| **維他命D水平** | 高維他命D直接facilitate脂肪燃燒 |\n| **粒線體功能** | 刺激粒線體呢個「焚化爐」 |\n| **胰島素敏感度** | 改善細胞對胰島素反應 |\n\n> 「你點做運動都好，冇陽光你都係減得唔夠快或者唔夠健康。」\n\n#### 點樣獲得足夠陽光？\n\n| 方法 | 建議 |\n|------|------|\n| **行路時間** | 早上下午都得 |\n| **每日起碼1-2小時** | 分開幾次 |\n| **唔好戴帽** | 畀陽光直接照到塊面 |\n| **由3月底開始** | 慢慢適應，唔好一開始就猛曬 |\n\n> 「如果你維他命D真係好低，可以食一瓶補充劑（每日1粒），但最緊要都係每日行路接觸陽光。」\n\n---\n\n### 膝頭哥痛點算？\n\n#### 發炎點嚟？\n\n| 原因 | 說明 |\n|------|------|\n| **長期發炎** | 膝頭痛通常係發炎反應 |\n| **Omega 3/6失衡** | 令發炎更嚴重 |\n\n#### 點樣改善？\n\n| 方法 | 做法 |\n|------|------|\n| **魚油+蝦油** | 每日補充Omega 3 |\n| **薑黃素(Curcumin)** | 抗發炎 |\n| **維他命D** | 陽光下行走 |\n| **亞麻籽** | 加乳酪食 |\n| **MSM** | 嚴重先食，對頭髮指甲都有益 |\n\n#### 唔好食咩？\n\n| 嘢 | 原因 |\n|----|------|\n| **葡萄糖胺(Glucosamine)** | 落唔到關節，食咗都冇用 |\n\n> 「葡萄糖胺食咗落肚就消化咗，根本去唔到關節。唔好嘥錢。」\n\n---\n\n### 總結：呢堂學到乜？\n\n| 範疇 | 重點 |\n|------|------|\n| **HSCRP** | 慢性發炎指標，最理想<0.15 |\n| **肝硬度** | 變硬代表肝受損緊，要改善 |\n| **Omega比例** | 現代飲食1:50至1:1000，差油害人 |\n| **用油原則** | 唔好用種子油，要揀好油 |\n| **Omega 3** | 魚油+蝦油每日補充 |\n| **維他命D** | 陽光製造先係王道，等同水同空氣 |\n| **行路** | 一定要行，仲要曬太陽 |\n\n---\n\n## Key Takeaways (Lesson 8)\n\n### 發炎指標\n\n| 指標 | 理想水平 |\n|------|----------|\n| **HSCRP** | < 0.15 |\n| **Triglycerides/HDL** | < 1.0 |\n\n### 肝臟健康\n\n| 指標 | 理想狀態 |\n|------|----------|\n| **肝脂肪比例** | 低 (正常範圍) |\n| **肝硬度** | 第一格，越軟越好 |\n\n### Omega 3/6 比例\n\n| 現實 | 理想 |\n|------|------|\n| 1:50 至 1:1000 | 1:1 至 1:2 |\n\n### 油類選擇\n\n| ❌ 避免 | ✅ 選擇 |\n|---------|---------|\n| 粟米油 | 初榨橄欖油 |\n| 生油/花生油 | 牛油果油 |\n| 蔬菜油 | 草飼動物脂肪 |\n| 種子油 | (快炒/沙律用) |\n\n### 維他命D\n\n| 來源 | 效果 |\n|------|------|\n| 陽光 | 100%活性，最好 |\n| 補充劑 | 可補，但次等 |\n\n### Action Items\n\n#### ✅ 每日做\n- 行路6000步+\n- 盡量接觸陽光 (唔好戴帽)\n- 食魚油+蝦油\n\n#### ✅ 家居用油\n- 唔好用種子油\n- 買細支，用完先買新\n- 試清楚邊隻油啱自己\n\n#### ✅ 避免\n- 高Omega 6油 (粟米油、生油等)\n- 葡萄糖胺 (冇用)\n- 室內長時間逗留\n\n#### 📊 驗血跟進\n- HSCRP (目標 < 0.15)\n- 維他命D (目標 75-100)\n- 肝硬度 (FibroScan)\n\n---\n\n## Lesson 9 - 癌症預防與基因表達\n\n*呢一堂深入講解：點解會有癌症？點樣令身體變成Cancer Friendly Environment？點樣保護自己？*\n\n---\n\n### Cancer — 點解係人類最大恐懼？\n\n#### 癌症有幾恐怖？\n\n| 特性 | 說明 |\n|------|------|\n| **唔會即刻死** | 但發現時已經好大件事 |\n| **對家人影響大** | 一生人都會改變 |\n| **擴散** | 癌细胞会隨血液去到全身 |\n\n> 「癌症最恐怖之處就係擴散——去到邊度就邊度生Cancer」\n\n---\n\n### 基因表達 (Gene Expression) — 點解細胞會變癌？\n\n#### 咩係Gene Expression？\n\n| 概念 | 說明 |\n|------|------|\n| **定義** | 我哋身體點樣表達基因 |\n| **問題** | 如果古代基因表達出嚟，就會變返原始細胞 |\n| **結果** | 不受控制增長 = 癌症 |\n\n#### 點解細胞會變癌？\n\n| 過程 | 說明 |\n|------|------|\n| **細胞生長** | 正常細胞會生長，也會死亡 |\n| **平衡打破** | 生長多過死亡，就會出問題 |\n| **原始化** | 細胞變返單細胞生物嘅模式 |\n| **唔受控制** | 失去原本功能，只係識增長 |\n\n> 「Cancer就係細胞唔受控制咁生長，原本肝細胞應該做肝嘢，而家唔做喇，只係識生長」\n\n---\n\n### Cancer Friendly Environment — 乜嘢環境會引發癌症？\n\n#### 第一大因素：胰島素 (Insulin)\n\n| 關係 | 說明 |\n|------|------|\n| **Insulin = Growth Factor** | 胰島素會刺激細胞生長 |\n| **高胰島素** | 會令細胞過度生長 |\n| **後果** | 增加患癌機會 |\n\n> 「Insulin高 = 患癌機會顯著增加」\n\n#### 第二大因素：慢性發炎 (Chronic Inflammation)\n\n| 問題 | 結果 |\n|------|------|\n| **發炎體** | 長期發炎會分薄免疫系統兵力 |\n| **DNA受損** | 發炎過程會攻擊DNA |\n| **細胞變異** | 正常細胞DNA受損 = 更容易變癌 |\n\n> 「長期發炎 = 免疫系統分薄咗去處理其他地方，癌細胞走漏機會增加」\n\n#### 第三大因素：果糖 (Fructose)\n\n| 特性 | 說明 |\n|------|------|\n| **代謝似癌細胞** | 果糖代謝同癌細胞代謝極度相似 |\n| **無氧呼吸** | 癌細胞用無氧呼吸去快速生長 |\n| **乳酸堆積** | 會創造Cancer Friendly環境 |\n\n> 「果糖代謝同Cancer Cell代謝驚人地相似——你食果糖就等於Training自己身體用Cancer既方式去運作」\n\n---\n\n### 點樣減低患癌風險？\n\n#### 第一步：管理胰島素\n\n| 方法 | 作用 |\n|------|------|\n| **低GI飲食** | 減少血糖飆升 |\n| **管理飯前飯後血糖** | keep Insulin低 |\n| **減少胰島素阻抗** | 細胞對胰島素更敏感 |\n\n> 「低胰島素 = 減少呢個令全部人都唔怕疾病既Factor」\n\n#### 第二步：減少慢性發炎\n\n| 方法 | 作用 |\n|------|------|\n| **Exit Winter Mode** | 減少內臟脂肪 |\n| **改善油既比例** | Omega 3/6平衡 |\n| **維他命D** | 維持正常免疫系統 |\n\n> 「內臟脂肪過多 = 發炎體 = 分薄免疫系統兵力」\n\n#### 第三步：減少果糖攝入\n\n| 方法 | 做法 |\n|------|------|\n| **戒高果糖嘢** | 汽水、果汁、蜜糖 |\n| **保護肝臟** | 肝健康 = 更有效處理果糖 |\n| **維他命C** | 幫助減少果糖傷害 |\n\n> 「清除脂肪肝好重要——肝有Capacity先可以有效處理果糖」\n\n---\n\n### 免疫系統 — 身體嘅防線\n\n#### 免疫系統有咩做？\n\n| 功能 | 說明 |\n|------|------|\n| **Detect** | 發現癌細胞 |\n| **Attack** | 消滅癌細胞 |\n\n> 「99.99%以上既癌細胞都被我哋既免疫系統消滅咗」\n\n#### 點樣有正常免疫系統？\n\n| 因素 | 作用 |\n|------|------|\n| **維他命D** | 令免疫系統更完整 |\n| **唔好分薄兵力** | 減少慢性發炎 |\n| **Proper運作** | 唔好過弱，唔好過強 |\n\n> 「維他命D不足 = 免疫系統一定差 = 一定過弱」\n\n---\n\n### 總結：呢堂學到乜？\n\n| 重點 | 說明 |\n|------|------|\n| **Cancer Friendly Environment** | 高胰島素 + 慢性發炎 + 果糖 |\n| **Gene Expression** | 細胞點樣表達基因 |\n| **胰島素** | 最重要既Growth Factor |\n| **慢性發炎** | 分薄免疫系統兵力 |\n| **果糖** | 代謝同癌細胞極度相似 |\n| **免疫系統** | Detect + Attack癌細胞 |\n\n---\n\n## Key Takeaways (Lesson 9)\n\n### Cancer點形成？\n\n| 因素 | 結果 |\n|------|------|\n| **高胰島素** | 刺激細胞過度生長 |\n| **慢性發炎** | DNA受損 + 分薄兵力 |\n| **果糖** | 創造Cancer Friendly環境 |\n| **免疫系統差** | 唔夠力消滅癌細胞 |\n\n### 點樣預防？\n\n| 方法 | 目標 |\n|------|------|\n| **低GI飲食** | Keep Insulin低 |\n| **Exit Winter Mode** | 減少慢性發炎 |\n| **戒果糖** | 減少Cancer Friendly環境 |\n| **維他命D** | 正常免疫系統 |\n\n---\n\n## Lesson 9.5 - 癌症 Part 2：細胞損傷與防禦機制\n\n*呢一堂係第九堂既part 2，深入講解點解會有癌症、細胞自死既重要性、癌症點樣呃過免疫系統、以及防曬既正確方法。*\n\n---\n\n### Cancer — 點解咁難搞？\n\n#### Overgrow vs Underbreak\n\n| 概念 | 意思 |\n|------|------|\n| **Overgrow** | 細胞過度生長 |\n| **Underbreak** | 細胞自然死亡機制失效 |\n\n> 「癌症最大既秘密唔係Overgrow，而係Underbreak——你身體唔識得清除有問題既細胞」\n\n#### 點解Chronic Damage咁危險？\n\n| 過程 | 結果 |\n|------|------|\n| **細胞受傷但唔死** | 半生半死 |\n| **持續受傷，持續修補** | 不斷刺激生長 |\n| **重複修補 = Overgrow** | 增加患癌風險 |\n\n> 「慢性細胞損傷引致既重複修補過程，基本上就係Overgrow既表達」\n\n---\n\n### 細胞自死 (Apoptosis) — 我哋嘅第一道防線\n\n#### 咩係細胞自死？\n\n| 特性 | 說明 |\n|------|------|\n| **定義** | 身體清理受傷細胞既自然機制 |\n| **作用** | 清除damage cell，減少變異機會 |\n| **發生時間** | 空肚期間最活躍 |\n\n#### Narrow Down Eating Windows\n\n| 做法 | 好處 |\n|------|------|\n| **縮短進食窗口** | 增加細胞自死時間 |\n| **延長空腹時間** | 增強清理效果 |\n| **L8 / L12 / L16** | 時間越長，自死越多 |\n\n> 「如果你一日食到黑，你既細胞自死過程就會大幅減低——呢個係好大既問題」\n\n---\n\n### Mitochondria (腺粒體) 自死\n\n#### 點解咁重要？\n\n| 問題 | 結果 |\n|------|------|\n| **腺粒體受損** | Metabolism變差 |\n| **受損腺粒體冇被清除** | 有機會變異 |\n| **Metabolism差** | Cancer risk大增 |\n\n> 「就算表面正常既細胞，裡面既腺粒體都可能受損——果糖就係令腺粒體受損既主要原因之一」\n\n---\n\n### 癌症嘅三大詭計 (點樣呃過免疫系統)\n\n#### 1. 隱藏抗原 (Downregulate Antigen Presentation)\n\n| 正常情況 | 癌症點做 |\n|----------|----------|\n| T Cell認到異常蛋白 | 隱藏表面信號 |\n| 免疫系統攻擊 |扮正常細胞 |\n\n> 「癌症tricky到佢會downregulate自己既antigen presentation，令T Cell認佢唔到」\n\n#### 2. 干擾免疫檢查點 (Immune Checkpoints)\n\n| 機制 | 作用 |\n|------|------|\n| **免疫檢查點** | T Cell攻擊前既確認機制 |\n| **癌症干擾** | 繞過呢個檢查 |\n\n#### 3. 改變腫瘤微環境\n\n| 過程 | 結果 |\n|------|------|\n| **創造酸性環境** | 乳酸堆積抑制免疫 |\n| **保護腫瘤** | 免受免疫系統攻擊 |\n\n> 「癌症用無氧呼吸製造乳酸，創造酸性環境——呢個環境一方面抑制正常細胞，另一方面保護佢自己」\n\n---\n\n### 三道防線 — 點樣保護自己？\n\n#### 第一道防線：細胞自死 (最重要！)\n\n| 方法 | 作用 |\n|------|------|\n| **窄化進食窗口** | 增加自死時間 |\n| **Exit Winter Mode** | 恢復代謝 |\n| **減少果糖攝入** | 保護腺粒體 |\n\n> 「細胞自死係我哋最自然、最重要既first line of defense」\n\n#### 第二道防線：免疫系統\n\n| 要做 | 唔好做 |\n|------|--------|\n| **維他命D** | **千其唔好用quick fix搞免疫系統** |\n| **適當日曬** | **避免削弱免疫功能** |\n| **減少慢性發炎** | |\n\n> 「維他命D不足會削弱整個免疫系統——呢個係癌症第二道防線崩潰既主要原因」\n\n#### 第三道防線：身體檢查\n\n| 檢查 | 目的 |\n|------|------|\n| **定期身體檢查** | 早期發現 |\n| **驗血、驗尿、驗大便** | 非入侵性、低成本 |\n| **擴散前處理** | 把握治療時機 |\n\n> 「驗身係入侵性最少、成本最低既其中一個方法——响癌症擴散前發現，治療效果完全唔同」\n\n---\n\n### 防曬點樣做先啱？\n\n#### Physical vs Chemical Sunscreen\n\n| 類型 | 成分 | 風險 |\n|------|------|------|\n| **Physical** | Zinc Oxide / Titanium Dioxide | ✅ 低風險 |\n| **Chemical** | Organic Compounds | ❌ 吸收入血、有潛在風險 |\n\n> 「Chemical sunscreen會吸收到皮膚，再進入血液——呢啲有機化合物既潛在健康風險，包括患癌風險，我係極度反對」\n\n#### Nano Sunscreen — 更加危險！\n\n| 問題 | 結果 |\n|------|------|\n| **納米級分子** | 穿透力更強 |\n| **進入細胞** | 甚至進入細胞核 |\n| **進入DNA層次** | 可能引致變異 |\n\n> 「Nano sunscreen既納米級成分會進入細胞，甚至DNA層次——如果有得揀，我會掉咗佢」\n\n#### 正確防曬方法\n\n| 方法 | 建議 |\n|------|------|\n| **首選** | Physical sunscreen (Zinc Oxide) |\n| **避免** | Chemical sunscreen |\n| **更加要避免** | Nano sunscreen |\n| **Asian Skin優勢** | 本身有黑色素保護，唔好盲目跟白人防曬 |\n\n> 「Asian Skin本身有moderate level黑色素，已經可以減低大部分陽光傷害——唔好盲目跟白人而用大量chemical野」\n\n---\n\n### Advanced Sun Exposure (進階日曬法)\n\n#### 正確做法\n\n| 做法 | 目的 |\n|------|------|\n| **大面積皮膚接觸** | 背心、短褲最佳 |\n| **保護頭部** | 戴帽 |\n| **曝露肚皮** | 幫助燒脂(女性) |\n| **唔好過度** | 舒服為止 |\n\n> 「維他命D唔夠既人，應該增加曝露面積——你包到實既地方係冇咁容易生成維他命D」\n\n#### 面部保護 (如需要)\n\n| 方法 | 建議 |\n|------|------|\n| **帽子/帽** | 最有效既物理屏障 |\n| **潤唇膏** | 嘴唇冇毛保護 |\n| **Physical sunscreen** | 如果真係要塗 |\n| **接受曬黑** | Asian Skin黎講皮膚健康好過美白 |\n\n---\n\n### 癌症治療既未來\n\n#### Cancer Vaccine (癌症疫苗)\n\n| 方向 | 說明 |\n|------|------|\n| **mRNA-based** | 利用mRNA技術 |\n| **Train免疫系統** | 識別並攻擊癌細胞 |\n| **Personalized** | 可能需要針對唔同癌症開發 |\n| **成本** | 初期可能好貴 |\n\n> 「COVID加速左mRNA疫苗發展——呢個技術將來可能用於癌症治療，係未來其中一個最有希望既方向」\n\n---\n\n### 總結：呢堂學到乜？\n\n#### Cancer Prevention Framework\n\n| 防線 | 重點 | 點做 |\n|------|------|------|\n| **第一道** | 細胞自死 | Narrow eating windows、Exit Winter Mode |\n| **第二道** | 免疫系統 | 維他命D、避免削弱免疫既野 |\n| **第三道** | 身體檢查 | 定期驗身、早期發現 |\n\n#### Key Takeaways\n\n| 重點 | 說明 |\n|------|------|\n| **Underbreak係關鍵** | 細胞死唔到反而更大問題 |\n| **細胞自死好重要** | 空肚時間越多越好 |\n| **癌症好詭計** | 呃過免疫系統既三個方法 |\n| **防曬要識揀** | Physical > Chemical > Nano |\n| **維他命D不可或缺** | 30歲後更加重要 |\n\n---\n\n## Lesson 10 - 睡眠質素：光線、節律與深度睡眠\n\n*呢一堂深入講解睡眠既秘密——光線如何影響生理時鐘、點樣提升睡眠質素、以及點樣响REM階段自然醒。*\n\n---\n\n### Sleep — 三分一人生點過？\n\n#### 睡眠點解咁重要？\n\n| 重要性 | 說明 |\n|---------|------|\n| **三分一時間** | 一生有三分一时间喺床度 |\n| **Repair & Regeneration** | 身體修復同更新既過程 |\n| **冇嘢可以取代** | 食物、水、空氣之外，睡眠係第四大必需 |\n| **Quality同Quantity一樣重要** | 訓得多不如訓得好 |\n\n> 「訓覺係我哋最重要既regulator——repair身體既過程，冇辦法任何野可以取代」\n\n---\n\n### 光線 — 訓覺最大既秘密\n\n#### 三個時間既陽光\n\n| 時間 | 作用 | 點做 |\n|------|------|------|\n| **早晨** | Kickstart生理時鐘、Reset晝夜節律 | 盡量接觸自然光，話俾身體知「而家係日頭」 |\n| **中午 (Noon)** | UV最強，刺激褪黑激素分泌 | 呢段時間曝露對晚訓最有幫助 |\n| **日落 (Sunset)** | 準備進入睡眠模式 | 睇日落、接觸黃昏既光 |\n\n> 「太陽光一定係最強——你接觸到光，就會kickstart你生理時鐘既cycle」\n\n---\n\n### 藍光 — 訓覺最大敵人\n\n#### 點解藍光咁大害？\n\n| 問題 | 結果 |\n|------|------|\n| **模擬緊日間** | 大腦會confuse，以為仲係白日 |\n| **抑制褪黑激素** | 有藍光就會按住褪黑激素分泌 |\n| **訓得差** | 結果係入睡困難、訓極都唔够**\n\n#### 日落後點做？\n\n| 建議 | 點解 |\n|------|------|\n| **全屋改黃光** | 白光＝模擬緊日間，呢個係大問題 |\n| **廁所都用黃光** | 臨訓前唔好用白光冲涼 |\n| **睡房絕對唔好有白光** | 如果屋企細，書房睡房二合一更加要注意 |\n| **Screen要開Night Shift** | 轉為暖色調，減少藍光 |\n| **亮度盡量降低** | 越暗越好 |\n\n> 「日落之後既光只可以係黃光——有咁黃都唔好黃」\n\n---\n\n### Screen — 訓覺既最大殺手\n\n#### 點解咁大問題？\n\n| 問題 | 結果 |\n|------|------|\n| **藍光直入眼睛** | 褪黑激素大受影響 |\n| **大腦Confuse** | 以為仲係日間 |\n| **訓覺質素暴跌** | 無論係訓唔著、扎醒、訓極都累 |\n\n#### 一定要做既野\n\n| 要做 | 點解 |\n|------|------|\n| **千其唔好拎電話上床** | 一拎上床就會按幾個鐘 |\n| **唔好用電話做鬧鐘** | 放响床頭會忍唔住睇 |\n| **電話唔好响睡房充** | 條線拉長啲，床頭唔好掂到 |\n| **Set Sleep Mode** | 通知全部關掉 |\n\n> 「拎電話上床——你試過好多次，一按就三個鐘。你唔想有病既，呢個習慣一定要斷」\n\n---\n\n### 訓覺環境\n\n#### 點樣Set Up睡房？\n\n| 項目 | 建議 |\n|------|------|\n| **全黑環境** | 熄燈前四周望一望，邊度有光就整走佢 |\n| **窗簾夠遮光** | 有任何光線都會影響褪黑激素 |\n| **冇電子野** | 電話、 tablet、任何會發光既野 |\n| **溫度** | 訓覺時環境涼爽，但起身時慢慢回暖 |\n\n> 「你有任何光線，尤其係藍光——有藍光存在就會影響你分泌褪黑激素，分泌會少咗」\n\n---\n\n### 點樣自然醒 —— Wake Up at REM\n\n#### REM係咩？\n\n| 特性 | 說明 |\n|------|------|\n| **Rapid Eye Movement** | 眼睛郁動既階段 |\n| **準備清醒** | 呢個階段起身會特別醒神 |\n| **唔會頭暈** | 唔會覺得好懵、好辛苦 |\n\n#### 點樣响REM起身？\n\n| 方法 | 做法 |\n|------|------|\n| **第一：智能窗簾/燈** | 起身前30分鐘慢慢開燈 |\n| **第二：光鬧鐘** | 模擬日出，慢慢變光 |\n| **第三：Haptic震動** | Smartwatch震醒你 |\n| **Last Resort：** | 真正鬧鐘，但用温和聲音 |\n\n> 「用光起身係最自然——你進入REM既機會極高」\n\n---\n\n### 訓覺溫度\n\n#### 點樣控制溫度？\n\n| 時間 | 做法 |\n|------|------|\n| **訓覺時** | 訓前開冷氣，令環境涼爽 |\n| **起身時** | 起身前30分鐘熄冷氣，等房間慢慢暖番 |\n| **温度變化** | 自然回暖幫助身體進入清醒狀態 |\n\n> 「起身嗰陣太凍都唔好——你會訓得冇咁好」\n\n---\n\n### 季節同睡眠\n\n| 季節 | 訓幾多？ | 點解？ |\n|------|----------|--------|\n| **夏天** | 少啲 (6-6.5粒鐘) | 日照長，身體自然訓少啲 |\n| **冬天** | 多啲 (7-7.5粒鐘) | 日照短，身體需要更多修復 |\n\n> 「夏天訓少啲唔好介意，冬天訓多啲好正常——呢個係跟自然節律」\n\n---\n\n### Sleep Stages — 三個階段\n\n| 階段 | 特性 | 重要性 |\n|------|------|--------|\n| **Core Sleep (N1+N2)** | 最基本既睡眠 | 最多時間 |\n| **REM** | Rapid Eye Movement，發夢階段 | 醒既时候要响呢個階段醒 |\n| **Deep Sleep** | 最深層睡眠，身體修復 | 呢個階段最重要 |\n\n---\n\n### Deep Sleep — 最重要既階段\n\n#### 點解Deep Sleep咁關鍵？\n\n| 特性 | 說明 |\n|------|------|\n| **全Shutdown模式** | Brain同Body幾乎完全offline |\n| **最Vulnerable** | 生物上最易受攻擊既階段，所以要响安全環境先有 |\n| **身體覺得安全先會有** | 呢個係最關鍵既point！ |\n| **集中在頭段** | 訓覺頭九十分鐘最多Deep Sleep |\n\n> 「Deep Sleep只會發生响你覺得安全既時候——如果你覺得唔安全，Deep Sleep就會差」\n\n---\n\n### 咩野會摧毀Deep Sleep？\n\n| 行為 | 點解佢咁衰？ |\n|------|--------------|\n| **熬夜** | 「捱眼訓」令身體覺得唔安全，Deep Sleep暴跌 |\n| **訓前做HIIT/運動** | 模擬緊「打交或逃走」既danger state |\n| **臨訓睇恐怖片/刺激野** | 大腦處於緊張狀態 |\n| **臨訓吵架** | 呢個係死罪——第二日先吵 |\n| **枕邊人唔同步訓** | 如果另一半死都唔入房，你會擔心，Deep Sleep受影響 |\n\n> 「你訓前吵架——呢個係破壞Deep Sleep既死罪」\n\n---\n\n### Sleep Tracking — 值唔值得用？\n\n#### Smartwatch點用？\n\n| 用途 | 建議 |\n|------|------|\n| **追蹤趨勢** | Track自己既變化，唔好同人比較 |\n| **睇Deep Sleep** | Deep Sleep既分鐘數每日都要睇 |\n| **REM時間** | 睇吓REM多定少 |\n| **只信trend** | 同一隻錶、同一個setting，先可以比較 |\n\n> 「Apple Watch或者其他Smartwatch——佢只可以同自己去比較，千其唔好同其他人比」\n\n#### 戴邊隻手？\n\n| 建議 | 點解 |\n|------|------|\n| **訓覺戴惯用手** | 如果你同另一半訓，隻錶放响床中間會被踢到 |\n| **設定Sleep Mode** | 所有Notification關掉，只留電話打入黎 |\n\n---\n\n### 搭飛機訓覺Tips\n\n#### 長途機/紅眼機\n\n| 建議 | 點做 |\n|------|------|\n| **Set當地時間** | 一上機就將電話、手錶set做目的地時間 |\n| **Follow當地作息** | 目的地時間話你訓你就訓，唔話你訓你就死都唔好訓 |\n| **唔好睇Screen** | 飛機上既Screen細到你嘔，藍光又勁——呢個係最蠢既事 |\n| **用眼罩** | 訓覺時遮光 |\n| **訓前唔好嘢** | 呢個係最佳時間補眠 |\n| **唔好用In-ear耳機** | 機艙壓力令耳朵唔舒服，用Open式耳機 |\n| **起飛降落唔好戴耳機** | 氣壓變化令耳朵受壓 |\n\n> 「我上飛機係從來唔睇任何Screen——呢啲免費野係最貴」\n\n---\n\n### 水果推薦\n\n| 水果 | 點解推薦？ |\n|------|-----------|\n| **berries (紅莓、黑莓)** | 糖分低，抗氧化高 |\n| **鮮檸檬/青檸汁** | 算係水果，既可以调味又健康 |\n| **避免高糖水果** | 呢12個星期盡量唔好食高糖水果 |\n\n---\n\n### 總結：呢堂學到乜？\n\n#### Sleep Framework\n\n| 類別 | 重點 |\n|------|------|\n| **光線** | 朝早光 → 中午UV → 晚黑 |\n| **藍光** | 日落後绝对避免 |\n| **Screen** | 拎上床係死罪 |\n| **環境** | 全黑、全靜、涼爽 |\n| **起身** | Wake Up at REM |\n| **Deep Sleep** | 安全感係關鍵 |\n| **追蹤** | 自己同自己比 |\n\n#### Key Takeaways\n\n| 重點 | 說明 |\n|------|------|\n| **光線係最大秘密** | 朝早光kickstart，晚黑避免藍光 |\n| **拎電話上床死罪** | 一拎就會按幾個鐘 |\n| **Wake Up at REM** | 用光起身，唔好用聲 |\n| **Deep Sleep需要安全感** | 臨訓千其唔好搞到緊張 |\n| **同另一半同步訓** | 唔好死都唔入房 |\n\n---\n\n## Lesson 10.5 - 睡眠 Part 2：夜尿、荷爾蒙與頸椎保健\n\n*呢堂係第十堂既延續，深入講解睡眠同身體既各種連帶關係——包括夜尿問題、荷爾蒙平衡、頸椎保健同埋鎂補充劑既功效。*\n\n---\n\n### 光線既六個階段 (Recap from Lesson 10)\n\n| 階段 | 時間 | 作用 |\n|------|------|------|\n| **神光 (Morning Light)** | 早晨 | Reset生理時鐘 |\n| **中午光 (Noon Light)** | 中午 | UV最強，強壓褪黑激素 |\n| **日落光 (Sunset Light)** | 黃昏 | 準備進入睡眠模式 |\n| **晚光 (Evening Light)** | 晚間 | 避免藍光 |\n| **訓覺時** | 全黑 | 零光線 |\n| **起身時** | 有光 | 叫醒身體 |\n\n---\n\n### Homogeneous Status — 點解日中曬得多，晚間訓得好好？\n\n| 概念 | 說明 |\n|------|------|\n| **日頭壓力** | 中午UV強壓褪黑激素 |\n| **晚間解放** | 冇左壓力，褪黑激素大量分泌 |\n| **結果** | 訓覺質素提升 |\n\n> 「中午曬得多——嗰晚會訓得特別好。呢個就係Homogeneous Status」\n\n---\n\n### 夜尿問題 (Nocturnal Urination)\n\n#### 咩情況算正常？\n\n| 次數 | 狀態 |\n|------|------|\n| **0次** | 最理想 |\n| **1次** | 可接受 |\n| **2次或以上** | 有問題 |\n\n> 「如果夜尿多過一次，就要留意——呢個係身體既Signal」\n\n#### 點解會夜尿？\n\n| 性別 | 原因 | 解決方法 |\n|------|------|----------|\n| **男性** | 前列腺肥大 (DHT問題) | Exit Winter Mode、減少DHT攻擊 |\n| **女性** | 子宮肌瘤 | 減少過多雌激素、避免高雌激素食物 |\n| **共通** | 晚餐/訓前飲水多 | 將飲水集中在上午/下午 |\n\n#### 訓前處理夜尿既技巧\n\n| 技巧 | 點做？ |\n|------|-------|\n| **二次排尿法** | 去完廁所後等1-2分鐘再去一次 |\n| **訓前少飲水** | 晚餐後2-3小時減少飲水 |\n| **Supplement時間** | 訓前5分鐘食Supplement，訓前唔好再食 |\n\n---\n\n### 荷爾蒙同睡眠既關係\n\n#### Leptin vs Ghrelin\n\n| 荷爾蒙 | 作用 | 睡眠影響 |\n|---------|------|----------|\n| **Leptin** | 飽腹感、燒脂 | Deep Sleep先會大量分泌 |\n| **Ghrelin** | 肚餓感 | 訓唔好就會升高 |\n\n#### Leptin點解咁重要？\n\n| 功能 | 結果 |\n|------|------|\n| **通知身體有足夠能量** | 放心燒脂 |\n| **調節基礎代謝率** | 細胞功能恢復 |\n| **抑制脂肪儲存** | 唔好咁易肥 |\n\n> 「Leptin正常運作——身體會話你知『你有足夠能量，唔使再痴住啲脂肪』」\n\n---\n\n### 深層睡眠 (Deep Sleep) 同癌症既關係\n\n#### Deep Sleep點樣保護我哋？\n\n| 功能 | 點解重要？ |\n|------|-----------|\n| **免疫細胞正常運作** | T Cell、NK Cell功能正常 |\n| **細胞修復** | 清除變異細胞 |\n| **Cytokine保護物質** | 認同並攻擊癌細胞 |\n\n#### 訓得差既後果\n\n| 問題 | 結果 |\n|------|------|\n| **免疫細胞死亡** | 抗癌能力暴跌 |\n| **Cytokine不足** | 癌細胞容易生長 |\n| **慢性發炎增加** | cancer-friendly環境 |\n\n> 「Deep Sleep不足——你既T Cell同NK Cell死埋死埋，你靠咩打癌細胞？」\n\n---\n\n### 頸椎保健\n\n#### 邊個位最易受傷？\n\n| 部位 | 問題成因 |\n|------|----------|\n| **頸部** | 低頭睇電話/電腦 |\n| **肩膀** | Keyboard姿勢差 |\n| **腰骨** | 坐姿唔好 |\n\n#### 正確電腦設定\n\n| 項目 | 建議 |\n|------|------|\n| **Monior高度** | 眼睛望到Monior底1/3位置 |\n| **Keyboard** | 用Split Keyboard |\n| **坐姿** | 90度坐直 |\n\n#### 幾時唔好用電話？\n\n| 情況 | 點解？ |\n|------|--------|\n| **廁所** | 頸椎承受最大壓力 |\n| **行路** | 已經有前傾，加電話更加差 |\n\n> 「去廁所用電話——呢個動作對頸椎既傷害係最大既」\n\n---\n\n### 枕頭選擇\n\n#### Temper Millennium枕頭\n\n| 特點 | 點用？ |\n|------|--------|\n| **中間凹陷** | 頭放中間位置 |\n| **肩頸對齊** | 枕頭要夾實肩膀 |\n| **唔好倒轉用** | 有方向性 |\n\n---\n\n### 鎂 (Magnesium) 補充劑\n\n#### 邊種最好？\n\n| 類型 | 作用 |\n|------|------|\n| **Magnesium Glycinate** | 放鬆肌肉、改善睡眠 |\n| **Magnesium Taurate** | 補心臟、情緒 |\n\n#### 食法\n\n| 時間 | 方法 |\n|------|------|\n| **訓前** | 每種一粒，交替食 |\n| **份量 | 每日一至兩種，各一粒 |\n\n#### 邊類人最需要？\n\n| 情況 | 點解？ |\n|------|------|\n| **轉Diet初期** | 腸胃未適應 |\n| **容易抽筋** | 肌肉緊張 |\n| **訓得差** | 鎂不足影響睡眠 |\n\n---\n\n### 訓覺前唔好做既野\n\n| 行為 | 點解唔好？ |\n|------|-----------|\n| **睇恐怖片/刺激野** | 激活清醒荷爾蒙 |\n| **做HIIT/劇烈運動** | 身體以為你要走難 |\n| **同其他人吵架** | Verbal stress都會影響 |\n| **訓前食大餐** | 消化系統運作緊，腦袋唔會Shutdown |\n\n---\n\n### 總結：呢堂學到乜？\n\n#### Sleep Framework (Extended)\n\n| 範疇 | 重點 |\n|------|------|\n| **光線** | 朝早曬、晚黑、避免藍光 |\n| **夜尿** | Proton/Fibroid要處理、訓前技巧 |\n| **荷爾蒙** | Leptin/Ghrelin平衡 |\n| **Deep Sleep** | 抗癌既第一道防線 |\n| **頸椎** | Monitor設定、枕頭、唔好低頭 |\n| **鎂** | Glycinate/Taurate補充 |\n\n#### Key Takeaways\n\n| 重點 | 說明 |\n|------|------|\n| **訓得好 = Leptin正常** | 燒脂易D、唔好痴住啲脂肪 |\n| **夜尿要處理** | 前列腺/肌瘤問題要正視 |\n| **Deep Sleep抗疫症** | 免疫細胞正常運作靠佢 |\n| **頸椎要保護** | Monitor高度、分體式Keyboard |\n| **鎂係Optional** | 有需要先食，唔係必須 |\n\n---\n\n## Lesson 11 - 三型糖尿病與腦退化症 (Type 3 Diabetes & Brain Degeneration)\n\n*呢堂係課程入面最重要嘅一課——詳細講解咩係「三型糖尿病」同佢點樣引發阿茲海默症（腦退化症）。呢個係每個人都应该了解嘅嘢，因為佢真係可以話係「現代人最恐怖嘅慢性病」之一。*\n\n---\n\n### 💀 乜嘢係三型糖尿病 (Type 3 Diabetes)？\n\n| 定義 | 說明 |\n|------|------|\n| **正式名稱** | 腦部胰島素阻抗 (Brain Insulin Resistance) |\n| **常見疾病** | 阿茲海默症 (Alzheimer's Disease)、柏金遜症等腦退化疾病 |\n| **統計** | 阿茲海默症佔咗7-8成腦退化症案例 |\n\n> 「三型糖尿病喺腦入面出現咗胰島素阻抗，令到神經細胞受損，慢慢退化——呢個過程可以長達15-30年。」\n\n---\n\n### 🧠 腦退化症有幾咁恐怖？\n\n#### 三個主要症狀\n\n| 症狀 | 影響 |\n|------|------|\n| **記憶衰退** | 由短期記憶開始，慢慢發展到失去所有記憶 |\n| **認知能力下降** | 思考、判斷、語言能力逐漸喪失 |\n| **自理能力喪失** | 慢慢退化到似BB仔咁——唔識控制大小便、唔識講說話 |\n\n#### 點解話佢「your mind is dead」？\n\n> 「如果真有阿茲海默症——你嘅靈魂已經離開咗，只剩低一個空殼身體。即使你有呼吸、識食嘢、行路，但你已經唔係一個人。」\n\n#### 點解佢咁恐怖？\n\n| 特點 | 點解恐怖？ |\n|------|-----------|\n| **不可逆轉 (Irreversible)** | 腦細胞死咗就唔會重生，而家科技救唔返 |\n| **好難發現** | 佢係「安靜嘅殺手」——通常去到好後期先知 |\n| **冇得醫** | 而家醫學界對阿茲海默症基本上冇有效治療方法 |\n| **要等死** | 「靈魂離開咗，再等肉体腐爛——有錢都冇得醫」 |\n\n---\n\n### 🔬 三型糖尿病點解會發生？\n\n#### 第一條路：腦細胞胰島素阻抗\n\n| 過程 | 結果 |\n|------|------|\n| 腦細胞對胰島素產生阻抗 | 細胞吸收唔到血糖（Glucose） |\n| 細胞能量不足 | 腦細胞受損、甚至死亡 |\n| 認知功能下降 | 慢慢變成阿茲海默症 |\n\n> 「我哋嘅腦細胞係用25%全身能量——佢哋需要持續嘅能量供應。如果長期吸收唔到足夠能量，佢哋就會慢慢死。」\n\n#### 第二條路：高血糖破壞腦血管\n\n| 過程 | 結果 |\n|------|------|\n| 長期高血糖 | 破壞全身血管，包括腦入面嘅微絲血管 |\n| 微絲血管受損 | 營養同氧氣唔能够順利送到腦細胞 |\n| 腦細胞缺氧缺營養 | 慢慢退化、死亡 |\n\n> 「高血糖會破壞血管——咁點解唔會破壞腦血管？腦入面一樣有好多微絲血管，一樣會受影響。」\n\n---\n\n### ❄️ Winter Mode 同腦退化症嘅關係\n\n#### Winter Mode 點解存在？\n\nWinter Mode（冬天模式）係進化遺留低嘅「省能源機制」：\n\n| 功能 | 目的 |\n|------|------|\n| 令其他細胞減少能量消耗 | 省返啲能量俾大腦 |\n| 刻意出現胰島素阻抗 | 呢個係身體嘅「生存策略」 |\n\n> 「Winter Mode 令其他細胞用少啲能量——省返俾大腦用。呢個設計原本係為咗令我哋响冬天生存落去。」\n\n#### 但係現代人嘅問題：\n\n| 問題 | 後果 |\n|------|------|\n| 長期處於Winter Mode（幾十年） | 慢性胰島素阻抗 |\n| 食咗幾十年高GI嘢 | 令胰島素阻抗更加嚴重 |\n| 腦細胞長期冇足夠能量 | 慢慢退化 |\n\n> 「動物嘅Winter Mode只係維持幾個月，但我哋 Whereas呢——過去30-50年都一直處於Winter Mode。咁點算？」\n\n---\n\n### ⚡ 點保護我哋嘅大腦？\n\n#### 1️⃣ 間歇性斷食 (Intermittent Fasting)\n\n| 方法 | 點做？ |\n|------|--------|\n| **瘦底** | 12:12 - 12小時內食完所有嘢 |\n| **肥底** | 16:8 - 16小時唔食嘢 |\n| **週末** | 14:10 - 14小時唔食 |\n\n**點解有效？**\n\n| 效果 | 點解？ |\n|------|--------|\n| **產生酮體 (Ketones)** | 大腦嘅後備能源 |\n| **清肝醣** | 減少胰島素阻抗 |\n| **令血糖穩定** | 減少對大腦血管嘅破壞 |\n\n#### 2️⃣ 低GI早餐\n\n| 原則 | 點做？ |\n|------|--------|\n| **必須食早餐** | 瘦底一定要食 |\n| **低GI** | 避免血糖急升 |\n| **配搭蛋白質同脂肪** | 令能量釋放更持久 |\n\n> 「12個鐘斷食 + 低GI早餐 = 大腦有持續能量供應，唔會因為突然血糖低而受損。」\n\n#### 3️⃣ 酮體 (Ketones) 補充\n\n| 方法 | 點做？ |\n|------|--------|\n| **直接補充** | 每日飲咖啡加C8椰子油 (1匙) |\n| **天然來源** | 羊奶芝士 (含有C6) |\n| **唔好買** | C10、C12 MCT油 —— 呢啲會令人嘔吐，冇用 |\n\n**點解要C8？**\n\n| 特點 | 說明 |\n|------|------|\n| **直接入肝** | C8落肚直接去肝臟，肝臟即時製造酮體 |\n| **快速見效** | 15-30分鐘就產生酮體 |\n| **對胃溫和** | C10、C12先會令人嘔心 |\n\n#### 4️⃣ 陽光下行路 (Walking Under Sunlight)\n\n| 時間 | 點做？ |\n|------|--------|\n| **最佳時間** | 中午前 (午餐前) |\n| **目標步數** | 起碼6000步，最好9000步 |\n| **做咩？** | 行路，唔係跑步 |\n\n**點解行路好過跑步？**\n\n| 比較 | 跑步 | 行路 |\n|------|------|------|\n| **血液分配** | 肌肉拎走大部分血液 | 血液平均分配 |\n| **大腦血液供應** | 減少 | 增加 |\n| **氧氣供應** | 肌肉拎走氧氣 | 大腦有充足氧氣 |\n\n> 「行路時，你個心跳稍微提升，血液流快咗，但係氧氣唔會被肌肉拎走晒——呢個狀態對大腦最好。」\n\n---\n\n### 📊 HbA1c 同阿茲海默症風險\n\n#### 醫學界共識\n\n| HbA1c水平 | 阿茲海默症風險 |\n|-----------|----------------|\n| **< 5.7%** | 正常風險 |\n| **5.7% 開始** | 風險顯著增加 |\n| **6.5%** | 風險激增 |\n| **7.0%+** | 極高風險 |\n\n> 「醫學界話HbA1c 5.7開始就確認咗有腦部損傷。但係呢個病要去到15-30年後先『爆』出嚟。」\n\n#### 呢個數據話我哋知咩？\n\n| 現象 | 點解？ |\n|------|--------|\n| **5.7已經有損傷** | 而家醫學先detect到，但其實damage已經發生咗好耐 |\n| **醫生話冇嘢** | 「6.4冇問題」、「6.5先開始係糖尿病前期」——但係你嘅大腦已經响度慢慢被破壞緊 |\n| **要keep响邊** | 作者話佢自己長期keep HbA1c响5以下 |\n\n> 「醫生話6.4冇問題，但係佢哋唔會話你知——呢個數值去到某個位，你阿茲海默症嘅機會係激增。」\n\n---\n\n### 🏃‍♂️ 總結：保護大腦要做乜？\n\n#### 每日起碼要做\n\n| 項目 | 具體行動 |\n|------|----------|\n| **斷食** | 起碼12小時內食完所有嘢 (16:8更好) |\n| **低GI早餐** | 食低GI嘢，配搭蛋白質/脂肪 |\n| **行路** | 中午前行至少6000步 (目標9000步) |\n| **C8椰子油** | 每日加1匙落咖啡度飲 |\n\n#### 每週最少做一次\n\n| 項目 | 具體行動 |\n|------|----------|\n| **14:10斷食** | 週末試吓14個鐘唔食嘢 |\n| **羊奶芝士** | 食羊奶製嘅芝士 (含有C6) |\n\n#### 呢12個星期要避免\n\n| 避免 | 原因 |\n|------|------|\n| **白飯/番薯** | 只限呢12個星期唔好食 |\n| **高GI食物** | 令血糖大上大落 |\n| **食宵夜** | 影響睡眠同血糖控制 |\n\n---\n\n### 💡 Key Takeaways\n\n| 重點 | 說明 |\n|------|------|\n| **三型糖尿病 = 腦胰島素阻抗** | 呢個係阿茲海默症嘅主要成因之一 |\n| **阿茲海默症係不治之症** | 腦細胞死咗就唔會再生 |\n| **HbA1c 5.7開始有風險** | 而家就開始做嘢好過等到出現症狀 |\n| **酮體係大腦後備能源** | 間歇性斷食 + C8椰子油可以提供 |\n| **行路好過跑步** | 對大腦血液供應最好 |\n| **12個星期係最低要求** | 呢個係你保護自己大腦嘅投資 |\n\n> 「呢一堂可能係你人生入面最重要嘅一堂——因為佢決定咗你老咗之後係一個有思考能力嘅人，定係淨係得一條喺度呼吸緊但係冇咗靈魂嘅空殼。」\n\n---\n\n## Lesson 11.5 - 三型糖尿病 Part 2：蛋白質錯誤摺疊、眼腦連結與護眼策略\n\n*呢堂係第十一堂既延續——深入講解點解阿茲海默症會發生、眼睛同大腦既關係、以及點樣保護我哋既雙眼同腦袋。呢堂嘅資料非常前沿而且重要。*\n\n---\n\n### 🔬 乜嘢係「蛋白質錯誤摺疊」(Protein Misfolding)？\n\n#### Amyloid Beta 同 Tau Protein\n\n| 蛋白質 | 位置 | 作用 |\n|---------|------|------|\n| **Amyloid Beta** | 包住神經元突觸 | 阻礙神經元之間既溝通 |\n| **Tau Protein** | 神經元內部 | 阻礙細胞內部既訊息傳遞 |\n\n> 「呢兩種蛋白質喺阿茲海默症患者嘅大腦入面不斷積累——佢哋會令到你嘅認知能力逐步下降。」\n\n#### 點解呢兩種蛋白質咁咁有害？\n\n| 階段 | 過程 | 結果 |\n|------|------|------|\n| **第一階段** | Amyloid Beta包住神經元 | 神經元就算未死，都溝通唔到 |\n| **第二階段** | Tau Protein喺細胞內部累積 | 細胞內部既訊息傳遞受阻 |\n| **第三階段** | 兩種蛋白質變成「不可溶性」(Insoluble) | 慢慢累積15-30年 |\n| **第四階段** | 神經元死亡 | 大腦功能永久喪失 |\n\n> 「Soluble（可溶性）嘅 Amyloid Beta 仲可以清除，但如果變成 Insoluble（不可溶性）就會不斷累積——呢個就係阿茲海默症要15-30年先爆發出嚟既原因。」\n\n---\n\n### 🧠 點解我哋嘅大腦會產生呢啲有害蛋白質？\n\n#### 兩大 Stressors\n\n| Stressor | 點解會出現？ |\n|----------|--------------|\n| **慢性胰島素阻抗 (Chronic Insulin Resistance)** | 長期高血糖、高胰島素狀態 |\n| **果糖代謝 (Fructose Metabolism)** | 食太多果糖、含糖飲品、加工食品 |\n\n> 「呢兩樣嘢會喺你大腦入面引發『氧化壓力』(Oxidative Stress) 同『發炎』(Inflammation)——呢啲會 stress 你既 DNA，令到蛋白質錯誤摺疊。」\n\n#### 呢個過程點解咁咁恐怖？\n\n| 步驟 | 發生咩事 |\n|------|----------|\n| 1 | 果糖/高胰島素 → 產生 AGE (糖化終產物) 同 ROS (活性氧) |\n| 2 | AGE + ROS → 攻擊 mitochondria (粒線體) |\n| 3 | 粒線體受損 → 產生更多氧化壓力 |\n| 4 | 氧化壓力 + 發炎 → 攻擊 DNA 同 Protein |\n| 5 | DNA 受損 → Protein Misfolding |\n| 6 | Amyloid Beta + Tau 累積 → 神經元死亡 |\n\n> 「呢個就係點解就算你有正常體重，但係長期食高糖嘢、飲含糖飲品，都一樣會損害你既大腦。」\n\n---\n\n### 😴 深層睡眠點樣保護我哋既大腦？\n\n#### Glymphatic System（膠淋巴系統）\n\n| 功能 | 點解重要？ |\n|------|-----------|\n| **清除可溶性 Amyloid Beta** | 喺深層睡眠時透過腦部淋巴系統清除有害蛋白質 |\n| **清除可溶性 Tau Protein** | 同樣喺深層睡眠時清除 |\n| **細胞自噬 (Autophagy)** | 喺深層睡眠時加強——呢個過程會吞噬並清除受損細胞 |\n\n> 「呢個係我哋身體既『垃圾清理系統』。如果你深層睡眠唔夠，呢個系統就唔夠時間運作——有害蛋白質就會不斷累積。」\n\n#### 深層睡眠點樣影響呢兩種蛋白質？\n\n| 蛋白質 | 深層睡眠既清除機制 |\n|---------|-------------------|\n| **Amyloid Beta** | 透過淋巴系統將可溶性 Amyloid Beta 清走，唔好變成斑塊 (Plaque) |\n| **Tau Protein** | 透過細胞自噬 (Autophagy) 吞噬並清除 |\n\n> 「如果你深層睡眠唔夠——呢兩個清除機制都會癱瘓。有害蛋白質就會不斷累積，最終變成不可溶性，然後等15-30年後一次性爆發。」\n\n---\n\n### 👁️ 眼睛同大腦既關係——呢個係重點！\n\n#### 眼睛=大腦既延伸\n\n| 器官 | 點解佢咁重要？ |\n|------|----------------|\n| **視網膜 (Retina)** | 視網膜係中樞神經系統既一部分——佢係大腦既『延伸』 |\n| **血腦屏障 (Blood Brain Barrier)** | 保護大腦免受有害物質入侵 |\n| **血視網膜屏障 (Blood Retina Barrier)** | 同血腦屏障一樣——保護視網膜 |\n\n> 「呢個係進化既一個神奇設計——視網膜其實係大腦既一部分，只係『伸出嚟』令我可以感光。」\n\n#### 點解話「保護眼睛 = 保護大腦」？\n\n| 問題 | 點解會影響大腦？ |\n|------|-----------------|\n| **視力衰退** | 大腦需要用更多資源去『修正』視力，變相減少認知功能既資源 |\n| **藍光傷害** | 手機/電腦藍光 → 視網膜氧化壓力 → 間接送害大腦 |\n| **黃斑病變 (Macular Degeneration)** | 視網膜受損 → 大腦功能間接受損 |\n\n> 「呢個係呢幾年既前沿研究——原來視網膜入面既 Amyloid Beta 同 Tau Protein 係可以反映大腦既狀態。換句話說——如果你睇到視網膜有異常，基本上你大腦都出事緊。」\n\n---\n\n### 📱 現代人最大既問題——屏幕藍光\n\n#### 進化失配 (Evolution Mismatch)\n\n| 項目 | 古代/正常情況 | 現代情況 |\n|------|---------------|----------|\n| **晚間光線** | 只有火光（紅光/橙光） | LED燈、手機、電腦（高藍光） |\n| **光線暴露時間** | 日出而作，日入而息 | 24/7對住屏幕 |\n| **眼睛傷害** | 极少 | 前所未有咁多 |\n\n> 「我哋既眼睛同大腦係為左火光進化既——紅光/橙光對眼睛既傷害好細。但係現代既 LED燈、手機、電腦發出既藍光……呢個係我哋既DNA完全冇準備好既嘢。」\n\n#### 藍光點樣傷害眼睛同大腦？\n\n| 過程 | 結果 |\n|------|------|\n| 藍光射入視網膜 | 直接引發氧化壓力 (Oxidative Stress) |\n| 視網膜受損 | 產生發炎反應 |\n| 長期累積 | 黃斑病變 (Macular Degeneration) |\n| 視網膜同大腦相連 | 大腦間接受損 |\n\n> 「手機屏幕既藍光係而家對眼睛最大既傷害來源——呢個傷害會間接影響你既大腦。」\n\n---\n\n### 🛡️ 點樣保護眼睛同大腦？\n\n#### 第一層：避免藍光傷害\n\n| 行動 | 點做？ | 點解？ |\n|------|--------|--------|\n| **戴帽子** | 戶外活動時戴帽 | 減少直射眼睛既陽光 |\n| **UV Coating 眼鏡** | 配眼鏡時加 UV Coating | 過濾紫外光 |\n| **防藍光屏幕** | 用 Apple Night Shift / 防藍光膜 | 減少藍光輸出 |\n| **減少屏幕時間** | 盡量少睇手機 | 直接減少藍光暴露 |\n\n#### 第二層：屏幕使用策略\n\n| 策略 | 做法 | 適用情況 |\n|------|------|----------|\n| **E-ink 閱讀器** | 用 Amazon Kindle / 其他 E-ink 機 | 睇書、睇長文 |\n| **大屏幕** | 用 10-13 吋屏幕 | 減少眼睛疲勞 |\n| **反光控制** | 避免屏幕反光 | 減少不必要既光線進入眼睛 |\n\n> 「如果你工作需要對住電腦——買一部有防藍光涂層既屏幕係值得既投資。Apple Night Shift 係最基本既保護，但係佢唔係最有效既方法。」\n\n#### 第三層：眼睛補充劑 (Supplements)\n\n| 補充劑 | 點解有效？ | 點解可以穿越屏障？ |\n|---------|-----------|-------------------|\n| **Lutein (葉黃素)** | 眼睛既抗氧化劑 | 可以穿越血視網膜屏障 |\n| **Zeaxanthin (玉米黃素)** | 同葉黃素類似 | 可以穿越血視網膜屏障 |\n| **Astaxanthin (蝦青素)** | 強效抗氧化劑 | 可以穿越血視網膜屏障 |\n| **DHA (魚油/藻油)** | Omega-3，保護神經細胞 | 可以穿越血視網膜屏障 |\n\n> 「呢四樣補充劑都可以穿越血視網膜屏障——呢個屏障同血腦屏障一樣咁難穿越。點解佢哋有效？就係因為佢哋係少數可以穿越呢兩個屏障既抗氧化劑。」\n\n---\n\n### 📊 點解控制血糖、血壓咁重要？\n\n#### 呢三樣嘢係「一脈相承」\n\n| 因素 | 點影響眼睛？ | 點影響大腦？ |\n|------|-------------|-------------|\n| **高血糖** | 視網膜血管受損 | 腦血管受損、胰島素阻抗 |\n| **高血壓** | 視網膜血管壓力過大 | 腦血管壓力過大 |\n| **高尿酸** | 增加氧化壓力 | 增加氧化壓力 |\n\n> 「呢三樣嘢加埋一齊——就會形成一個完美風暴 (Perfect Storm)，不斷 stress 你既眼睛同大腦。」\n\n---\n\n### 🎯 總結：保護大腦/眼睛清單\n\n#### 每日必須做\n\n| 行動 | 具體做法 |\n|------|----------|\n| **控制血糖** | 低GI飲食、16:8斷食 |\n| **控制血壓** | 陽光下行路、減少鹽攝入 |\n| **深層睡眠** | 確保每日有足夠深層睡眠 |\n| **減少藍光** | Night Shift、戴帽 |\n\n#### 長期保護\n\n| 行動 | 具體做法 |\n|------|----------|\n| **補充劑** | Lutein + Zeaxanthin + Astaxanthin + DHA |\n| **E-ink閱讀** | 用E-ink睇書，減少LCD/LED屏幕 |\n| **定期檢查** | 眼底檢查、視力檢查 |\n\n#### 絕對避免\n\n| 避免 | 原因 |\n|------|------|\n| **深夜睇手機** | 藍光 + 影響睡眠 |\n| **行路睇手機** | 頸椎受損 + 眼睛受損 |\n| **食過多糖/果糖** | 果糖代謝損害大腦 |\n\n---\n\n### 💡 Key Takeaways\n\n| 重點 | 說明 |\n|------|------|\n| **Protein Misfolding = 阿茲海默症既根源** | Amyloid Beta + Tau 累積 → 神經元死亡 |\n| **呢個過程要15-30年** | 而家冇症狀唔代表冇事 |\n| **深層睡眠 = 天然清除系統** | Glymphatic System + Autophagy |\n| **眼睛 = 大腦既延伸** | 保護眼睛 = 保護大腦 |\n| **藍光 = 現代最大敵人** | 手機、電腦屏幕傷害眼睛→傷害大腦 |\n| **Lutein/Zeaxanthin/DHA** | 呢四樣補充劑可以穿越屏障，直接保護眼睛同大腦 |\n| **血糖 + 血壓 + 尿酸** | 呢三樣嘢一脈相承，全部都要控制 |\n\n> 「呢兩堂（11 + 11.5）可能係整個課程入面最重要既內容——因為佢決定咗你老咗之後既人生質素。係咪想變成一個有思考能力既人，定係淨得一條空殼——而家就係你要做決定既時候。」\n\n---\n\n## Lesson 12 - 口腔健康、消化系統與幽門螺旋菌 (Oral Health & Digestive System)\n\n*呢堂主要講解口腔健康、胃部功能、同埋幽門螺旋菌 (Helicobacter pylori) 對我哋既影響。呢堂既內容好前緣——講到幽門螺旋菌同我哋既共生關係、佢點樣影響我哋既健康、點解我叫「不要拎電話食飯」同「廁所唔好用電話」呢啲咁重要。*\n\n---\n\n### 🦷 口腔健康點解咁重要？\n\n#### 牙齒 = 消化系統既第一關卡\n\n| 功能 | 點解重要？ |\n|------|-----------|\n| **機械性消化 (Mechanical Digestion** | 牙齒咀嚼係消化既第一步——咬得夠細，後面既消化先會順利 |\n| **口水澱粉酶** | 一入口就已經開始分解碳水化合物 |\n| **古代動物既經驗** | 動物老到冇牙齒就會死——牙齒對生存極度重要 |\n\n> 「喺動物界，如果一隻動物老到冇牙齒——佢就會死。呢個就係牙齒既重要性。」\n\n---\n\n### 🍽️ 食道同胃\n\n#### 食道健康\n\n| 問題 | 點解會發生？ |\n|------|-------------|\n| **胃酸倒流** | 太晚食飯，食完就瞓——胃酸去咗唔應該去既地方 |\n| **食道癌 | 長期胃酸傷害食道 |\n| **過熱食物 | 滾燙既食物會傷害食道 |\n\n> 「食火鍋既時候——等啲嘢凍一陣先食。滾辣辣就落嘴——呢個對食道有傷害。」\n\n#### 胃酸既重要性\n\n| 功能 | 點解重要？ |\n|------|-----------|\n| **消化蛋白質 | 胃酸係分解蛋白質既主要工具 |\n| **屏障功能 | 殺死入面既病原體——古代食嘢唔乾淨架嘛 |\n| **吸收營養 | 準備嘢俾小腸吸收 |\n\n---\n\n### 🦠 幽門螺旋菌 (Helicobacter pylori)\n\n#### 乜嘢係幽門螺旋菌？\n\n| 特性 | 說明 |\n|------|------|\n| **存在時間 | 同人類共生咗10萬年以上 |\n| **感染率 | 估計7-9成人都感染咗 |\n| **進化假說 | 作者既 Hypothesis——呢樣嘢領先世界40年以上 |\n\n> 「幽門螺旋菌呢樣嘢呢——科學家估計同人類共生咗10萬年以上。呢個係我既 Hypothesis——我相信佢對我哋既進化有幫助。」\n\n#### 幽門螺旋菌做啲乜？\n\n| 功能 | 點解佢存在？ |\n|------|-------------|\n| **分泌氨 (Ammonia) + CO2 | 中和胃酸——令佢住得舒服啲 |\n| **令胃排空慢咗 | 食物留喺胃耐啲——俾更多時間消化 |\n| **刺激分泌更多胃酸 | 令消化更有效率 |\n\n> 「幽門螺旋菌呢——佢做兩樣嘢。第一，佢分泌氨同二氧化碳去中和胃酸。第二，佢令胃排空慢咗——呢樣嘢令古代人有更多時間消化食物。」\n\n#### 幽門螺旋菌點解對古代人有益？\n\n| 情況 | 點解有益？ |\n|------|----------|\n| **急性壓力 (Acute Stress)** | 逃離危險時——需要能量——胃酸多咗，消化快咗 |\n| **病原體入侵 | 胃酸係第一道防線——殺死有害物質 |\n\n> 「古代人遇到獅子追——要走佬。幽門螺旋菌令胃酸多咗——消化快咗——有更多能量走佬。呢個就係進化既生存優勢。」\n\n#### 幽門螺旋菌點解對現代人有害？\n\n| 問題 | 點解會發生？ |\n|------|-------------|\n| **胃炎 | 長期胃酸過多——傷害胃黏膜 |\n| **胃潰瘍 | 胃黏膜受損——出血、疼痛 |\n| **腸化生 (Intestinal Metaplasia)** | 胃細胞變成小腸細胞——胃癌既前一步 |\n| **胃癌 | 腸化生進一步惡化——好大機會變癌 |\n\n> 「腸化生呢樣嘢——10個有9個都會變胃癌。呢個就係幽門螺旋菌既後果。」\n\n---\n\n### 🔥 乜嘢會 trigger 幽門螺旋菌？\n\n#### Trigger #1：口腔衛生差\n\n| 點解有關？ |\n|----------|\n| 幽門螺旋菌可以住喺口腔 |\n| 口腔唔乾淨——佢住多啲 |\n| 嘔心嘢——吞落肚——又返去胃度 |\n\n> 「如果你刷牙唔認真——一日兩次都冇刷——幽門螺旋菌就住多啲喺你口腔度。你嘔嘢既時候——又吞返落肚——返去胃度。呢個循環不斷發生。」\n\n#### Trigger #2：超加工食物 (Ultra-Processed Food)\n\n| 嘢 | 點解有害？ |\n|------|------------|\n| **高糖/果糖 | 幽門螺旋菌既超級食物 |\n| **易吸收 | 直接入胃——唔使點消化 |\n| **發酵 | 留喺胃耐咗——幽門螺旋菌開心咗 |\n\n> 「薯片、餅乾、汽水——呢啲嘢呢——幽門螺旋菌好鍾意食。佢食完就分泌更多嘢——搞到你胃唔舒服。」\n\n#### Trigger #3：慢性壓力 (Chronic Stress)\n\n| 嘢 | 點解有害？ |\n|------|----------|\n| 現代人成日有壓力 | 一日24小時都係壓力 |\n| 電話、email、work | 呢啲都係慢性壓力 |\n| 身體唔識分急性定慢性 | 全部當係要走去走佬 |\n\n> 「現代人既壓力呢——同古代獅子追完全唔同。古代係獅子追完就冇事——現代呢——email成日嚟、work成日做——慢性壓力不斷刺激幽門螺旋菌。」\n\n#### Trigger #4：胃藥 (PPI - Protein Pump Inhibitor)\n\n| 藥物 | 例子 |\n|--------|------|\n| **PPI** | Nexium、奧美拉唑 |\n| **點解有害？ | 減少胃酸——幽門螺旋菌更易生存 |\n| **長遠後果 | 胃入面既害菌更容易生存 |\n\n> 「PPI呢啲胃藥呢——短期食呢，胃係舒服啲。但係長期食呢——胃酸少咗——幽門螺旋菌更易生存——問題更大。」\n\n---\n\n### 📱 四個唔應該用電話既地方\n\n| 地方 | 原因 |\n|------|------|\n| **🚽 廁所 | 廁所係最大污染源——拎電話入去——拎電話出來 |\n| **🍽️ 食飯 | Mindful eating——專心食飯——身體先知自己食緊嘢 |\n| **🛏️ 瞓覺前 | 藍光影響睡眠——影響深層睡眠 |\n| **🚶 行路 | 頸椎受傷——又唔睇路——危險 |\n\n> 「呢四個地方呢——係我私人習慣。第一，廁所唔拎電話。第二，食飯唔拎電話——專心食。第三，瞓覺前拎電話——藍光。第四，行路拎電話——頸椎受損。」\n\n---\n\n### 🧠 Mindful Eating 幾咁重要？\n\n#### 專心食飯既好處\n\n| 好處 | 點解？ |\n|------|--------|\n| **咬多啲 | 專心先會慢慢咬 |\n| **消化好啲 | 嘢咬得細——胃容易處理 |\n| **Ghrelin/Leptin 正常 | 知道食咗嘢——唔會太快肚餓 |\n| **胃酸正常 | 專心食——胃酸正常分泌 |\n\n> 「如果你一邊食飯一邊睇電話——你咬少咗、吞快咗、胃酸正常分泌——全部出問題。」\n\n#### 唔專心食飯既後果\n\n| 問題 | 結果 |\n|------|------|\n| **咬少咗 | 嘢未嚼爛——胃要更大力消化 |\n| **胃酸分泌亂 | 消化唔好——胃唔舒服 |\n| **冇滿足感 | 食完仲肚餓——食多咗 |\n| **Ghrelin 亂 | 成日肚餓——食極唔飽 |\n\n> 「如果你專心食飯——你會咬多啲、分泌正常既胃酸——呢個先係最健康既狀態。」\n\n---\n\n### 🚶 步行既重要性 (續)\n\n#### 週末加碼步行\n\n| 日子 | 點做？ |\n|------|--------|\n| **平時 | 9000步 |\n| **週末/假期 | 加50-100%——13500-18000步 |\n| **點解？ | 太陽光——維他命D——新陳代謝 |\n\n> 「平時9000步——週末呢——加50%至100%——13500步-18000步。呢個令你既新陳代謝維持喺高水平。」\n\n---\n\n### 💡 Key Takeaways\n\n| 重點 | 說明 |\n|------|------|\n| **幽門螺旋菌係共生菌 | 同我哋共存咗10萬年——有時有益、有時有害 |\n| **Trigger決定結果 | 口腔衛生、食物、壓力、藥物——決定佢幫你定係害你 |\n| **四個唔拎電話既地方 | 廁所、食飯、瞓覺前、行路 |\n| **專心食飯 | Mindful Eating——咬多啲——消化好啲 |\n| **PPI 胃藥 | 短期有用——長期有害 |\n| **週末加碼步行 |太陽光——維他命D——新陳代謝 |\n\n> 「呢堂呢——重點係乜？幽門螺旋菌呢樣嘢——你點對待佢——決定你既胃健康。專心食飯、口腔乾淨——呢兩樣嘢做好咗——胃痛、胃酸倒流呢啲嘢——自然會好。」\n\n---\n\n## Lesson 12.5 - 腸道微生物與腸腦軸線 (Gut Microbiome & Gut-Brain Axis)\n\n*呢堂係第十二堂既下半部分——深入講解腸道微生物點樣影響我哋既健康、腸腦軸線既運作機制、以及點樣「重新培養」一個健康既腸道微生態。呢堂既內容非常前緣——涉及2020年代既最新研究發現。*\n\n---\n\n### 🦠 乜嘢係腸道微生物 (Gut Microbiome)？\n\n#### 基本數據\n\n| 數據 | 說明 |\n|------|------|\n| **數量 | 約100兆 (100 Trillion) 微生物 |\n| **基因數量 | 約200萬個獨特基因 |\n| **人類基因數量** | 只有約2萬個 |\n| **結論** | 腸道微生物既基因數量係人類既100倍 |\n\n> 「呢100兆微生物呢——係地球上面所有星系既星星加起來都多。佢哋住喺你條腸度——日夜不停運作。」\n\n#### 點解腸道微生物咁重要？\n\n| 功能 | 點解重要？ |\n|------|-----------|\n| **幫助消化** | 分解人類自己消化唔到既食物纖維 |\n| **製造維他命** | 特別係維他命B同K |\n| **調節免疫系統** | 佔咗身體70%既免疫細胞 |\n| **影響大腦** | 透過腸腦軸線 (Gut-Brain Axis) 指揮你既情緒同行為 |\n| **調節新陳代數** | 決定你係處於「夏天模式」定「冬天模式」 |\n\n> 「腸道微生物既基因數量係人類既100倍——換句話說，你條腸入面既『第二腦』其實先至係主宰你健康既真正老細。」\n\n---\n\n### 🧠 腸腦軸線 (Gut-Brain Axis)\n\n#### 乜嘢係腸腦軸線？\n\n腸道同大腦之間既溝通系統：\n\n| 溝通方式 | 說明 |\n|----------|------|\n| **迷走神經 (Vagus Nerve)** | 物理上連接腸道同大腦——係全身最長既神經 |\n| **荷爾蒙** | 腸道製造既荷爾蒙會進入血液，影響大腦 |\n| **神經傳導物質** | 約95%既血清素 (Serotonin) 係腸道製造 |\n| **免疫信號** | 腸道免疫系統會發送信號去大腦 |\n\n> 「腸道製造約95%既全身血清素——你以為你既心情係由大腦話事？其實大半都係你條腸度緊既微生物控制緊。」\n\n#### 血清素 (Serotonin) 同腸道既關係\n\n| 數據 | 說明 |\n|------|------|\n| **全身血清素** | 95%係腸道製造 |\n| **大腦血清素** | 得5% |\n| **陽光影響** | 陽光係製造血清素既重要因素 |\n| **褪黑色素 (Melatonin)** | 血清素既前體——影響睡眠 |\n\n> 「如果你長期冇足夠陽光、又條腸唔健康——你既血清素就會偏低——呢個就係點解好多人冬天會有『季節性情緒失調』(SAD)。」\n\n---\n\n### 🌞 夏天模式 vs ❄️ 冬天模式 (Bloom vs Doom Mode)\n\n#### 乜嘢係夏天模式 (Bloom Mode / Summer Mode)？\n\n| 特點 | 說明 |\n|------|------|\n| **能量狀態** | 高能量、清醒 |\n| **新陳代數** | 快速、燃燒脂肪 |\n| **情緒** | 正面、積極 |\n| **睡眠** | 深層睡眠、修復 |\n| **免疫** | 強健 |\n\n#### 乜嘢係冬天模式 (Doom Mode / Winter Mode)？\n\n| 特點 | 說明 |\n|------|------|\n| **能量狀態** | 低能量、疲倦 |\n| **新陳代數** | 慢、儲存脂肪 |\n| **情緒** | 負面、焦慮 |\n| **睡眠** | 淺層睡眠、冇乜修復 |\n| **免疫** | 弱 |\n\n> 「呢兩個模式呢——唔係你話想邊個就得邊個。你條腸度既微生物會『投票』決定你想邊個模式。」\n\n#### 乜嘢會觸發冬天模式？\n\n| Trigger | 點解有害？ |\n|---------|------------|\n| **加工食物** | 餵埋啲唔應該餵既嘢落去——令壞菌開心 |\n| **慢性壓力** | 令條腸以為有危險——啟動冬天模式 |\n| **睡眠不足** | 條腸會以為環境唔安全 |\n| **抗生素** | 殺死好菌——令壞菌當道 |\n| **冇嘢落大腸** | 令好菌冇嘢食——壞菌就會話事 |\n\n> 「如果你食完嘢——啱啱入咗小腸就已經吸收晒——冇嘢落大腸——你條腸就會以為而家係冬天、冇嘢食——跟住就啟動冬天模式。」\n\n---\n\n### 🔬 三個關鍵詞：益生元 (Prebiotics)、益生菌 (Probiotics)、後生元 (Postbiotics)\n\n#### 益生元 (Prebiotics)\n\n| 定義 | 例子 |\n|------|------|\n| **係乜？** | 好菌鍾意食既嘢 |\n| **作用** | 餵好菌——令佢哋生長 |\n| **例子** | 抗性澱粉 (Resistant Starch)、蔬菜纖維 |\n\n> 「抗性澱粉呢——入咗小腸唔會被吸收，直落大腸——呢個就係好菌既盛宴。」\n\n#### 益生菌 (Probiotics)\n\n| 定義 | 例子 |\n|------|------|\n| **係乜？** | 好菌本身 |\n| **作用** | 補充好菌落條腸度 |\n| **例子** | 乳酪 (Plain Yogurt)、克菲爾 (Kefir)、泡菜 (Kimchi)、芝士 |\n\n> 「如果食乳酪——要揀純天然發酵既——加咗糖同香料既冇乜用。」\n\n#### 後生元 (Postbiotics)\n\n| 定義 | 例子 |\n|------|------|\n| **係乜？** | 好菌製造出嚟既Signal Molecules |\n| **作用** | 指揮身體進入夏天模式 |\n| **最重要既例子** | 丁酸鹽 (Butyrate) |\n\n> 「丁酸鹽 (Butyrate) 係最有力既夏天模式Signal。它會話俾你全身知——而家係夏天，可以放心燒脂、唔使儲肥。」\n\n---\n\n### 🏗️ 腸漏症 (Leaky Gut)\n\n#### 乜嘢係腸漏症？\n\n| 正常情況 | 腸漏症情況 |\n|----------|-----------|\n| **腸壁** | 只有一層細胞咁薄 |\n| **功能** | 選擇性讓營養通過 |\n| **問題** | 呢層細胞受損——變得「漏」 |\n\n#### 腸漏症會引發咩問題？\n\n| 問題 | 點解會發生？ |\n|------|-------------|\n| **慢性發炎** | 有害物質漏入血液——免疫系統成日打仗 |\n| **免疫系統過度活躍** | 長期對抗「入侵者」——搞到周身發炎 |\n| **自體免疫疾病** | 免疫系統錯手攻擊自己身體 |\n| **認知問題** | 炎症物質入咗腦袋——影響情緒同認知 |\n| **便秘** | 腸道蠕動受影響 |\n\n> 「呢層得返一層細胞咁薄既牆呢——如果長期畀垃圾食物、毒素攻擊——就會變『漏』——啲唔應該入血既嘢就會入血——搞到周身發炎。」\n\n---\n\n### 👶 邊啲因素影響我哋既腸道微生物？\n\n#### 先天因素\n\n| 因素 | 點解重要？ |\n|------|-----------|\n| **分娩方式** | 順產——經過產道會拎到媽媽既腸道菌；開刀——拎唔到 |\n| **母乳餵哺** | 母乳有媽媽既腸道菌；奶粉冇 |\n| **早期抗生素** | 細個用抗生素——對腸道菌影響深遠 |\n\n> 「如果你係開刀出世、又飲奶粉大——你條腸既起跑線已經輸咗。呢個唔係話冇得救——但你要比人更加努力先至追得上。」\n\n#### 後天因素\n\n| 因素 | 點解重要？ |\n|------|-----------|\n| **飲食** | 食咩落肚——決定邊種菌會生存 |\n| **壓力** | 慢性壓力會改變腸道菌組成 |\n| **睡眠** | 瞓得差——條腸唔會 Happy |\n| **運動** | 郁身郁勢——腸道蠕動都健康啲 |\n| **抗生素** | 抗生素係腸道菌既核彈——好菌壞菌都殺 |\n\n> 「COVID期間——成日消毒、洗手——呢啲嘢雖然保護你免受病毒，但係都會殺死你條腸既好菌——呢個係好多人COVID之後身體變差既原因之一。」\n\n---\n\n### 💊 點樣「重新培養」一個健康既腸道？\n\n#### 第一步：補充好菌 (Probiotics)\n\n| 時間 | 點做？ |\n|------|--------|\n| **最佳時間** | 臨瞓前 |\n| **原因** | 呢個時間消化系統休息——益生菌最易直落大腸 |\n| **份量** | 每日一劑，連續12星期 |\n| **種類** | Bifidobacterium + Lactobacillus 混合
