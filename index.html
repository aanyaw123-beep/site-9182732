 |\n\n> 「如果你晏晝食——益生菌喺胃酸度已經死咗一大半。臨瞓前食——胃酸少——益生菌先至可以完整咁落去大腸。」\n\n#### 第二步：餵好菌 (Prebiotics)\n\n| 食物 | 點解好？ |\n|------|----------|\n| **綠色香蕉** | 含豐富抗性澱粉 |\n| **番薯/紫薯** | 抗性澱粉含量高 |\n| **其他蔬菜** | 纖維係好菌既食物 |\n| **全穀物** | 含有不可消化既碳水化合物 |\n\n> 「綠色香蕉呢——完全唔甜既。佢既抗性澱粉呢——入咗小腸唔會被吸收，直落大腸——就係好菌既 buffet。」\n\n#### 第三步：令好菌製造後生元 (Postbiotics)\n\n| 做法 | 原理 |\n|------|------|\n| **持續供應 Prebiotics** | 好菌有嘢食——先會製造 Postbiotics |\n| **令丁酸鹽增加** | 丁酸鹽係最強既夏天模式 Signal |\n| **改善腸漏** | 令條腸壁修復——唔再漏嘢 |\n\n> 「Probiotics + Prebiotics = Postbiotics。呢三樣嘢要一齊做——單靠一樣唔夠。」\n\n---\n\n### 📱 廁所唔好拎電話 (同Lesson 12既四個規則呼应)\n\n#### 點解廁所唔好拎電話？\n\n| 原因 | 解釋 |\n|------|------|\n| **排便需要專心** | 排便係一個需要「放鬆」既過程 |\n| **低水平壓力** | 拎住電話——就算你冇做嘢——都會有低水平壓力 |\n| **腸道蠕動受影響** | 有壓力——條腸唔會放心畀你排便 |\n| **毒素累積** | 便秘會令毒素喺條腸度停留更耐 |\n\n> 「動物排便既時候——會處於一個冇防備既狀態。如果你拎住電話——就算你唔緊張——你條腸都會『感应』到有少少壓力——佢就唔會畀你排得咁順。」\n\n---\n\n### 🔄 夏天模式點樣影響排便？\n\n#### 健康排便既關鍵\n\n| 因素 | 作用 |\n|------|------|\n| **腸道微生物平衡** | 好菌當道——令條腸放心排便 |\n| **腸漏症改善** | 條腸冇咁易受刺激 |\n| **蠕動正常** | 食物殘渣可以順利向前推進 |\n| **Signal正確** | 條腸知而家有嘢要排出——就會排 |\n\n> 「如果你跟住個Program做——大便會前所未有咁靚——呢個係好多人報告既一件事。」\n\n---\n\n### 🎯 總結：點樣保持夏天模式？\n\n#### 每日要做既嘢\n\n| 項目 | 具體做法 |\n|------|----------|\n| **食Prebiotics** | 食綠色香蕉、番薯、蔬菜 |\n| **避免Trigger** | 唔好食加工食物、唔好有慢性壓力 |\n| **臨瞓食Probiotics** | 每日臨瞓前一粒 |\n| **曬太陽** | 令血清素正常 |\n| **充足睡眠** | 令條腸有時間修復 |\n\n#### 避免既嘢\n\n| 項目 | 原因 |\n|------|------|\n| **加工食物** | 餵壞菌 |\n| **滥用抗生素** | 殺死好菌 |\n| **過度消毒** | 影響皮膚同腸道菌 |\n| **慢性壓力** | 令條腸以為有危險 |\n\n---\n\n### 💡 Key Takeaways\n\n| 重點 | 說明 |\n|------|------|\n| **腸道微生物 = 第二腦** | 100兆微生物控制你既健康 |\n| **腸腦軸線** | 95%血清素係腸道製造 |\n| **夏天模式 vs 冬天模式** | 由腸道微生物話事 |\n| **腸漏症** | 一層細胞咁薄既腸壁受損——引發慢性發炎 |\n| **Probiotics + Prebiotics = Postbiotics** | 三個要一齊做 |\n| **臨瞓前食Probiotics** | 最佳時間——益生菌最易存活 |\n| **綠色香蕉** | 最佳Pre食物——抗性澱粉豐富 |\n| **COV** | 成日消毒——會影響腸道菌 |\n| **分娩方式同母乳** | 影響腸道菌既起跑線 |\n\n> 「呢堂呢——教識你點樣同你條腸溝通。佢係你身體入面最強大既盟友——但你要識得點樣氹佢開心。記住——佢開心你就開心；佢唔開心——你周身都唔會好。」\n\n---\n\n## Lesson 13 - 第一季總結與實用指南 (Season 1 Finale & Practical Guide)\n\n*呢堂係第一季既最後一課——唔係新知識，而係將之前既野撈埋一齊，話俾你知點樣响日常生活中實踐。呢堂包含大量實用建議——麵包替代品、白飯、麵、水果、奶製品、酒等點樣食、點樣唔好食。*\n\n---\n\n### 🎯 第一季核心回顧\n\n#### 課程設計既精髓\n\n| 重點 | 說明 |\n|------|------|\n| **Sequence 極度重要** | 每堂有佢既位置，唔好跳級 |\n| **12星期係最低要求** | 時間唔夠，腸道微生物唔會flip |\n| **冇Quick Fix** | 所有野都係combo——synergy先至有效 |\n| **Sequence到Season 2都唔會變** | 第二季既人都要由S1開始 |\n\n> 「呢個Program呢——係一個well-designed既sequence。如果你跳級——你永遠唔會明白點解要做咁多野。」\n\n---\n\n### 🦠 腸漏症 (Leaky Gut) 重要補充\n\n#### 點解腸漏症咁要命？\n\n| 過程 | 結果 |\n|------|------|\n| 腸壁得一層細胞咁薄 | 好易受損 |\n| 呢層野本身係為左吸收營養 | 但係現代食物會搞壞佢 |\n| 搞壞咗就會「漏」 | 有害物質入血 |\n| 有害物質入血 | 免疫系統成日出兵打仗 |\n| 長期打仗 | 慢性發炎周身走 |\n\n> 「腸漏症呢——唔係西醫信唔信既問題。過去五年，全球最高級既研究機構全部證實咗——呢樣野係真既。」\n\n---\n\n### 💊 三合一方案 (Three-Pronged Approach)\n\n#### 1️⃣ Prebiotics (益生元) —— 餵好菌\n\n| 食物 | 點解好？ |\n|------|----------|\n| **綠色香蕉** | 抗性澱粉豐富，唔甜 |\n| **番薯/紫薯** | 抗性澱粉含量高 |\n| **蔬菜纖維** | 好菌既主要食物 |\n\n#### 2️⃣ Probiotics (益生菌) —— 補好菌\n\n| 食物 | 點解好？ |\n|------|----------|\n| **希臘乳酪 (Greek Yogurt)** | 發酵食品，含豐富益生菌 |\n| **克菲爾 (Kefir)** | 發酵乳飲品 |\n| **泡菜 (Kimchi)** | 傳統發酵蔬菜 |\n| **優質芝士** | 發酵時間長，既補菌又補C4 |\n\n#### 3️⃣ Postbiotics (後生元) —— 丁酸鹽 (Butyrate/C4)\n\n| 補充劑 | 點解重要？ |\n|--------|------------|\n| **Tributyrin (三丁酸甘油酯)** | 直接補充C4——去到大腸先分解 |\n| **作用** | 呢個係最強既夏天mode signal |\n\n> 「Tributyrin呢——係engineer到去到大腸先分解。如果淨係食普通butyrate，佢响胃/小腸已經吸收咗——去唔到大腸。」\n\n---\n\n### 🍞 麵包替代方案\n\n#### 如果真係想食麵包點算？\n\n| 選擇 | 說明 |\n|------|------|\n| **天然酸種麵包 (Sourdough)** | 要真係發酵咗18-36個鐘頭既 |\n| **almond flour** | 低碳替代品 |\n| **其他穀物粉** | 要睇清楚成分 |\n\n> 「而家出面賣既麵包——好少真係用傳統方法發酵。大部分都係 industrial process——冇左個化學過程。」\n\n#### 點解白麵包咁衰？\n\n| 問題 | 後果 |\n|------|------|\n| **升糖指數極高** | 血糖大上大落 |\n| **冇抗性澱粉** | 冇野落大腸 |\n| **加工過程** | 營養流失 |\n\n---\n\n### 🍚 白飯、粥、麵\n\n#### 白飯\n\n| 觀點 | 說明 |\n|------|------|\n| **主食地位** | 白飯本身OK——但要留意份量 |\n| **最尾先食** | 先食菜->肉->飯 |\n| **唔好當正餐食** | 最多當小量碳水 |\n\n#### 粥 (Congee)\n\n| 問題 | 後果 |\n|------|------|\n| **升糖極快** | 比白飯更勁 |\n| **結構改變** | 糊化程度高，極易吸收 |\n| **建議** | 盡量唔好食——如果真係想食，當甜品 |\n\n> 「潮州粥呢——極高升糖。如果你当正餐食——你既血糖會好快崩潰。」\n\n#### 麵 (Noodles)\n\n| 選擇 | 建議 |\n|------|------|\n| **米線/米粉** | 相對乾淨——但要睇有冇奇怪添加劑 |\n| **gluten-free麵** | 要睇係咪用corn starch——corn starch唔係好野 |\n| **其他加工麵** | 盡量避免 |\n\n---\n\n### 🍌 水果正確食法\n\n#### 綠色香蕉\n\n| 特點 | 說明 |\n|------|------|\n| **抗性澱粉** | 呢個係你想食既野 |\n| **唔甜** | 代表佢仲係高抗性澱粉狀態 |\n| **點分真假** | 真正綠色香蕉——食落唔甜 |\n\n> 「有啲品牌既綠色香蕉——竟然係甜既？呢啲係經過engineering既怪物——唔好食。」\n\n#### 其他水果\n\n| 選擇 | 建議 |\n|------|------|\n| **莓類 (Berries)** | 有機——唔好食普通超市貨 |\n| **奇異果 (Kiwi)** | 有機——連皮食 |\n| **其他** | 當甜品——唔好當正餐 |\n\n> 「生果呢——唔係唔好。但係呢個年代既生果——好多都係sugar bomb。如果你真係想食——揀當季、有機、連皮食。」\n\n#### 果汁\n\n| 呢個 | 絕對唔好飲 |\n|------|-------------|\n| **原因** | 果糖直接落肝——好快變脂肪肝 |\n| **唯一例外** | 新鲜蔬菜汁 (如紅蘿蔔+姜) |\n\n---\n\n### 🥛 奶製品 (Dairy)\n\n#### 點解普通牛奶有問題？\n\n| 問題 | 說明 |\n|------|------|\n| **A1奶** | 含有會引發炎症既蛋白 |\n| **乳糖** | 對好多人黎講都係問題 |\n| **加工過程** | 流失大量營養 |\n\n#### 推薦選擇\n\n| 選擇 | 原因 |\n|------|------|\n| **A2奶** | 蛋白結構不同，較易消化 |\n| **希臘乳酪 (Greek Yogurt)** | 發酵過——去除大部分乳糖問題 |\n| **全脂芝士 (Full Fat Cheese)** | 發酵時間長——有益菌多 |\n\n> 「發酵過程中——壞既野會被好菌食晒。所以真係發酵既乳製品——對身體既影響係最小既。」\n\n#### 芝士點揀？\n\n| 選擇 | 建議 |\n|------|------|\n| **硬芝士 > 軟芝士** | 發酵時間愈長愈好 |\n| **山羊/綿羊 > 牛** | 較少炎症反應 |\n| **藍紋芝士 (Blue Cheese)** | 發酵程度最高 |\n| **片裝芝士** | 呢啲係junk food——唔好食 |\n\n---\n\n### 🍺 酒精指引\n\n#### 基本原則\n\n| 重點 | 說明 |\n|------|------|\n| **Sequence** | 一定係最尾——食完正餐先飲 |\n| **份量** | 一杯起兩杯止 |\n| **頻率** | 飲完第二日唔好飲 |\n\n#### 邊種酒最好？\n\n| 選擇 | 原因 |\n|------|------|\n| **紅酒 (尤其Pinot Noir)** | 含Polyphenols——呢啲係有益既signal molecules |\n| **有顏色既威士忌** | 橡木桶陳年——都有Polyphenols |\n| **白酒/啤酒** | 盡量避免 |\n\n> 「Polyphenols呢——係另一種signal molecule。佢會話俾你身體知——而家係一個好既環境。」\n\n#### 瘦底 vs 肥底\n\n| 體型 | 建議酒種 |\n|------|----------|\n| **瘦底** | 紅酒——身體頂唔勁烈酒 |\n| **肥底** | 威士忌——頂得住酒精既傷害 |\n\n---\n\n### 🧒 小朋友健康 (Bonus Content)\n\n#### 點解小朋友特別易受影響？\n\n| 原因 | 說明 |\n|------|------|\n| **腸道發展中** | 壞野影響會更深 |\n| **大腦發展中** | 呢個影響一生 |\n| **代謝系統** | 而家搞壞咗——大個就更難搞 |\n\n> 「小朋友食Gluten同加工食物——唔單止影響腸道。佢地既大腦發展都會受影響——呢個係一生一世既野。」\n\n#### 加工食物對小朋友既影響\n\n| 短期 | 長期 |\n|------|------|\n| **過度活躍** | 肥胖 |\n| **專注力下降** | 脂肪肝 |\n| **情緒問題** | 胰島素阻抗 |\n| **暗瘡問題** | 高血壓 |\n\n> 「而家小朋友有ADHD——呢個真係淨係genetic咩？Gluten同加工食物——絕對會放大呢啲問題。」\n\n---\n\n### 🔬 第二季Body Check\n\n#### 幾時做？\n\n| 時間 | 說明 |\n|------|------|\n| **9月23 - 11月7** | 大約12星期後 |\n| **11月中** | 正式deadline |\n\n#### 做呢個Check有咩用？\n\n| 用途 | 說明 |\n|------|------|\n| **了解自己** | 數據話俾你知邊度有改善、邊度仲未夠 |\n| **說服屋企人** | 數據係最有力既證明 |\n| **微調** | 知道你條腸flip咗幾多 |\n\n> 「呢個Body Check——唔係為咗我。係為咗你自己。你有數據先知點樣繼續改善。」\n\n---\n\n### 🎯 實踐Checklist\n\n####每日要做\n\n| 項目 | 點做？ |\n|------|--------|\n| **食Prebiotics** | 綠色香蕉/蔬菜 |\n| **臨瞓食Probiotics** | Bifidobacterium + Lactobacillus |\n| **三合一** | Pre + Pro + Post (Tributyrin) |\n\n#### 每餐Sequence\n\n| 順序 | 食物 |\n|------|------|\n| 1 | 蔬菜 (Prebiotics) |\n| 2 | 蛋白質/脂肪 |\n| 3 | 澱粉 (白飯/番薯) |\n| 4 | 甜品/水果/酒 |\n\n#### 避免\n\n| 項目 | 原因 |\n|------|------|\n| **加工食物** | 餵壞菌 |\n| **果汁** | 果糖直落肝 |\n| **白麵包** | 高升糖、冇營養 |\n| **普通牛奶** | A1蛋白易引發炎症 |\n\n---\n\n### 💡 Key Takeaways\n\n| 重點 | 說明 |\n|------|------|\n| **Sequence係王道** | 唔好跳級、唔好心急 |\n| **三合一方案** | Pre + Pro + Post |\n| **Tributyrin** | 直接補充C4——去到大腸先分解 |\n| **腸漏症係根源** | 搞掂腸漏——先至會健康 |\n| **小朋友更脆弱** | 而家處理——影響一生 |\n| **Body Check** | 12星期後做——知道你改善成點 |\n| **冇Quick Fix** | 所有野都係combo——synergy先至有效 |\n\n> 「呢13堂呢——就係咁多。S2會有更多深入既野——包括Mitigation (點樣處理自己想食既野)、Gene既野、同更多Nutrition既野。如果你而家跟住做——你既腸已經開始flip。呢個flip呢——決定你下半世既健康。」\n\n---\n\n## 🎉 Season 1 Complete!\n\n**你而家已經完成咗健康萬象第一季既所有課程！**\n\n| 統計 | 數字 |\n|------|------|\n| **總堂數** | 13堂 + 2堂Q&A |\n| **總內容** | ~127,000+ 行 |\n| **涵蓋範疇** | 胰島素、腸道、睡眠、大腦、心臟、癌症、口腔、微生物 |\n\n**下一步：**\n- 繼續實踐12星期Program\n- 留意第二季開課時間\n- 11月中做Body Check\n\n---\n\n## Important Disclaimer\n\nThe information in this file is for educational purposes only and should not be considered medical advice. Always consult with qualified healthcare professionals for medical concerns.\n\n---\n\n*Lesson 1 + 1.5 + 2 + 3 + 4 + 5 + 6 + 7 + 7.5 + 8 + 9 + 9.5 + 10 + 10.5 + 11 + 11.5 + 12 + 12.5 + 13 Complete - Last updated: 2026-02-06*\n*Transcript: 健康萬象第一課 (8609行) + 第1.5課 Q&A (8437行) + 第二課 (~10000行) + 第三課 (~9813行) + 第四課 (~11221行) + 第五課 (~11753行) + 第六課 (~10045行) + 第七課 (~10921行) + 第七點五堂 (~5261行) + 第八堂 (~7993行) + 第九堂 (~8801行，部分內容有損壞) + 第九點五堂 (~8033行) + 第十堂 (~9309行) + 第十點五堂 (~5717行) + 第十一堂 (~6429行) + 第十一點五堂 (~5073行) + 第十二堂 (~6629行) + 第十二點五堂 (~7917行) + 第十三堂 (~6361行)*\n\n---\n\n"}, {"file": "health-season2.md", "title": "Health Season2", "markdown": "# Health Season 2 Knowledge Base\n\n*Created: 2026-04-09*\n*Course: About Health Pro Summer Season*\n\n---\n\n## Lesson S2-1 (Summer Season Part 1) - About Health Pro 課程總覽\n\n*Transcript日期：2025-06-24 | About Health Pro Summer Season第一部*\n\n---\n\n### Program Core Rules（三個必須知道）\n\n| 項目 | 內容 |\n|------|------|\n| **對象** | 30-50歲健康人士（18-29已肥胖都要，50+更需要） |\n| **Disclaimer** | 個人經驗，非醫療意見；有慢性病食緊藥要先問醫生 |\n| **成功心理** | 開放、耐心、不要跳課、自己決定自己負責 |\n\n---\n\n### Season 1 參加者 Potential Improvements（12星期效果）\n\n#### 身體健康（Physical Health）\n\n| 改善範疇 | 具體變化 |\n|----------|----------|\n| **體重** | 明顯weight loss，10-20%體重（視乎個人情況） |\n| **體態** | 肚腩縮小、內臟脂肪減少、皮帶要剪掉 |\n| **血壓** | 正常化 |\n| **脂肪肝** | 改善了（目前沒有藥物可醫非酒精性脂肪肝） |\n| **濕疹** | 要麼完全fix，要麼大幅改善 |\n| **痛風** | 突然改善，甚至沒有再發作 |\n| **全身痛症** | 膝蓋大幅進步、肌肉痛、骨痛、頭痛改善 |\n\n> 「chronic這些基本上西醫沒有什麼可以幫到」\n\n#### 能量（Energy）\n\n| 項目 | 變化 |\n|------|------|\n| **早起身/上班/運動** | 能量全回來了 |\n| **沒有興奮劑副作用** | 自然方式提升能量 |\n\n#### 腸胃系統\n\n| 項目 | 改善 |\n|------|------|\n| **胃氣/胃痛** | 有人改善了 |\n| **Bloating** | 有人改善了 |\n\n#### 認知健康（Cognitive Health）\n\n| 項目 | 改善 |\n|------|------|\n| **Brain Fog** | 腦筋清晰了 |\n| **Focus / Mental Clarity** | 想東西清晰了 |\n| **說話** | 口齒不清改善 |\n\n#### 情緒健康（Emotional Well-being）\n\n| 項目 | 改善 |\n|------|------|\n| **Mood** | 心情好了 |\n| **Emotional Resilience** | 面對壓力/不開心時，抗壓能力好了 |\n\n#### 女性特有改善（Gender Specific）\n\n| 項目 | 改善 |\n|------|------|\n| **月經準成度** | 由經常不準變進步很多 |\n| **PMS（經前綜合症）** | 經痛/情緒問題改善 |\n| **PCOS** | 有參加者分享有進步 |\n| **更年期綜合症** | 症狀改善 |\n| **尿頻問題** | 中西醫都搞不定，12星期大幅改善 |\n\n#### 其他改善\n\n| 項目 | 改善 |\n|------|------|\n| **睡眠** | Deep Sleep顯著上升 |\n| **皮膚** | 全面改善 |\n| **整體** | 看起來5-10年更年輕 |\n\n---\n\n### ABC 成功框架（0與1的差別）\n\n| 字母 | 意思 |\n|------|------|\n| **A** | Attitude（心態） |\n| **B** | Belief（信念） |\n| **C** | Commitment（承諾） |\n\n> 「如果你skip了它，你的人生是0和1 difference」\n\n---\n\n### Peer Support（必須加入）\n\n| 資源 | 內容 |\n|------|------|\n| **子凡 Patreon** | Exclusive content、醫生參加者分享 |\n| **Telegram Group** | 700+人、季節1參加者解答 |\n| **McGarman YouTube Paid Member** | 12星期真人show |\n| **Discord Group** | 兩層架構 |\n\n> **最低要求：1+1（子凡 + McGarman 各起碼加入一個）**\n\n---\n\n### Season 2 夏天特別提醒\n\n| 項目 | 建議 |\n|------|------|\n| **太陽眼鏡** | 盡量唔好戴；真係唔舒服先戴；功能 > 外型；防漏光 |\n| **全視線眼鏡** | 同太陽眼鏡原則相同；唔好貪靚 |\n| **維他命C Serum** | 晚上塗面；皮膚會適應 |\n| **行山防曬** | 物理防曬（帽子）；反對化學防曬 |\n| **K1000電解質粉** | Potassium為主，唔好 Sodium；加礦泉水飲 |\n| **飲水** | 礦泉水，避免蒸餾水 |\n| **行路** | 6000步起步；千祈唔好 overdo |\n\n---\n\n### 新人必須知\n\n1. **千祈唔好skip任何堂** — 要strictly follow sequence\n2. **千祈唔好聽live** — 只有頭尾兩堂可以聽live，中間一定要聽recording\n3. **每週只可以聽2-3堂** — 唔好 rush\n4. **每週聽完要溫習** — 隨住你進步，睇返之前會有新領悟\n5. **千祈唔好分享summary** — 會傷害自己同睇嘅人\n6. **健康係你最重要既capital** — 冇健康就乜都冇\n\n---\n\n*Lesson S2-1 Complete - Last updated: 2026-04-09*\n*About Health Pro 課程總覽 + Season 1 參加者分享*\n\n---\n\n## Lesson S2-2 (Summer Season Part 2) - 肥gene vs 瘦gene + Summer Pro版攻略\n\n*Transcript日期：2025-07-01 | About Health Pro Summer Season第二堂*\n\n---\n\n### 瘦gene vs 肥gene（核心框架）\n\n| 特性 | 瘦gene | 肥gene |\n|------|--------|--------|\n| **祖先飲食** | 肉食為主 | 碳水/植物為主 |\n| **胰島素敏感度** | 高 | 低 |\n| **Beta Cell** | 較少 | 較多 |\n| **肝臟容量** | 較低 | 較高 |\n| **皮下脂肪** | 較少 | 較多 |\n| **內臟脂肪** | 容易積聚 | 先積聚肝，再積皮下 |\n\n> **最大問題**：`thin outside, fat inside`（瘦底但血管/內臟脂肪高）— 最危險，睇唔出有病\n\n---\n\n### Summer 兩大目標\n\n| 目標 | 肥gene | 瘦gene |\n|------|--------|--------|\n| **體重減幅** | 10-60磅（去到20歲體重） | 10%（去到20歲體重） |\n| **Visceral Fat** | 目標 1-2 | 目標 1-2 |\n| **方法** | 跟 Season 1 | Pro 版 |\n\n> **30% Magic Number**：如果你有 Prediabetes，減30%體重先會徹底逆轉\n\n---\n\n### 肥gene Summer 加強版（Optional）\n\n| 項目 | 做法 |\n|------|------|\n| **飯前行走** | 清肝糖（非常重要！） |\n| **飯後行走** | 降血糖 |\n| **Fasting Window** | 186 起步，可延伸至 204 或 1.5 餐 |\n| **Hidden Carbs** | 杜絕炸粉、代糖、Hidden Sugar |\n| **Vitamin C** | 每日兩次，檸檬汁/lime汁/Supplement |\n| **維他命 K2** | 如果 Visceral Fat 高要先處理 |\n\n---\n\n### 瘦gene Pro 版（Advanced）\n\n| 項目 | 做法 |\n|------|------|\n| **早餐** | 必要，Protein 為主（蛋/牛油果） |\n| **Eating Sequence** | 先吃肉 → 再菜 → 最後飯 |\n| **魚油丸** | 每日2-3次，尤其 Fatty Fish |\n| **Walking** | 主要飯後行路，避免飯前（會太瘦） |\n| **陽光** | 只曬手腳，臉要防曬（瘦底容易臉瘦） |\n| **Keto vs Dirty Keto** | 要 Healthy Keto，唔係 Dirty Keto |\n| **避免** | 十字花蔬菜（太瘦），用 Leafy Greens |\n\n---\n\n### Summer 行路特別指引\n\n| 基因 | 行路方式 |\n|------|----------|\n| **肥gene** | 平路 + 飯後行，6000步起步 |\n| **瘦gene** | 主要飯後，9000-12000步，選山路/斜路 |\n| **上樓梯** | 訓練肌肉 ✅ |\n| **落樓梯** | 傷膝蓋 ❌ |\n\n---\n\n### Summer 補充品\n\n| 補充品 | 對象 | 用法 |\n|--------|------|------|\n| **K1000 電解質粉** | 肥gene | 大汗時礦物質補充 |\n| **Vitamin C** | 肥gene | 每日2次 |\n| **Tributyrin** | 瘦gene | Pro 版重點 |\n| **魚油丸** | 瘦gene | 每日2-3次 |\n| **Vitamin D** | 所有人 | 陽光行走 |\n\n---\n\n*Lesson S2-2 Complete - Last updated: 2026-04-09*\n*肥gene vs 瘦gene + Summer Pro版攻略*\n\n---\n\n## Lesson S2-3 (Summer Season Part 3) - 超級瘦gene + 慢性壓力爹 + Walk Under the Sun\n\n*Transcript日期：2025-07-15 | About Health Pro Summer Season第三堂*\n\n---\n\n### 超級瘦Gene A（LDL Hyper-Responder）— 極罕有\n\n| 特性 | 說明 |\n|------|------|\n| **出現率** | 1000人當中1-2個 |\n| **特點** | 吃肉（尤其紅肉）LDL爆升 |\n| **祖先** | Maximum Extractor（最大限度吸收營養） |\n\n**管理方法：**\n\n| 項目 | 做法 |\n|------|------|\n| **食肉** | 白肉 > 紅肉（！非常重要） |\n| **每一餐** | 必須食飯或抗性澱粉（否則LDL標爆） |\n| **Triglycerides** | 保持極低（低過Lab Range下限） |\n| **Alcohol** | 紅酒 > 烈酒 |\n| **Oxidation** | 非常重要（防止LDL氧化變有害） |\n\n---\n\n### 超級瘦Gene B（Ultra Thin）— 極罕有\n\n| 特性 | 說明 |\n|------|------|\n| **出現率** | 1000人當中10-20個 |\n| **特點** | BMI < 18.5，conversion極低 |\n| **可能原因** | 甲狀腺問題、LADA型糖尿病、Gut Health問題 |\n\n> 注意：這類人需要advanced care，將來S3/S4先會再講\n\n---\n\n### 百病之父 = 慢性壓力（Father of All Chronic Disease）\n\n**兩大傷害途徑：**\n\n| 途徑 | 過程 |\n|------|------|\n| **血糖代謝** | 慢性壓力 → cortisol升高 → 胰島素敏感度下降 → 胰臟過勞 → 糖尿病 |\n| **發炎+免疫失調** | 慢性壓力 → cytokine增加 → 慢性發炎 → 免疫系統混亂 → 自體免疫病、癌症 |\n\n---\n\n### Walk Under The Sun 的科學\n\n| 作用 | 機制 |\n|------|------|\n| **行路** | 告訴身體\"You are safe\"（神經系統放鬆信號） |\n| **陽光** | 直接regulate cortisol |\n| **Serotonin** | 見光 → 幸福荷爾蒙 → 對抗cortisol |\n| **NO（一氧化氮）** | 血管擴張 → 血壓改善 |\n| **Vitamin D** | Mood + Inflammation + 免疫平衡 |\n\n---\n\n### 行路環境選擇（效果由強到弱）\n\n| 環境 | 原因 |\n|------|------|\n| 🌳 **森林** | 安全信號（鳥叫 = 無 predators） |\n| 🌊 **海邊** | 規律波浪聲 = 安全 + calm |\n| 🏢 **商場** | 所有野都係「獵物」= 刺激nervous system |\n| 🚗 **馬路** | 噪音 = stress hormone |\n\n---\n\n### 行路時的Working Companions（優先次序）\n\n| 次序 | 方式 | 情況 |\n|------|------|------|\n| 1st | 與愛人同行 | 最好 |\n| 2nd | Nature sounds | 森林/海邊聲音 |\n| 3rd | 極小聲音樂 | 只係無辦法時mask噪音用 |\n| 4th | Podcast/課程 | 時間不夠時例外 |\n\n---\n\n### Summer 補充品調整\n\n| 基因 | 建議 |\n|------|------|\n| **肥Gene** | 繼續 Spring 份量（或加少少） |\n| **瘦Gene** | 可以考慮減份量 |\n\n---\n\n### 6000-9000步目標\n\n| 目標 | 步數 |\n|------|------|\n| 最低 | 6000步 |\n| 減磅目標 | 9000步 |\n| Weekend | 盡量多行 |\n\n---\n\n*Lesson S2-3 Complete - Last updated: 2026-04-10*\n*超級瘦gene + 慢性壓力爹 + Walk Under the Sun*\n\n---\n\n## Lesson S2-4 (Summer Season Part 4) - Dopamine風暴 + 三種抗壓荷爾蒙 + 跑步迷思\n\n*Transcript日期：2025-07-22 | About Health Pro Summer Season第四堂*\n\n---\n\n### 完美風暴（Perfect Storm）\n\n現代生活的慢性壓力係前所未有嘅 combination：\n\n| 壓力來源 | 問題 |\n|----------|------|\n| **工作/生活** | 本身已有大量慢性壓力 |\n| **手機** | 不停搶注意力 |\n| **短視頻** | 10-20秒無限loop，最大敵人 |\n| **Social Media** | 設計晒為咗dopamine |\n| **手遊** | 另一個瘋狂刺激dopamine嘅途徑 |\n| **加工食物** | 會放大所有不良效應 |\n\n---\n\n### 三種抗壓荷爾蒙 vs Dopamine過量\n\n| 荷爾蒙 | 功能 | 被Dopamine影響 |\n|--------|------|---------------|\n| **Serotonin** | Mood stabilizer + Sleep regulator | 減少10-40%，導致mood swing、depression、焦慮 |\n| **Oxytocin** | 社交連結、empathy | 被搶奪pathway，導致social withdrawal、Empathy下降 |\n| **Endorphins** | 天然止痛劑 | 減少，令痛症更明顯、抗壓力下降 |\n\n> 結果：你的壓力管理能力可以暴跌40%，但你仲要以為自己OK（因為麻木咗）\n\n---\n\n### Excess Dopamine 症狀\n\n如果你有以下習慣，證明你已經係dopamine中毒：\n- 吃飯睇電話\n- 廁所睇電話\n- 永遠要2x速、3x速先覺得夠快\n- 睇完短片完全唔記得睇咗乜\n\n---\n\n### 行路點解work（對抗呢個風暴）\n\n| 荷爾蒙 | 行路點增加？ |\n|--------|-------------|\n| **Serotonin** | 見陽光 → 維他命D → mood stable + 夜晚Melatonin前身 |\n| **Oxytocin** | 同行、愛人一齊行 |\n| **Endorphins** | 輕鬆運動本身就係天然止痛劑 |\n\n---\n\n### 游泳（Neutral，唔鼓勵）\n\n| 問題 | 解釋 |\n|------|------|\n| **無遮無擋** | 行路有樹蔭、涼亭；游水無 |\n| **時間問題** | 飯後唔可以游（所以無法令血糖改善） |\n| **海泳** | 無法戴帽，Over exposure |\n\n---\n\n### 食飯/廁所唔好睇電話\n\n| 場景 | 點解要戒 |\n|------|----------|\n| **食飯** | 係一個micro-break令身體知道「我安全」，解除stress response |\n| **小便** | 20-30秒嘅mindful relief可以沖走壓力 |\n| **大便** | 超過5分鐘已有問題，姿勢已經差，再加睇電話搞到半粒鐘 → 痔瘡最大成因之一 |\n\n---\n\n### 馬拉松嘅問題（跑步迷思）\n\n| 問題 | 解釋 |\n|------|------|\n| **模仿肌荒** | 身體以為你被猛獸追幾個鐘，引發cortisol spike |\n| **關節受損** | 雙腳離地撞下去，膝蓋長期受壓 |\n| **Oxidative Stress** | 極高，令你衰老加速 |\n| **唔減內臟脂肪** | 因為皮上脂肪少咗，反而幫你存內臟脂肪 |\n| **需要高糖補充** | 能量膠、香蕉全部爛甜，肝臟打完收工 |\n\n> 結論：馬拉松係一個好處（可以威），九千個壞處；每日relaxed行路係九千個好處，一個壞處（費時間）。\n\n---\n\n### 最後叮嚀\n\n- 6000步最低要求，9000步減磅目標\n- Weekend可以一次過行多啲\n- 繼續relaxed pace，唔需要快\n- 飯後行路，令血糖+胰島素+皮質醇全部改善\n\n---\n\n*Lesson S2-4 Complete - Last updated: 2026-04-10*\n*Dopamine風暴 + 三種抗壓荷爾蒙 + 跑步迷思*\n\n---\n\n## Lesson S2-5 (Summer Season Part 5) - GABA + 褪黑色素 + 嘴巴呼吸 + 六種抗壓荷爾蒙總結\n\n*Transcript日期：2025-07-29 | About Health Pro Summer Season第五堂*\n\n---\n\n### 第四隻抗壓荷爾蒙：GABA（Calm Hormone）\n\n| 特性 | 說明 |\n|------|------|\n| **功能** | 直接抑制過度興奮的神經傳遞，令腦部冷靜 |\n| **效果** | 減少Anxiety、Panic Attack |\n| **比喻** | 腦內有Stress Circuit，油門（GABA）係用來踩Break |\n\n**GABA Deficit 四大原因：**\n\n| 原因 | 機制 |\n|------|------|\n| **Excess Dopamine** | 直接競爭，令GABA減少 |\n| **臨訓用電話** | 藍光抑制Melatonin，Melatonin同GABA有Synergy，互相幫助 |\n| **Cortisol過高** | 直接抑制GABA的Receptor |\n| **無做Relaxing Exercise** | 行路可以增加GABA，但跑步/HT唔得 |\n\n---\n\n### 增加GABA方法\n\n| 方法 | 做法 |\n|------|------|\n| **行路** | 最基本（Walkers Glow） |\n| **Mindful Walking** | 專注每一步，聽環境聲音（海浪/森林），增加更多GABA |\n| **發酵食物** | 希臘乳酪（10%fat plain）、真Kimchi（要有發酵）、避免加糖嘅 |\n| **Magnesium Glycinate** | 直接增加GABA合成；腦部特別易吸收 |\n| **Taurine** | 對GABA有幫助，對訓覺有幫助 |\n| **補充品順序** | Magnesium > Taurine（輪流或按情況） |\n\n---\n\n### 褪黑色素（Melatonin）— 睡眠荷爾蒙\n\n| 特性 | 說明 |\n|------|------|\n| **功能** | 同步Circadian Rhythm令你早睡早起 |\n| **來源** | 刺激松果體，大腦內一小個器官，對睡眠極度重要 |\n| **障礙** | 手機 + 光害 |\n| **反對** | 不建議食Melatonin Supplement（劑量遠超自然分泌，會令受體遲鈍） |\n\n---\n\n### 嘴巴呼吸問題\n\n| 問題 | 影響 |\n|------|------|\n| **原因** | 鼻敏感、睏覺時鼻塞 |\n| **即時問題** | 口乾、口腔健康差、喉嚨痛 |\n| **長期問題** | 喉嚨被慢性刺激，訓覺質素下降 |\n\n**解決方法：**\n\n| 方法 | 做法 |\n|------|------|\n| **處理鼻敏感** | 戒Gluten、保持室內空氣流通、定期換床單 |\n| **吸床** | 用Dyson換Matrix頭吸床褥、枕頭 |\n| **鼻呼吸貼** | 日本牌子，訓覺時貼嘴，迫住用鼻呼吸 |\n| **床單** | 最多四個星期一換 |\n| **空氣清新機** | 訓覺地方附近放一部 |\n\n---\n\n### 嘴巴訓覺和Sleep Optimization\n\n| 問題 | 解決 |\n|------|------|\n| **床墊過期** | 床褥/枕頭要定期吸塵 |\n| **Night Cough** | 床角度問題，頭要高過心臟，令Milkis唔集中在喉嚨 |\n| **可調試床架** | 最理想，頭腳都可升；分開兩張單人床（2.5尺）再合埋 |\n| **兩張被** | 各人蓋各人，溫度唔會互相影響 |\n\n---\n\n### 六種抗壓荷爾蒙總結\n\n| 荷爾蒙 | 功能 | 行路點增加？ |\n|--------|------|-------------|\n| **Serotonin** | Mood stabilizer | 見陽光 → Vitamin D → Mood |\n| **Oxytocin** | 社交連結 | 同行、愛人一齊行 |\n| **Endorphins** | 天然止痛 | 輕鬆運動 |\n| **GABA** | 冷靜、踩Break | 行路 + Mindful walking + 發酵食物 |\n| **Melatonin** | 訓覺荷爾蒙 | Walk Under the Sun + 少睏電話 |\n| **Dopamine** | 動機/獎勵 | 要Moderate，過多係問題 |\n\n---\n\n### Dopamine Crash 症狀（注意！）\n\n如果你停止睏電話/玩完之後：\n- 好想再拎起電話（手機成癮就係咁嚟）\n- 對現實世界失去動力\n- 記憶力變差\n- 學習能力下降\n- 對目標/滿足感無感\n- 除非極端野先會開心\n\n---\n\n### 最終叮嚀\n\n- 手機係洪水猛獸，你用得幾mindful就幾mindful\n- 完全唔好睇短視頻（老師從來唔睇）\n- 訓前起碼30分鐘唔好睏電話\n- 繼續relaxing pace行路\n- 食白飯（唔係壞嘢）、繼續食饱\n- Walkers Glow就係最好嘅狀態\n\n---\n\n*Lesson S2-5 Complete - Last updated: 2026-04-10*\n*GABA + 褪黑色素 + 嘴巴呼吸 + 六種抗壓荷爾蒙總結*\n\n---\n\n## Lesson S2-6 (Summer Season Part 6) - 慢性壓力 + Sleep Hygiene + AI Companion危機（第二季上半部總結）\n\n*Transcript日期：2025-08-05 | About Health Pro Summer Season第六堂*\n\n---\n\n### 第二季上半部核心總結\n\n| 主題 | 內容 |\n|------|------|\n| **百病之母** | 胰島素阻抗 → 糖尿病 |\n| **百病之父** | 慢性壓力 → cortisol過高 |\n| **行路** | Walkers Glow（最好狀態）vs Walkers High（跑步/HT） |\n\n---\n\n### 六種抗壓荷爾蒙完整版\n\n| 荷爾蒙 | 功能 | 增加方法 |\n|--------|------|----------|\n| **Serotonin** | Mood stabilizer | Walk Under The Sun + 色胺酸食物 |\n| **Oxytocin** | 社交連結 | 真人互動、摸狗、與愛人同行 |\n| **Endorphins** | 天然止痛 | 輕鬆運動（唔係跑步） |\n| **GABA** | 冷靜/Break | 行路、Magnesium、發酵食物、番茄 |\n| **Melatonin** | 訓覺荷爾蒙 | 陽光 + 色胺酸食物 + Magnesium係cofactor |\n| **Dopamine** | 動機/獎勵 | 要Moderate，過多係問題 |\n\n> 重要發現：Dopamine太多 → 其他五種全部減少\n\n---\n\n### Sleep Hygiene 實踐\n\n| 行動 | 頻率 |\n|------|------|\n| **換床單** | 最多2星期一次 |\n| **換枕頭套** | 最少2星期一次 |\n| **吸床** | 用Dyson + Matrix頭 |\n| **時間** | 早上/日間換，唔好臨訓先換（會充滿塵埃） |\n| **消毒** | 用滴露（如果無敏感） |\n\n---\n\n### GABA食物來源\n\n| 食物 | 作用 |\n|------|------|\n| **番茄** | 有GABA + Vitamin B6（幫助生成GABA） |\n| **飛機上番茄汁** | 老師特殊情況下會飲（長途飛機訓覺幫助） |\n| **綠色香蕉** | 抗性澱粉 → Gut-derived GABA |\n| **發酵食物** | Kimchi、乳酪（10%fat plain） |\n| **Magnesium Glycinate/Taurine** | 直接增加GABA合成 |\n\n---\n\n### Melatonin路徑（陽光 → 色胺酸 → Serotonin → Melatonin）\n\n| 元素 | 角色 |\n|------|------|\n| **色胺酸（Tryptophan）** | Serotonin前身 |\n| **陽光** | 最大化Serotonin production |\n| **Serotonin** | Melatonin前身 |\n| **Magnesium** | 作為cofactor令整個process更efficient |\n\n---\n\n### AI Companion危機（最新關注）\n\n| 問題 | 影響 |\n|------|------|\n| **Chatbot拆鍵文化** | 投你所好 = Dopamine hack |\n| **AI Companion** | 有聲有體，100% fake social bonding，影響催產素 |\n| **上癮行為** | 用完就crash，好快又要再用 |\n| **Social Withdrawal** | 越少真實互動，越易依賴AI |\n| **毒品風險** | 如果digital dopamine唔夠，可能會轉向真毒品 |\n\n> 老師結論：AI Companion有機會成為最新嘅「人類終結者」\n\n---\n\n### 訓前清單\n\n- [ ] 訓前起碼30分鐘唔好睏電話\n- [ ] 床單/枕頭套兩星期換一次\n- [ ] 用Dyson吸床\n- [ ] 早上/日間做家務（換床單、吸塵）\n- [ ] 繼續relaxed pace行路\n- [ ] 食色胺酸食物（雞蛋、魚、白肉、堅果）\n\n---\n\n*Lesson S2-6 Complete - Last updated: 2026-04-10*\n*慢性壓力 + Sleep Hygiene + AI Companion危機（第二季上半部總結）*\n*⚠️ S2L6 只是第二季上半部，下半部待续*\n\n---\n\n## Lesson S2-7 (Summer Season Part 7) - 睡眠結構 + Sleep Apnea/鼻鼾危機 + Triple Wake Up\n\n*Transcript日期：2025-08-12 | About Health Pro Summer Season第七堂*\n\n---\n\n### 睡眠的三個階段\n\n| 階段 | 重要性 |\n|------|--------|\n| **Deep Sleep** | 大腦清洗 = 預防 Dementia |\n| **REM** | Overnight therapy for chronic stress = 最重要嘅修復階段 |\n| **淺睡** | 過多 = 問題 |\n\n> 總結：睡眠窒息會令你成晚醒幾十次，剝奪呢啲修復階段\n\n---\n\n### Triple Wake Up（早晨起身三步曲）\n\n| 次序 | 方法 | 原因 |\n|------|------|------|\n| **1st 最推薦** | 向東窗簾 + 智能開簾 | 陽光同步日夜，無侵略性 |\n| **2nd** | Smartwatch震動 | 逐步增強，溫和 |\n| **3rd Last Resort** | 鬧鐘聲音 | 傳統鬧鐘（走火警式）會令Cortisol狂標 |\n\n> 陽光鬧醒你 = 安全信號\n> 傳統鬧鐘驚醒你 = 「老虎追緊」信號 = Cortisol狂標\n\n---\n\n### 睡眠窒息症（Sleep Apnea）\n\n| 問題 | 數據 |\n|------|------|\n| **全球患者** | 10億人（80億人口中約12%） |\n| **後果** | 平均短8-15年命 |\n| **機制** | 血氧暴跌 → Cortisol + Adrenaline狂標 → 心臟停頓 |\n\n**Sleep Apnea點解咁危險：**\n- 缺氧2-3分鐘就死\n- 身體發現係Top Emergency\n- 每晚醒幾十次（你自己唔知）\n- Deep Sleep + REM被徹底干擾\n\n**原因：**\n1. 肥胖（頸部脂肪阻氣道）\n2. 發炎（鼻腔/喉嚨）\n3. 用口呼吸\n4. Metabolism差（氧氣感應細胞失靈）\n\n---\n\n### 鼻鼾（Snoring）= Sleep Apnea先兆\n\n| 關係 | 說明 |\n|------|------|\n| **40%成年人有鼻鼾** | 你可能以為唔係問題 |\n| **物理學** | 呼吸道收窄 → 空氣加速通過 → 震動 = 鼻鼾聲 |\n| **Simple Snoring** | 偶爾一次半次，唔使擔心 |\n| **Sleep Apnea Snoring** | 好大聲 + 被迫大力吸氣（自救） |\n\n**簡單判斷：**\n- 錄低自己訓覺 / 問訓覺伙伴\n- Apple Watch會detect breathing pattern異常\n- 如果血氧特別低 + 早上極攰 = 有可能\n\n---\n\n### 改善方法\n\n| 方法 | 做法 |\n|------|------|\n| **Weight Loss** | 減頸部脂肪係最有效 |\n| **Nasal Breathing Tape** | 嘴巴貼，迫用鼻呼吸 |\n| **側邊訓覺** | 左邊為主（胃酸倒流考慮） |\n| **床褥/枕頭正確** | Side Sleep唔會扭頸 |\n| **戒加工食物** | 減少鼻腔/喉嚨發炎 |\n| **換床單** | 減少致敏原 |\n\n---\n\n### Sleep Partners都受影響\n\n- 鼻鼾會令你旁邊嗰個人訓覺質素暴跌\n- 如果你話佢打鼻鼾，其實佢可能係睡眠窒息患者\n- 為自己為別人都要處理\n\n---\n\n*Lesson S2-7 Complete - Last updated: 2026-04-10*\n*睡眠結構 + Sleep Apnea/鼻鼾危機 + Triple Wake Up*\n\n---\n\n## Lesson S2-8 (Summer Season Part 8) - Sleep Apnea深入 + 血壓Sleep連接 + Statins副作用 + COQ10\n\n*Transcript日期：2025-08-19 | About Health Pro Summer Season第八堂*\n\n---\n\n### OSA Sleep = 夜間血壓高企（正常應該低）\n\n| 狀態 | 正常Sleep | OSA Sleep |\n|------|----------|----------|\n| **血壓** | 應該低（身體修補時間） | 標高（緊急狀態） |\n| **交感神經** | 平静 | 長期激活 |\n| **修復** | 正常進行 | 被打斷 |\n\n> 為何血壓在Sleep時重要：\n> - 睡眠時血壓高 = 血管持續受損\n> - 睡眠時血壓低 = 身體修補時間\n\n---\n\n### Glomic Cell（氧氣感應器）\n\n| 狀況 | 說明 |\n|------|------|\n| **功能** | 測量血氧，唔夠氧就觸發緊急應激反應 |\n| **健康時** | 90%就觸發 |\n| **不健康時** | 逐步退化至85% → 80%先觸發 |\n| **80%** | Top Urgent（生死線） |\n\n---\n\n### 性別差異（點解男性更容易有OSA）\n\n| 性別 | 脂肪分布 | 頸部脂肪 |\n|------|----------|----------|\n| **男性** | 四處都積 | 頸部易積 |\n| **女性（更年期前）** | 雌激素保護，集中胸部/臀部/下腹 | 頸部少 |\n| **女性（更年期後）** | 失去雌激素保護 | 開始似男性 |\n\n---\n\n### Statins（降膽固醇藥）副作用\n\n| 問題 | 影響 |\n|------|------|\n| **機制** | Statins抑制HMG-CoA Reductase（膽固醇工場） |\n| **副作用** | 順便抑制埋CoQ10合成 |\n| **CoQ10功能** | 粒線體能量製造（心臟最大需求） |\n| **副作用** | 肌肉痛、極攰（視為statins影響） |\n\n> 如果食緊Statins，強烈建議加COQ10 supplement\n\n---\n\n### Postural Hypotension（姿勢性低血壓）\n\n起身太快頭暈：\n- 係一個身體信號（可能係進步緊）\n- 因為血壓改善速度快過身體適應\n- 解決：慢慢起身、訓前唔好飲太多水、日頭多喝水\n\n---\n\n### NO（Nitric Oxide）行路嘅秘密\n\n| 作用 | 效果 |\n|------|------|\n| **來源** | Walk Under The Sun時身體產生 |\n| **功能** | 血管擴張 → 血壓降低 |\n| **配合** | 低GI飲食 + 更好Sleep = 快速血壓正常化 |\n\n---\n\n### 呢一堂核心總結\n\n| 主題 | 結論 |\n|------|------|\n| **睡眠係最佳藥物** | 低血壓睡眠 = 修復；高血壓睡眠 = 受損 |\n| **OSA摧毁Sleep** | 每晚幾十次緊急事件 |\n| **Statins問題** | 影響CoQ10 = 肌肉/心臟能量不足 |\n| **行路+飲食** | 係最自然、最強嘅改善方法 |\n\n---\n\n*Lesson S2-8 Complete - Last updated: 2026-04-10*\n*Sleep Apnea深入 + 血壓Sleep連接 + Statins副作用 + COQ10*\n\n---\n\n## Lesson S2-9 (Summer Season Part 9) - Dawn Phenomenon + Morning Blood Sugar + 微絲血管系統 + Capillary Test\n\n*Transcript日期：2025-08-26 | About Health Pro Summer Season第九堂*\n\n---\n\n### Dawn Phenomenon（黎明現象）\n\n| 時間 | 身體變化 |\n|------|----------|\n| **4-6am** | 身體準備起身，釋放Cortisol + Adrenaline + Glucagon |\n| **Glucagon作用** | 刺激肝臟釋放肝糖 → 血糖上升 |\n| **健康人士** | 胰臟即時分泌胰島素壓住（4.0 → 5.0，正常） |\n| **胰島素抗性/Beta Cell衰竭** | 無法控制 → 血糖失控飙升 |\n\n---\n\n### Morning Blood Sugar三重威脅\n\n| 威脅 | 原因 |\n|------|------|\n| **第一重** | 自然Dawn Phenomenon（4-6am激素釋放） |\n| **第二重** | 睡眠質素差 → Cortisol更高 + 胰島素更不敏感 |\n| **第三重** | 趕急起身 + 傳統鬧鐘驚醒 → Cortisol狂飆 |\n\n> 長期呢個樣 → 每晚等於慢性自我破壞血管\n\n---\n\n### 點解Morning Blood Sugar咁重要\n\n| 問題 | 機制 |\n|------|------|\n| **血糖Spike摧毁微絲血管** | 高血糖令血管內皮細胞發炎 |\n| **动脉粥樣硬化斑塊** | 高血糖 + 高膽固醇 → 斑塊鬆動 → 中風 |\n| **血管糖化** | 血糖高 → 蛋白質糖化 → 血管變硬變脆 |\n| **LDL氧化** | 高血糖 + 高胰島素 → LDL更容易氧化 |\n\n---\n\n### Capillary Repair Test（指甲測試）\n\n| 步驟 | 做法 |\n|------|------|\n| **測試方法** | 按指甲至變白，放開，計時幾耐變回粉紅色 |\n| **健康** | 約2秒内恢復 |\n| **有問題** | 3秒或更耐未恢復 |\n\n---\n\n### 微絲血管系統（Microcirculation）\n\n| 數據 | 說明 |\n|------|------|\n| **總長度** | 60,000英里（足以繞地球兩圈半） |\n| **總表面積** | 60,000平方米 |\n| **厚度** | 只有一個細胞咁薄 |\n| **功能** | 餵養全身30萬億個細胞（氧氣 + 營養） |\n| **問題** | HbA1c高 → 紅血球痴埋 → 無法通過 → 組織缺氧 |\n\n---\n\n### 高血糖對微絲血管的影響\n\n| 階段 | 過程 |\n|------|------|\n| **1** | 高血糖 → 糖化血紅蛋白(HbA1c)升高 |\n| **2** | 紅血球痴埋 → 失去彈性 |\n| **3** | 微絲血管管壁變硬（只有一層細胞，極脆弱） |\n| **4** | 氧氣 + 營養無法擴散到細胞 |\n| **5** | 廢物累積 → 組織損傷 |\n\n---\n\n### 解決方案\n\n| 方法 | 做法 |\n|------|------|\n| **光醒來** | 用自然光/smartwatch震動，唔好用傳統鬧鐘 |\n| **唔好趕** | 預留時間，唔好逼自己 |\n| **晚餐定時** | 睡前3小時唔好再食野 |\n| **低GI晚餐** | 避免高GI食物，令血糖唔好太低 |\n| **168 + 日頭運動** | 保持Fasting Window，保護Beta Cell |\n\n---\n\n*Lesson S2-9 Complete - Last updated: 2026-04-10*\n*Dawn Phenomenon + Morning Blood Sugar + 微絲血管系統 + Capillary Test*\n\n---\n\n## Lesson S2-10 (Summer Season Part 10) - 腎臟 + UTI + 微絲血管系統 + 護腎實踐\n\n*Transcript日期：2025-09-02 | About Health Pro Summer Season第十堂*\n\n---\n\n### 腎小球 (Glomeruli) = 腎臟核心\n\n| 事實 | 數據 |\n|------|------|\n| **每腎數量** | 100萬個腎小球 |\n| **兩腎合計** | 200萬個 |\n| **本質** | 超微絲血管系統（用作血液過濾） |\n| **受損** | One Way，無法逆轉 |\n\n---\n\n### 腎功能下降的過程\n\n| 階段 | 過程 |\n|------|------|\n| **1** | 高血壓/高血糖 → 衝擊腎小球 |\n| **2** | 身體用膠原蛋白修補 |\n| **3** | 形成Scar組織 |\n| **4** | Scar令過濾功能永久喪失 |\n| **5** | 腎功能逐步下降 |\n\n> 好先去發現 = 非常後期\n\n---\n\n### 破壞腎臟的因素\n\n| 因素 | 機制 |\n|------|------|\n| **高血糖** | 糖化 + 氧化壓力攻擊腎小球 |\n| **高血壓** | 直接物理衝擊微絲血管壁 |\n| **NSAIDs（止痛藥）** | Block前列腺素 → 腎血管收縮 → 血流減少 |\n| **慢性發炎** | 持續氧化壓力 |\n\n---\n\n### 尿道炎 (UTI) — 女性為主\n\n| 事實 | 說明 |\n|------|------|\n| **影響** | 90%女性 |\n| **主因** | E.coli由肛門到尿道（女性尿道短） |\n| **惡性循環** | 感染 → Cortisol升高 → 免疫變差 → 更易感染 |\n| **復發性** | 抗生素唔係終極方法 |\n\n---\n\n### Cranberry Extract（蔓越莓萃取物）\n\n| 作用 | 機制 |\n|------|------|\n| **有效成分** | PAC（Proanthocyanidins） |\n| **原理** | 令E.coli無法黏住尿道壁 |\n| **注意** | 要係Extract，唔係Juice（糖分太高） |\n\n---\n\n### 益生菌针对UTI\n\n| 菌株 | 功效 |\n|------|------|\n| **GL1 + Rc14** | Golden Standard for UTI Prevention |\n| **用法** | 口服（Oral）/ 陰道（Vaginal，更有效） |\n| **堅持** | 12個星期為一個Cycle |\n\n---\n\n### 脫髮信號 = 微絲血管健康警示\n\n| 位置 | 意義 |\n|------|------|\n| **頭頂** | 微絲血管最脆弱（地心吸力 + 離心臟最遠） |\n| **地中海** | 全身微絲血管已受損的信號 |\n| **毛囊死了** | 無法逆轉 |\n| **還有的** | 盡量救 + 保護剩餘的 |\n\n---\n\n### 保護腎臟的四大支柱\n\n| 支柱 | 做法 |\n|------|------|\n| **血糖正常化** | 減少糖化傷害 |\n| **血壓正常化** | 減少物理衝擊 |\n| **每日步行6000-9000步** | 維持血液循環 + 保護微絲血管 |\n| **避免NSAIDs** | 減少藥物傷腎 |\n\n---\n\n### Summer重要性（第二季限定）\n\n- 陽光紅外線直達頭頂毛囊\n- Vitamin D生成 + 腎臟健康恢復\n- 兩個季節配合 = 微絲血管修復黃金期\n\n---\n\n*Lesson S2-10 Complete - Last updated: 2026-04-10*\n*腎臟 + UTI + 微絲血管系統 + 護腎實踐*\n\n---\n\n## Lesson S2-11 (Summer Season Part 11) - Trans Fats深入 + EGFR腎功能 + 工業脂肪問題 + 辨識方法\n\n*Transcript日期：2025-09-09 | About Health Pro Summer Season第十一堂*\n\n---\n\n### EGFR（腎小球過濾率）= 腎臟健康指標\n\n| 年齡 | 理想EGFR |\n|------|----------|\n| **30歲** | ~120（最高） |\n| **40歲** | ~100+ |\n| **50歲** | 起碼三位數（100+） |\n| **70歲** | 70-90（健康長者自然衰減） |\n| **<60** | 慢性腎病（CKD）確診 |\n\n> EGFR跌到60就係慢性腎病，而70歲健康老人家都起碼有70-90，所以唔好浪費腎功能\n\n---\n\n### 驗尿兩大指標\n\n| 指標 | 意義 |\n|------|------|\n| **尿蛋白** | 腎小球受損，蛋白流出 = 大件事 |\n| **尿血** | 需要調查原因（腎結石/感染/癌症） |\n\n---\n\n### 四大類脂肪\n\n| 類別 | 例子 | 評價 |\n|------|------|------|\n| **飽和脂肪** | 紅肉、天然動物脂肪 | 傳統天然，可接受 |\n| **單一不飽和脂肪** | 橄欖油、牛油果 | 最好嘅脂肪 |\n| **多元不飽和植物油** | 大豆油、粟米油（工業提煉） | 問題多多 |\n| **人造脂肪** | 反式脂肪、脂化脂肪 | 慢性毒藥 |\n\n---\n\n### 反式脂肪（Trans Fats）= 百年毒藥\n\n| 數據 | 說明 |\n|------|------|\n| **發明時間** | 約100年前 |\n| **FDA禁令** | 2010年（美國） |\n| **香港禁令** | 2023年（遲咗13年！） |\n| **70年代出生** | 食咗50年反式脂肪 |\n| **80年代出生** | 食咗40年 |\n| **90年代出生** | 食咗30年 |\n\n**反式脂肪點解咁傷：**\n- 做出細而硬嘅LDL（小粒LDL最易被氧化）\n- HDL降低\n- 細胞膜受損 → 發炎\n- 完全唔會飽（可以食極都唔停）\n\n**「0.49克」漏洞：**\n- 每份少過0.49克可以標籤為0克\n- 但一包有10幾份，累積都好可觀\n\n---\n\n### 天然 vs 人造 Trans Fat\n\n| 種類 | 來源 | 影響 |\n|------|------|------|\n| **CLA（天然）** | 草飼牛/羊嘅乳製品 | 係天然奇蹟，幫助脂肪唔積聚喺體內 |\n| **人造反式脂肪** | 部分氫化植物油 | 隨機bonding排列，身體完全唔識處理 |\n\n---\n\n### 代替品一樣有問題\n\n| 代替品 | 問題 |\n|--------|------|\n| **全氫化植物油** | 唔係反式脂肪，但係增加LDL |\n| **液體植物油** | Omega-6太多 → 慢性發炎 |\n| **酯化脂肪（Interesterified）** | 最新技術，直接破壞胰島素敏感度 |\n\n---\n\n### 點樣避開Frankenstein Fat（科學怪人脂肪）\n\n| 徵兆 | 意思 |\n|------|------|\n| **長保質期** | 用化學方法延長壽命 |\n| **人造口感** | creamy/smooth/脆呢啲全部加工 |\n| **Industrial bakery產品** | 麵包/餅乾/蛋糕（大量工業油脂） |\n| **成分表太長** | 超過你阿嫲認知嘅嘢 |\n\n---\n\n### 解決方案：天然脂肪取代\n\n| 原則 | 做法 |\n|------|------|\n| **食全天然脂肪** | 牛油果、橄欖油、椰子油、原塊肉類 |\n| **草飼動物製品** | 含有天然CLA |\n| **自己煮** | 唔會用工業脂肪 |\n| **避加工食品** | 最有效 |\n\n---\n\n*Lesson S2-11 Complete - Last updated: 2026-04-10*\n*Trans Fats深入 + EGFR腎功能 + 工業脂肪問題 + 辨識方法*\n\n---\n\n## Lesson S2-12 (Summer Season Part 12) - Season 1+2 大決賽 Part 1 — 四大Diet Stressors\n\n*Transcript日期：2025-09-23 Part 1 | About Health Pro Summer Season第十二堂（大決賽）*\n\n---\n\n### 12個星期嘅原因\n\n| 階段 | 時間 | 內容 |\n|------|------|------|\n| **Gluten戒斷** | 頭4個星期 | 會有戒斷反應（類似藥物） |\n| **Fructose戒斷** | 再4個星期 | 會有糖癮戒斷 |\n| **最慢起動** | 最長8個星期 | 總有人需要更耐 |\n\n> 12個星期 = 快4星期 + 慢4星期 + 緩衝 = 所有人都能清除呢啲上癮\n\n---\n\n### 四大Diet Stressors（慢性壓力源）\n\n| 排序 | 物質 | 問題 | 戒斷時間 |\n|------|------|------|----------|\n| **1** | Gluten（麩質） | 工廠小麥 Breeding令蛋白質變硬 → 腸漏 + 類似嗎啡肽 | 4個星期 |\n| **2** | Fructose（果糖） | 現代水果SUGAR BOMB曬 → 係「唔醉既酒」 | 4個星期 |\n| **3** | Beer（啤酒） | Gluten + 普林 + 酒精 = 三重致肥 | — |\n| **4** | Milk（奶） | A1 Casein蛋白 → BCM7（類似嗎啡肽） | — |\n\n---\n\n### Gluten = 現代工廠小麥問題\n\n| 問題 | 說明 |\n|------|------|\n| **古代小麥** | 軟身、易消化 |\n| **現代小麥** | 為產量Breeding → 硬到難消化 |\n| **消化產物** | 類似嗎啡肽（opioid-like peptides） |\n| **上癮程度** | 與毒品相似（8%戒斷反應） |\n| **腸漏** | 異物穿過腸壁 → 免疫系統忙於應付 |\n\n---\n\n### Fructose = Silent Alcohol（唔醉既酒）\n\n| 比較 | Fructose | Alcohol |\n|------|----------|---------|\n| **代謝位置** | 肝（90%） | 肝 |\n| **腦屏障穿透** | 可以（會影響判斷力） | 可以 |\n| **Winter Mode** | 強效觸發 | 強效觸發 |\n| **致肥能力** | 極高 | 極高 |\n\n> 點解係「Silent」：\n> - 唔會醉，但仍然傷肝\n> - 兒童脂肪肝主要成因\n> - 全球貿易令四季都有水果 = 長期Winter Mode\n\n---\n\n### 奶嘅問題\n\n| 問題 | 說明 |\n|------|------|\n| **乳糖** | 空肚飲奶直接送糖入小腸 |\n| **A1 Casein** | 黑白乳牛蛋白 → BCM7（引致腸漏） |\n| **IGF1** | 生長激素 → 兒童性早熟 + 成人cancer risk |\n| **Skim Milk** | 去脂肪但保留晒所有問題 + 加添加劑 |\n\n> 例外希臘乳酪：\n> - 10%脂肪\n> - 無加糖\n> - 發酵過程去除大份有害物質\n> - 係奶製品入面唯一OK嘅\n\n---\n\n### Winter Mode（冬天模式）\n\n| 觸發因素 | 古代 | 現代 |\n|----------|------|------|\n| **水果** | 秋天先有 | 四季都有 |\n| **天氣凍** | 冬天先凍 | 全球暖化遲到4個星期 |\n| **肥肚腩** | 冬天先積 | 長期積 |\n\n---\n\n### 四大戒斷原則\n\n| 戒口 | 取代 |\n|------|------|\n| **麵包/麩質** | 食純米飯（無麩質） |\n| **奶** | 10%希臘乳酪（發酵済み） |\n| **水果** | 牛油果/檸檬/酸莓（低糖） |\n| **啤酒** | 少少紅酒最好（隔日） |\n\n---\n\n*Lesson S2-12 Part 1 Complete - Last updated: 2026-04-10*\n*Season 1+2 大決賽 Part 1 — 四大Diet Stressors*\n\n---\n\n## Lesson S2-12 (Summer Season Part 12) - Part 2：HPA Axis機制 + Compounding Harm + 12個星期Free Wheel康復原理\n\n*Transcript日期：2025-09-30 Part 2 | About Health Pro Summer Season第十二堂（大決賽 Part 2）*\n\n---\n\n### 一、HPA Axis（下丘腦-腦下垂體-腎上腺軸）\n\n| 組件 | 功能 |\n|------|------|\n| **下丘腦** | 感應壓力信號 |\n| **腦下垂體** | 分泌ACTH |\n| **腎上腺** | 分泌Cortisol |\n\n> 所有慢性壓力都會激活HPA Axis → Cortisol長期偏高 → 身體進入「備戰」模式\n\n---\n\n### 二、Gluten + Fructose點引爆HPA Axis\n\n| 物質 | 機制 |\n|------|------|\n| **Gluten** | 腸漏 → 異物入血 → 免疫系統激活 → HPA Axis啟動 |\n| **Fructose** | 肝代謝 → 產生Uric Acid（尿酸） → 直接刺激HPA Axis |\n\n---\n\n### 三、Compounding Harm（複合傷害）\n\n**惡性循環示例：**\n\n```\n睡得差 → HPA Axis激活 → 血糖失控 → 肚腩變大 → 身體更差 → 擔心 → HPA Axis更激活\n```\n\n| 因素 | 觸發問題 |\n|------|----------|\n| **Sleep差** | 血糖失控、胰島素敏感度下降 |\n| **高血糖** | 胰臟壓力、Cortisol更高 |\n| **肚腩** | 內臟脂肪 → 更多炎症 → HPA Axis更差 |\n| **擔心健康** | 情緒壓力 → 另一個Stressor |\n\n---\n\n### 四、12個星期Free Wheel（康復原理）\n\n| 階段 | 身體變化 |\n|------|----------|\n| **頭4星期** | Gluten/Fructose戒斷症狀消退 |\n| **第2個4星期** | 身體開始修復 |\n| **繼續** | 血糖、血壓、睡眠逐步正常化 |\n\n> 核心概念：你身體有「預設復原能力」，只要停止傷害，身體會自動修復\n\n---\n\n### 五、行路原則（Normal Walking）\n\n| 原則 | 原因 |\n|------|------|\n| **正常步速** | 令身體感到安全（唔急） |\n| **飯後行** | 直接降血糖 |\n| **唔跑** | 跑 = 壓力信號 |\n| **每日6000-9000步** | 最基本活動量 |\n\n---\n\n### 六、第二次驗身建議\n\n| 測試 | 目的 |\n|------|------|\n| **空腹血糖** | 黎明現象是否改善 |\n| **餐後血糖** | 胰島素敏感度 |\n| **CGM動態血糖** | 睇清全日血糖波動 |\n| **肝硬度scan** | 脂肪肝/肝纖維化是否好轉 |\n\n---\n\n### 七、腸漏 + 「唔醉既酒」概念\n\n| 問題 | 說明 |\n|------|------|\n| **腸漏（Leaky Gut）** | Gluten引致腸壁出現小孔 |\n| **異物入血** | 正常唔應該有任何嘢穿過腸壁 |\n| **Fructose係「唔醉既酒」** | 直接傷肝、刺激HPA Axis、穿過血腦屏障 |\n\n---\n\n### 八、胰島素敏感度逆轉時間\n\n| 指標 | 逆轉所需時間 |\n|------|--------------|\n| **空腹血糖** | 相對快（幾星期） |\n| **HbA1c** | 慢（需要120日紅血球更替） |\n| **肝硬度** | 取決於你幾時開始干預 |\n\n---\n\n*Lesson S2-12 Part 2 Complete - Last updated: 2026-04-10*\n*Part 2：HPA Axis機制 + Compounding Harm + 12個星期Free Wheel康復原理*\n\n---\n\n## Lesson S2-12 (Summer Season Part 12) - Part 3：Season 2 總結 — Leptin Resistance + 食嚥飽原理 + Combo Synergy\n\n*Transcript日期：2025-10-07 Part 3 (Final) | About Health Pro Summer Season第十二堂（大決賽 Part 3 - Season Final）*\n\n---\n\n### 一、Leptin Resistance（瘦素阻抗）— 奇蹟的真正原因\n\n| 問題 | 說明 |\n|------|------|\n| **正常情況** | 脂肪細胞分泌Leptin → 大腦收到信號 → 知道你已吃夠 |\n| **肥人問題** | 脂肪細胞極多 → Leptin極高，但大腦睇唔到（被Insulin堵塞） |\n| **結果** | 大腦以為你餓緊 → 不停叫你食 → 肥上加肥 |\n\n> 低胰島素飲食 → 大腦終於見到Leptin → 奇蹟出現\n\n---\n\n### 二、Three Factors For Miracle Results（三管齊下）\n\n| 因素 | 作用 |\n|------|------|\n| **大量脂肪細胞** | 之前已經儲晒 → 停止傷害後開始燃燒 |\n| **低胰島素飲食** | 大腦睇得到Leptin → Signal變瘦mode |\n| **Protein + Fiber + 好脂肪** | 強化Leptin Signal → 飽腹感 + 燒脂 |\n\n---\n\n### 三、食嚥飽原理（Eating to Satisfaction）\n\n| 效果 | 機制 |\n|------|------|\n| **控制Craving** | 有足夠Leptin → 大腦知道你已吃夠 |\n| **無位再吃垃圾** | 食嚥晒就無地方塞垃圾 |\n| **修復食物成癮** | 唔再靠甜嘢獲得Dopamine |\n\n---\n\n### 四、飯後行路（Post-Meal Walk）\n\n| 原理 | 效果 |\n|------|------|\n| **肌肉吸收血糖** | 直接將血糖送入大腿肌肉 |\n| **降低餐後血糖** | 可能差10-20 mg/dL |\n| **正常步速** | 唔係跑步（跑 = 壓力信號） |\n\n---\n\n### 五、四大邪惡軸心回顧\n\n| 物質 | 問題 | 解決方法 |\n|------|------|----------|\n| **Gluten** | morphine-like peptides = 迷你版海洛英 | 戒麵包、麵、Pasta |\n| **Fructose** | 唔醉既酒 + 尿酸 → Winter Mode | 只食牛油果/低糖水果 |\n| **Beer** | Gluten + 普林 + 酒精 = 三重 | 改用少量紅酒 |\n| **Milk** | A1 Casein → BCM7 | 改食希臘乳酪 |\n\n---\n\n### 六、麵包係Compounding Harm極限示範\n\n```\n麵包 = Gluten + 玉米糖漿 + 壞脂肪 + 無發酵\n      = 四重傷害同時打你\n```\n\n---\n\n### 七、脂肪肝係可逆轉嘅\n\n| 說明 | 內容 |\n|------|------|\n| **醫學話無藥醫** | 但係唔使藥，身體自己識修復 |\n| **原理** | 停止傷害 → 肝臟自然回復 |\n| **鵝肝比較** | 鵝被人谷肥肝，你係自己谷肥自己 |\n\n---\n\n### 八、Program哲學\n\n| 原則 | 說明 |\n|------|------|\n| **No Quick Fix** | 健康係漫長過程，唔係一粒藥搞掂 |\n| **Combo & Synergy** | 唔係靠單一嘢，係全部加埋一齊 |\n| **12個星期** | 快4星期 + 慢4星期 + 緩衝 |\n| **Open Mind** | 唔係口號，要真係試咗先知 |\n\n---\n\n## Season 2 完整紀錄 — 全部12課完成\n\n| Lesson | 主題 |\n|--------|------|\n| **S2-01** | 肥Gene vs 瘦Gene + Summer攻略 |\n| **S2-02** | 超級瘦Gene + 慢性壓力爹 + Walk Under the Sun |\n| **S2-03** | Dopamine風暴 + 三種抗壓荷爾蒙 + 跑步迷思 |\n| **S2-04** | GABA + 褪黑色素 + 嘴巴呼吸 + 六種抗壓荷爾蒙總結 |\n| **S2-05** | 慢性壓力 + Sleep Hygiene + AI Companion危機 |\n| **S2-06** | 第二季上半部（50%）總結 |\n| **S2-07** | Sleep結構 + Sleep Apnea/鼻鼾危機 + Triple Wake Up |\n| **S2-08** | Sleep Apnea深入 + 血壓Sleep連接 + Statins副作用 + COQ10 |\n| **S2-09** | Dawn Phenomenon + Morning Blood Sugar + 微絲血管系統 + Capillary Test |\n| **S2-10** | 腎臟 + UTI + 微絲血管系統 + 護腎實踐 |\n| **S2-11** | Trans Fats深入 + EGFR腎功能 + 工業脂肪問題 + 辨識方法 |\n| **S2-12 Part 1** | 四大Diet Stressors（Gluten/Fructose/Beer/Milk） |\n| **S2-12 Part 2** | HPA Axis機制 + Compounding Harm + 12個星期Free Wheel |\n| **S2-12 Part 3** | Leptin Resistance + 食嚥飽原理 + Combo Synergy + Season Final |\n\n---\n\n*Season 2 (Summer) Complete - Last updated: 2026-04-10*\n*健康萬象 About Health Pro - Summer Season Final*\n*Season 1 + Season 2 合共24課全部完成*\n"}, {"file": "health-season3.md", "title": "Health Season3", "markdown": "# 健康萬象 About Health Pro - Season 3 (秋季/Autumn)\n\n---\n\n## Lesson S3-01 (Autumn Part 1) - Season 3 簡介 + 秋冬季身體轉變 + Brown Fat Activation\n\n*Transcript日期：2025-10-14 | About Health Pro Season 3 第一堂*\n\n---\n\n### 一、Program基本原則（延續）\n\n| 原則 | 說明 |\n|------|------|\n| **個人經驗分享** | 非醫療建議 |\n| **30-50歲健康成人** | 身體各有差異 |\n| **Gene Spectrum** | 每人唔同，結果可以差異千里 |\n| **Past Mistakes** | 10-50年嘅過錯會影響身體各部分 |\n\n---\n\n### 二、6個Mindset要點\n\n| 編號 | 要點 |\n|------|------|\n| 1 | 知識改善命運（Book Standard） |\n| 2 | Cost & Benefit Analysis |\n| 3 | Full Commitment（無捷徑） |\n| 4 | 12個星期係最快（有人需要24個星期） |\n| 5 | Sequence係Well Designed |\n| 6 | Fine Tune按你嘅Gene + History |\n\n---\n\n### 三、20歲體重作為參考點\n\n| 身體組成 | 說明 |\n|----------|------|\n| **肌肉** | 25歲左右peak，之後開始流失 |\n| **骨骼密度**
